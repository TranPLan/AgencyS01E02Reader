ong-Su Go-A-In Tôi định vào phòng nhưng Go-A-In đã mở cửa với vẻ mặt phấn khích và đi đâu đó.\n병수가 아인 방으로 들어가려는데 아인이 흥분한 얼굴로 문을 벌컥 열고 어딘가로 간다.\nManager Han (Han-Byeong-Su) Go-A-In I was about to go into the room, but Go-A-In opened the door with an excited face and went somewhere.","sourceUid":"nar-mq112w4m-su8iyw","sourceNo":"N222","viRanges":[],"koRanges":[]},{"id":558,"readerNo":559,"displayNo":"N221","n":"N221","kind":"narration","type":"narration","vi":"S#32 Agency/Go-A-In Bên ngoài phòng (ban ngày)","ko":"S#32 대행사/아인 방 밖(낮)","en":"S#32 Agency/Go-A-In Outside the room (daytime)","text":"S#32 Agency/Go-A-In Bên ngoài phòng (ban ngày)\nS#32 대행사/아인 방 밖(낮)\nS#32 Agency/Go-A-In Outside the room (daytime)","sourceUid":"nar-mq112u7t-ey6vqk","sourceNo":"N221","viRanges":[],"koRanges":[]},{"id":559,"readerNo":560,"displayNo":435,"n":435,"kind":"sub","type":"merged","vi":"Vâng. Anh đi nhé. Thái độ tốt đấy. - Vâng, tôi sẽ cố gắng hết sức.\n- Được rồi.","ko":"아, 예, 다녀오십시오 [병수] 아, 요새 좋아 [은정] 아, 예, 열심히 하겠습니다 [병수] 그래","en":"Yes, sir. Please go ahead. Great attitude. -Thank you, sir. I'll try my best.\n-All right.","text":"Vâng. Anh đi nhé. Thái độ tốt đấy. - Vâng, tôi sẽ cố gắng hết sức.\n- Được rồi.\n아, 예, 다녀오십시오 [병수] 아, 요새 좋아 [은정] 아, 예, 열심히 하겠습니다 [병수] 그래\nYes, sir. Please go ahead. Great attitude. -Thank you, sir. I'll try my best.\n-All right.","sourceUid":"merged-mptxj501-25","sourceNo":435,"viRanges":[{"start":2032.01883,"end":2037.951839}],"koRanges":[{"start":2032.436074,"end":2038.192457}]},{"id":560,"readerNo":561,"displayNo":"N223","n":"N223","kind":"narration","type":"dialogue","vi":"Jeong-Soo-Jeong: (Gọi Go-A-In sau khi thấy anh ấy sắp đi đâu đó)","ko":"수정 :   (아인이 어딘가로 가는 걸 보고 전화)","en":"Jeong-Soo-Jeong (A-In's Secretary): (Calls Go-A-In after seeing that he is going somewhere)","text":"Jeong-Soo-Jeong: (Gọi Go-A-In sau khi thấy anh ấy sắp đi đâu đó)\n수정 :   (아인이 어딘가로 가는 걸 보고 전화)\nJeong-Soo-Jeong (A-In's Secretary): (Calls Go-A-In after seeing that he is going so rration","vi":"Choi-Chang-Soo đang trả lời điện thoại, hãy nói 'Được rồi.'","ko":"최상무 전화받고는 '알았어' 하면.","en":"Choi-Chang-Soo answering the phone, say ‘Okay.’","text":"Choi-Chang-Soo đang trả lời điện thoại, hãy nói 'Được rồi.'\n최상무 전화받고는 '알았어' 하면.\nChoi-Chang-Soo answering the phone, say ‘Okay.’","sourceUid":"nar-mq12t0p2-nxdob2","sourceNo":"N226","viRanges":[],"koRanges":[]},{"id":566,"readerNo":567,"displayNo":441,"n":441,"kind":"sub","type":"merged","vi":"- Cô ta đang đến đây sao?\n- Ba. Hai. Một. Không.","ko":"온대요? [창수] 3, 2 1 땡","en":"-She's coming here?\n-Three. Two. One. Zero.","text":"- Cô ta đang đến đây sao?\n- Ba. Hai. Một. Không.\n온대요? [창수] 3, 2 1 땡\n-She's coming here?\n-Three. Two. One. Zero.","sourceUid":"merged-mpty13eo-29","sourceNo":441,"viRanges":[{"start":2063.449015,"end":2073.364304}],"koRanges":[{"start":2063.718549,"end":2073.811697}]},{"id":567,"readerNo":568,"displayNo":"N227","n":"N227","kind":"narration","type":"narration","vi":"Trước âm thanh ding, Go-A-In, người đã hoàn toàn mất kiểm soát, mở cửa và bước vào. Choi-Chang-Soo mỉm cười (mỉa mai) và nhìn Go-A-In.","ko":"땡 소리에 맞춰, 통제력을 완전히 상실한 아인이 문을 벌컥 열고 들어오면 최상무가 미소 지으며(비아냥) 아인 바라본다.","en":"To the sound of a ding, Go-A-In, who has completely lost control, opens the door and comes in. Choi-Chang-Soo smiles (sarcastically) and looks at Go-A-In.","text":"Trước âm thanh ding, Go-A-In, người đã hoàn toàn mất kiểm soát, mở cửa và bước vào. Choi-Chang-Soo mỉm cười (mỉa mai) và nhìn Go-A-In.\n땡 소리에 맞춰, 통제력을 완전히 상실한 아인이 문을 벌컥 열고 들어오면 최상무가 미소 지으며(비아냥) 아인 바라본다.\nTo the sound of a ding, Go-A-In, who has completely lost control, opens the door and comes in. Choi-Chang-Soo smiles (sarcastically) and looks at Go-A-In.","sourceUid":"nar-mq12uiop-ost51l","sourceNo":"N227","viRanges":[],"koRanges":[]},{"id":568,"readerNo":569,"displayNo":"N228","n":"N228","kind":"narration","type":"dialogue","vi":"Kwon-Woo-Cheol: (Lịch sự quá mức)","ko":"권씨디:   (과하게 예의 차리며)","en":"Kwon-Woo-Cheol: (Excessively polite)","text he bag, tore it like crazy, and poured out the medicine with his dirty, dirty hands. He collapses onto the floor. Even the residents came out and just looked at me with surprised expressions.","sourceUid":"nar-mq1qpsh3-n2s5pp","sourceNo":"N262","viRanges":[],"koRanges":[]},{"id":636,"readerNo":637,"displayNo":491,"n":491,"kind":"sub","type":"merged","vi":"Ủa? Anh vẫn chưa tan làm sao?","ko":"[재훈] 어?\n전무님 아직 퇴근 안 하셨어요?","en":"You haven't gone home yet?","text":"Ủa? Anh vẫn chưa tan làm sao?\n[재훈] 어?\n전무님 아직 퇴근 안 하셨어요?\nYou haven't gone home yet?","sourceUid":"merged-mpuk8irb-15","sourceNo":491,"viRanges":[{"start":2520,"end":2522.565943}],"koRanges":[{"start":2520,"end":2523.577341}]},{"id":637,"readerNo":638,"displayNo":"492","n":"492","kind":"sub","type":"merged","vi":"Vì tôi biết một chuyện có thể anh sẽ quan tâm.","ko":"[전무] 대표님이 궁금해하실 이야기 같아서","en":"There's a story you might be interested in.","text":"Vì tôi biết một chuyện có thể anh sẽ quan tâm.\n[전무] 대표님이 궁금해하실 이야기 같아서\nThere's a story you might be interested in.","sourceUid":"merged-mpukaho0-16","sourceNo":492,"viRanges":[{"start":2522.565943,"end":2525.434475}],"koRanges":[{"start":2523.577341,"end":2526.064885}]},{"id":638,"readerNo":639,"displayNo":493,"n":493,"kind":"sub","type":"merged","vi":"Chuyện gì vậy?","ko":"아, 무슨?","en":"What is it about?","text":"Chuyện gì vậy?\n아, 무슨?\nWhat is it about?","sourceUid":"merged-mpukcrf4-17","sourceNo":493,"viRanges":[{"start":2525.434475,"end":2527.342906}],"koRanges":[{"start":2526.064885,"end":2527.393}]},{"id":639,"readerNo":640,"displayNo":"N263","n":"N263","kind":"narration","type":"dialogue","vi":"Go-A-In: (lẩm bẩm)","ko":"아인:   (웅얼웅얼)","en":"Go-A-In: (mumbling)","text":"Go-A-In: (lẩm bẩm)\n아인:   (웅얼웅얼)\nGo-A-In: (mumbling)","sourceUid":"nar-mq1qqlwc-ar9v6x","sourceNo":"N263","viRanges":[],"koRanges":[]},{"id":640,"readerNo":641,"displayNo":494,"n":494,"kind":"sub","type":"merged","vi":"Là chuyện về Giám đốc Go A In.","ko":"고아인 상무 이야기인데","en":"It's about Dire sb8wn","sourceNo":"N294","viRanges":[],"koRanges":[]},{"id":679,"readerNo":680,"displayNo":"N295","n":"N295","kind":"narration","type":"narration","vi":"Khi tôi bật vòi hoa sen, nước dính vào bàn tay bị đứt của tôi và gây rát. Tuy nhiên, thay vì trốn tránh nỗi đau, có vẻ như anh ấy đang cố gắng cảm nhận nó một cách sống động. Tôi đặt bàn tay bị đứt của mình vào dòng nước Song-A-Ji đang trút xuống. Go-A-In nhăn mặt vì đau.","ko":"샤워기를 틀자, 베인 손에 물이 묻어서 따끔하고. 허나 고통을 피하지 않고 오히려 생생하게 느끼려는 듯. 쏟 아지는 물줄기에 베인 손을 댄다. 고통 때문에 얼굴을 찡그 리는 아인.","en":"When I turned on the shower, the water got on my cut hand and it stung. However, rather than avoiding the pain, it seems like he is trying to feel it vividly. I put my cut hand in the pouring Song-A-Ji (Eun-jeong’s son) stream of water. Go-A-In grimaces in pain.","text":"Khi tôi bật vòi hoa sen, nước dính vào bàn tay bị đứt của tôi và gây rát. Tuy nhiên, thay vì trốn tránh nỗi đau, có vẻ như anh ấy đang cố gắng cảm nhận nó một cách sống động. Tôi đặt bàn tay bị đứt của mình vào dòng nước Song-A-Ji đang trút xuống. Go-A-In nhăn mặt vì đau.\n샤워기를 틀자, 베인 손에 물이 묻어서 따끔하고. 허나 고통을 피하지 않고 오히려 생생하게 느끼려는 듯. 쏟 아지는 물줄기에 베인 손을 댄다. 고통 때문에 얼굴을 찡그 리는 아인.\nWhen I turned on the shower, the water got on my cut hand and it stung. However, rather than avoiding the pain, it seems like he is trying to feel it vividly. I put my cut hand in the pouring Song-A-Ji (Eun-jeong’s son) stream of water. Go-A-In grimaces in pain.","sourceUid":"nar-mq1s0eqj-5akp57","sourceNo":"N295","viRanges":[],"koRanges":[]},{"id":680,"readerNo":681,"displayNo":"N296","n":"N296","kind":"narration","type":"narration","vi":"Dòng máu đỏ chảy xuống bồn tắm trắng. Giống như tự hành hạ bản thân vậy. Như thể anh muốn cảm thấy đau đớn hơn. Go-A-In siết chặt bàn tay cay đắng của mình.","ko":"하얀 욕조 위로 빨간 피가 흘러 내려가고. 자학하듯. 고통을 더 느끼라는 듯. 쓰라린 손을 꽉 움켜쥐는 아인.","en":"Red blood flows down onto the white bathtub. Like self-torture. It's as if he wants to feel more pain. Go-A-In clenching his bitter hands.","text":"Dòng máu đỏ chảy xuống bồn tắm trắng. Giống như tự hành hạ bản thân vậy. Như thể anh muốn cảm thấy đau đớn hơn. Go-A-In siết chặt bàn tay cay đắng của mình.\n하얀 욕조 위로 빨간 피가 흘러 내려가고. 자학하듯. 고통을 더 느끼라는 듯. 쓰라린 손을 꽉 움켜쥐는 아인.\nRed blood flows down onto the white bathtub. Like self-torture. It's as if he wants to feel more pain. Go-A-In clenching his bitter hands.","sourceUid":"nar-mq1s0fw1-dvib3u","sourceNo":"N296","viRanges":[],"koRanges":[]},{"id":681,"readerNo":682,"displayNo":"N297","n":"N297","kind":"narration","type":"narration","vi":"CẮT ĐẾN","ko":"","en":"CUT TO CUT TO","text":"CẮT ĐẾN\nCUT TO CUT TO","sourceUid":"nar-mq1s0gxc-gfgs6q","sourceNo":"N297","viRanges":[],"koRanges":[]},{"id":682,"readerNo":683,"displayNo":"N298","n":"N298","kind":"narration","type":"narration","vi":"Go-A-In với bàn tay được băng bó. Tôi ra khỏi phòng ngủ để đi làm như thường lệ.","ko":"손에 붕대를 감은 아인. 평소와 똑같은 모습으로 출근하려고 안방에서 나오고.","en":"Go-A-In with bandaged hand. I came out of my bedroom to go to work as usual.","text":"Go-A-In với bàn tay được băng bó. Tôi ra khỏi phòng ngủ để đi làm như thường lệ.\n손에 붕대를 감은 아인. 평소와 똑같은 모습으로 출근하려고 안방에서 나오고.\nGo-A-In with bandaged hand. I came out of my bedroom to go to work as usual.","sourceUid":"nar-mq1s0iex-jx5bl2","sourceNo":"N298","viRanges":[],"koRanges":[]},{"id":683,"readerNo":684,"displayNo":"N299","n":"N299","kind":"narration","type":"narration","vi":"Khi tôi mở cửa trước để ra khỏi nhà, tôi cảm thấy hoảng sợ.","ko":"집 밖으로 나가려고 현관문을 잡는데, 공황이 온다.","en":"As I open the front door to get out of the house, I feel panic.","text":"Khi tôi mở cửa trước để ra khỏi nhà, tôi cảm thấy hoảng sợ.\n집 밖으로 나가려고 현관문을 잡는데, 공황이 온다.\nAs I open the front door to get out of the house, I feel panic.","sourceUid":"nar-mq1s0kb2-tid84w","sourceNo":"N299","viRanges":[],"koRanges":[]},{"id":684,"readerNo":685,"displayNo":"N300","n":"N300","kind":"narration","type":"narration","vi":"Tôi ngồi đó một lúc và hít một hơi thật sâu.","ko":"잠시 제자리에 앉아서 숨을 가쁘게 몰아쉬다 No":762,"viRanges":[],"koRanges":[]},{"id":941,"readerNo":942,"displayNo":763,"n":763,"kind":"sub","type":"merged","vi":"Anh triệu tập họp ban giám đốc đi. Cô tự đào hố chôn mình như vậy\nthì tôi lại càng mừng.","ko":"소집해 주세요, 임원 회의 [창수] 알아서 자빠져 주면\n나야 땡큐지","en":"Arrange a board meeting. I'm all for you digging your own grave.","text":"Anh triệu tập họp ban giám đốc đi. Cô tự đào hố chôn mình như vậy\nthì tôi lại càng mừng.\n소집해 주세요, 임원 회의 [창수] 알아서 자빠져 주면\n나야 땡큐지\nArrange a board meeting. I'm all for you digging your own grave.","sourceUid":"merged-mpvc268f-32","sourceNo":763,"viRanges":[],"koRanges":[]},{"id":942,"readerNo":943,"displayNo":765,"n":765,"kind":"sub","type":"merged","vi":"Tôi chấp thuận… bằng quyền của tổng giám đốc.","ko":"[문호] 승인합니다 대표 권한으로","en":"I approve… as the CEO.","text":"Tôi chấp thuận… bằng quyền của tổng giám đốc.\n[문호] 승인합니다 대표 권한으로\nI approve… as the CEO.","sourceUid":"merged-mpvc34qc-33","sourceNo":765,"viRanges":[{"start":3950,"end":3960.047166}],"koRanges":[{"start":3950,"end":3967.803}]},{"id":943,"readerNo":944,"displayNo":"N409","n":"N409","kind":"narration","type":"narration","vi":"Kết thúc phần 2","ko":"2부 끝","en":"End of Part 2","text":"Kết thúc phần 2\n2부 끝\nEnd of Part 2","sourceUid":"nar-mq2hc0jd-o4995g","sourceNo":"N409","viRanges":[],"koRanges":[]},{"id":944,"readerNo":945,"displayNo":767,"n":767,"kind":"sub","type":"merged","vi":"Biên dịch: Bùi Khánh Nhi","ko":"자막: 최인정","en":"Subtitle translation by: Jea-Heon Chung","text":"Biên dịch: Bùi Khánh Nhi\n자막: 최인정\nSubtitle translation by: Jea-Heon Chung","sourceUid":"merged-mpvc3atc-34","sourceNo":767,"viRanges":[],"koRanges":[]}]};let idx=0,stop=false,viUrl='',koUrl='';const engine=()=>document.getElementById('engine');function pathFor(k){const folder=project.audioFolder||'audio';const file=k==='vi'?project.viAudioFile:project.koAudioFile;return './'+folder.replace(/^\.\//,'').replace(/\/$/,'')+'/'+file}function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');document.getElementById('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);document.getElementById('audioInfo').textContent='Loaded local '+k+': '+f.name}function toggleAudio(){document.getElementById('audioPanel').style.display=document.getElementById('audioPanel').style.display==='block'?'none':'block'}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function render(){const q=(document.getElementById('q').value||'').toLowerCase();let h='';project.blocks.forEach((b,i)=>{const hay=[b.vi,b.ko,b.en,b.text,b.displayNo].join(' ').toLowerCase();if(q&&!hay.includes(q))return;h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()"><div class="meta"><span>'+(b.kind==='narration'?'Narration':'Cue #'+(b.displayNo||i+1))+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div><div class="txt">'+esc(b.vi||'')+(b.ko?'\n<span class="ko">'+esc(b.ko)+'</span>':'')+(b.en?'\n'+esc(b.en):'')+'</div><div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';speakCurrent()">Read</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO</button></div></div>'});document.getElementById('list').innerHTML=h}function cur(){return project.blocks[idx]}function prev(){idx=Math.max(0,idx-1);render();scrollActive()}function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center'})}function unlockAudio(){const a=engine();a.src=viUrl||pathFor('vi');a.play().then(()=>{a.pause();a.currentTime=0}).catch(()=>{});document.getElementById('audioInfo').textContent+=' | unlocked'}function stopAll(){stop=true;engine().pause();speechSynthesis.cancel()}function playRange(src,r){return new Promise(res=>{if(!src||!r){res();return}const a=engine();stop=false;if(a.src!==new URL(src,location.href).href)a.src=src;a.currentTime=Math.max(0,r.start||0);const end=Math.max(r.end||0,(r.start||0)+.2);function t(){if(stop||a.currentTime>=end){a.pause();a.removeEventListener('timeupdate',t);res()}}a.addEventListener('timeupdate',t);a.play().catch(e=>{document.getElementById('audioInfo').textContent='Không phát được: '+e.message+' | '+src;a.removeEventListener('timeupdate',t);res()})})}async function playCurrent(k){const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;if(!ranges||!ranges.length){speakCurrent();return}for(const r of ranges){await playRange(src,r);if(stop)break}}function speakKoCurrent(){const b=cur();const text=b.ko||'';if(!text)return;try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.slice(0,800));u.lang='ko-KR';u.rate=.92;const voices=speechSynthesis.getVoices();const voice=voices.find(v=>/ko|korean|한국/i.test((v.lang||'')+' '+(v.name||'')));if(voice)u.voice=voice;speechSynthesis.speak(u)}catch(e){}}function speakCurrent(){speakKoCurrent()}async function smart(){stop=false;const mode=document.getElementById('mode').value;for(;idx<project.blocks.length;idx++){render();scrollActive();const b=cur();if(b.kind==='narration'||mode==='read'){speakCurrent();await new Promise(r=>setTimeout(r,Math.min(4500,1000+([b.vi,b.ko,b.en].join(' ').length*25))));}else{if(mode.includes('vi'))await playCurrent('vi');if(stop)break;if(mode.includes('ko'))await playCurrent('ko')}if(stop)break}}loadPaths();render();</script></body></html>
