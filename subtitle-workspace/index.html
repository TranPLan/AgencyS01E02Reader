":447,"type":"narration","text":"Quản lý Kwon, anh ra ngoài đi. Cô cứ nói đi.\n권 CD, 자리 좀 비켜 줘 [창수] 말해\nJust speak.","sourceUid":"merged-mpty3onq-32","sourceNo":447},{"id":396,"readerNo":397,"displayNo":503,"n":503,"type":"narration","text":"[거친 숨소리]","sourceUid":"ko-mpphrnrw-1279","sourceNo":503},{"id":397,"readerNo":398,"displayNo":448,"n":448,"type":"narration","text":"Tôi biết đó là chuyện công việc. Tôi sẽ lắng nghe thật cẩn thận,\nthưa Giám đốc.\n회사에서 할 말이라 봤자\n일 얘긴데 [우철] 경청하겠습니다, 상무님\nI'm sure it's about work. I'll listen carefully,\nManaging Director Go.","sourceUid":"merged-mpty4k57-33","sourceNo":448},{"id":398,"readerNo":399,"displayNo":450,"n":450,"type":"narration","text":"Là thật sao? Chuyện gì?\n사실입니까? 뭐가?\nIs it true? What is?","sourceUid":"merged-mpty5rq1-34","sourceNo":450},{"id":399,"readerNo":400,"displayNo":508,"n":508,"type":"narration","text":"[어두운 음악]","sourceUid":"ko-mpphrnrw-1284","sourceNo":508},{"id":400,"readerNo":401,"displayNo":452,"n":452,"type":"narration","text":"Tôi hỏi có thật không?\n[떨리는 숨소리] 사실이냐고요\nIs it true?","sourceUid":"merged-mpty7ke3-35","sourceNo":452},{"id":401,"readerNo":402,"displayNo":453,"n":453,"type":"narration","text":"Cô phải nói cho tôi hiểu chứ.\n말을 똑 부러지게 해야 알지\nGet straight to the point.","sourceUid":"merged-mpty8asz-36","sourceNo":453},{"id":402,"readerNo":403,"displayNo":454,"n":454,"type":"narration","text":"Hóa ra cũng có lúc\nGiám đốc Go nói chuyện vòng vo nhỉ.\n우리 고 상무가 말을\n둥글둥글하게 할 때도 있네?\nI never knew you could\nbeat around the bush.","sourceUid":"merged-mpty8vrj-37","sourceNo":454},{"id":403,"readerNo":404,"displayNo":512,"n":512,"type":"narration","text":"[피식 웃는다]","sourceUid":"ko-mpphrnrw-1288","sourceNo":512},{"id":404,"readerNo":405,"displayNo":515,"n":515,"type":"narration","text":"[새어 나오는 웃음]","sourceUid":"ko-mpphrnrw-1291","sourceNo":515},{"id":405,"readerNo":406,"displayNo":455,"n":455,"type":"narration","text":"Khi bị kích động,\ncon người rất dễ mắc sai lầm.\n[창수] 사람은 흥분하면 실수해\nWhen people get worked up,\nthey make mistakes.","sourceUid":"merged-mpty9zne-38","sourceNo":455},{"id":406,"readerNo":407,"displayNo":456,"n":456,"type":"narration","text":"Khi nào cô bình tĩnh lại,\nchúng ta sẽ nói chuyện sau.\n흥분 가라앉으면\n그때 다시 얘기하자\nLet's talk again\nwhen you have calmed down.","sourceUid":"merged-mptyb10q-39","sourceNo":456},{"id":407,"readerNo":408,"displayNo":518,"n":518,"type":"narration","text":"[어이없는 숨소리]","sourceUid":"ko-mpphrnrw-1294","sourceNo":518},{"id":408,"readerNo":409,"displayNo":457,"n":457,"type":"narration","text":"Mà chắc… sau một năm nữa,\ncô sẽ điềm tĩnh lại thôi, nhỉ?\n씁, 한… 1년쯤 지나면\n좀 차분해지지 않겠어?\nMaybe… in about a year, you'll have calmed down.","sourceUid":"merged-mptyboez-40","sourceNo":457},{"id":409,"readerNo":410,"displayNo":459,"n":459,"type":"narration","text":"Một năm nghe có vẻ hợp lý đấy.\n1년이면은 딱 좋죠\nA year sounds perfect.","sourceUid":"merged-mptydvyj-41","sourceNo":459},{"id":410,"readerNo":411,"displayNo":460,"n":460,"type":"narration","text":"Anh nghĩ anh đã thắng tôi sao?\n이겼다고 생각하세요?\nYou think you've won?","sourceUid":"merged-mptyeds7-42","sourceNo":460},{"id":411,"readerNo":412,"displayNo":461,"n":461,"type":"narration","text":"Không có.\n아니?\nNo.","sourceUid":"merged-mptyevb2-43","sourceNo":461},{"id":412,"readerNo":413,"displayNo":462,"n":462,"type":"narration","text":"Tôi đã bao giờ đối đầu với cô đâu. Cô mới là người ảo tưởng rằng cô đang đối đầu với tôi.\n내가 언제 고 상무랑 싸웠나? 고 상무 혼자\n상상 속의 나하고 싸웠지\nI never competed with you. You're the one who competed with me in your imagination.","sourceUid":"merged-mptyfgok-44","sourceNo":462},{"id":413,"readerNo":414,"displayNo":526,"n":526,"type":"narration","text":"[웃음] [헛웃음] [한숨]","sourceUid":"merged-mptygguo-45","sourceNo":526},{"id":414,"readerNo":415,"displayNo":465,"n":465,"type":"narration","text":"Cô đã lên chức như ước nguyện rồi.\nCô còn muốn gì nữa?\n[창수] 꿈에 그리던\n임원 해 봤으면 됐지, 뭘 더 바라\nIt was your dream to become an executive.\nWhat more do you want?","sourceUid":"merged-mptygqrb-46","sourceNo":465},{"id":415,"readerNo":416,"displayNo":529,"n":529,"type":"narration","text":"[한숨]","sourceUid":"ko-mpphrnrx-1305","sourceNo":529},{"id":416,"readerNo":417,"displayNo":466,"n":466,"type":"narration","text":"Chính cô cũng biết cô không đủ điều kiện mà.\n사실 임원 될 스펙 아닌 거\n본인이 더 잘 알잖아\nYou must know you aren't qualified to be one.","sourceUid":"merged-mptyigs0-47","sourceNo":466},{"id":417,"readerNo":418,"displayNo":468,"n":468,"type":"narration","text":"Sao cô lại tham lam quá vậy?\n왜 이렇게 욕심이 많아! 쯧\nWhy are you so greedy?","sourceUid":"merged-mptyj45j-48","sourceNo":468},{"id":418,"readerNo":419,"displayNo":469,"n":469,"type":"narration","text":"Đừng cố bắt kịp những người khác.\n남들 따라가려고 하지 마\nDon't try to keep up with others.","sourceUid":"merged-mptyjnje-49","sourceNo":469},{"id":419,"readerNo":420,"displayNo":533,"n":533,"type":"narration","text":"[어이없는 숨소리]","sourceUid":"ko-mpphrnrx-1309","sourceNo":533},{"id":420,"readerNo":421,"displayNo":470,"n":470,"type":"narration","text":"Cẩn thận khéo lại tự đào hố chôn mình.\n그러다 가랑이 찢어져\nYou might end up digging your own grave.","sourceUid":"merged-mptykbur-50","sourceNo":470},{"id":421,"readerNo":422,"displayNo":537,"n":537,"type":"narration","text":"[분한 숨소리]","sourceUid":"ko-mpphrnrx-1313","sourceNo":537},{"id":422,"readerNo":423,"displayNo":471,"n":471,"type":"narration","text":"Rất mong được cô giúp đỡ\ntrong một năm tới.\n[우철] 앞으로 1년간\n잘 부탁드립니다\nI look forward\nto working with you for a year.","sourceUid":"merged-mptym1e5-51","sourceNo":471},{"id":423,"readerNo":424,"displayNo":472,"n":472,"type":"narration","text":"Tôi sẽ tiến hành thật tốt dự án viễn thông\nvới ý tưởng cô giao phó.\n통신사 광고는\n상무님이 주신 아이디어로 제가 확실하게 진행하겠습니다\nI'll wrap up the telecom project\nwith the idea you gave me, ma'am.","sourceUid":"merged-mptyn46j-52","sourceNo":472},{"id":424,"readerNo":425,"displayNo":478,"n":478,"type":"narration","text":"XÃ HỘI\n[헛웃음] - [고조되는 음악]\n- [거친 숨소리] [떨리는 숨소리] [문 여닫히는 소리] [가쁜 숨소리] [거친 숨을 내쉰다] [긴장되는 음악] [문 닫히는 소리] [자동차 경적] [거친 숨소리] [자동차 경적] - [자동차 경적]\n- [타이어 마찰음]","sourceUid":"merged-mptyoa3f-53","sourceNo":478},{"id":425,"readerNo":426,"displayNo":473,"n":473,"type":"narration","text":"Biển số 1008. Dừng xe. Biển số 1008.\n[경찰] 1008 차량, 세우세요 앞에 1008…\nPlate number 1008, stop. Plate number 1008.","sourceUid":"merged-mptypb58-55","sourceNo":473},{"id":426,"readerNo":427,"displayNo":553,"n":553,"type":"narration","text":"[사이렌 소리] [버튼 조작음] [거친 숨소리]","sourceUid":"merged-mptyq2sy-56","sourceNo":553},{"id":427,"readerNo":428,"displayNo":475,"n":475,"type":"narration","text":"Thế giới tốt đẹp thật.\nMình phải sống thật lâu mới được.\n[아인] 좋은 세상 오래오래 살아야지\nIt's a good world. I should live long.","sourceUid":"merged-mptyq9un-57","sourceNo":475},{"id":428,"readerNo":429,"displayNo":559,"n":559,"type":"narration","text":"[무거운 음악] [탁 닫는 소리] [사이렌 소리]","sourceUid":"merged-mpuh826n-1","sourceNo":559},{"id":429,"readerNo":430,"displayNo":476,"n":476,"type":"narration","text":"Xe của cô mang biển số 1008, phải không? Chúng tôi đi theo cô vì cô vượt đèn đỏ.\n[경찰] 1008 차주시죠? 신호 위반으로 도주하셔서\n따라온 거예요\nYour car's plate number is 1008, right? You fled after running a red light.","sourceUid":"merged-mpuh94tn-3","sourceNo":476},{"id":430,"readerNo":431,"displayNo":478,"n":478,"type":"narration","text":"Cô ơi. Thưa cô. Cô đang tìm gì à?\n선생님, 선생님 뭐 찾으세요?\nExcuse me. Are you looking for something?","sourceUid":"merged-mpuhboxe-4","sourceNo":478},{"id":431,"readerNo":432,"displayNo":480,"n":480,"type":"narration","text":"Đâu mất rồi? Đâu rồi?\n[아인이 울며] 어디 있어\n어디 있어, 어디 있어 어디 있어, 어디…\nWhere is it? Where is it?","sourceUid":"merged-mpuhchnr-5","sourceNo":480},{"id":432,"readerNo":433,"displayNo":482,"n":482,"type":"narration","text":"Cô không sao chứ? Tôi gọi cấp cứu nhé?\n[경찰] 괜찮으세요? 119 부를까요?\nAre you okay? Should I call 911?","sourceUid":"merged-mpuhhqiy-6","sourceNo":482},{"id":433,"readerNo":434,"displayNo":568,"n":568,"type":"narration","text":"[거친 숨소리] [쉭 소리] [무거운 음악]","sourceUid":"merged-mpujya66-7","sourceNo":568},{"id":434,"readerNo":435,"displayNo":483,"n":483,"type":"narration","text":"Mẹ, mẹ sẽ không chạy trốn\nvà bỏ rơi con đâu đúng không?\n[어린 아인] 엄마, 나 버리고\n도망가는 거 아니지?\nMom. You're not running away\nand abandoning me, are you?","sourceUid":"merged-mpujygo6-8","sourceNo":483},{"id":435,"readerNo":436,"displayNo":484,"n":484,"type":"narration","text":"Mẹ nó đã khiến anh tôi phải chết. Giờ nó làm con tôi buồn.\n[아인 고모] 지 어미는\n우리 오빠를 잡아먹더니 딸년은 내 딸 기를 죽이네\nHer mother led my brother to his demise. Now she's bringing my daughter down.","sourceUid":"merged-mpuk15sj-9","sourceNo":484},{"id":436,"readerNo":437,"displayNo":486,"n":486,"type":"narration","text":"QUỐC NGỮ, 100 ĐIỂM\nTOÁN, 100 ĐIỂM\nLANGUAGE ARTS, 100\nMATH, 100","sourceUid":"merged-mpuk2cja-10","sourceNo":486},{"id":437,"readerNo":438,"displayNo":487,"n":487,"type":"narration","text":"Mình sẽ không bỏ trốn.\n난 도망치지 않아\nI won't run away.","sourceUid":"merged-mpuk2hzw-11","sourceNo":487},{"id":438,"readerNo":439,"displayNo":576,"n":576,"type":"narration","text":"[하늘이 우르릉 울린다] [거친 숨소리] [달그락 챙기는 소리]","sourceUid":"merged-mpuk3syn-12","sourceNo":576},{"id":439,"readerNo":440,"displayNo":488,"n":488,"type":"narration","text":"Mình sẽ không bỏ trốn. Mình sẽ không bỏ trốn. Không bỏ trốn.\n나는 도망치지 않아 나는 안 도망쳐 안 도망쳐\nI won't run away. I won't run away. I won't.","sourceUid":"merged-mpuk4bh7-13","sourceNo":488},{"id":440,"readerNo":441,"displayNo":582,"n":582,"type":"narration","text":"[빗소리] [차분한 음악] [사이렌 소리]","sourceUid":"merged-mpuk89ax-14","sourceNo":582},{"id":441,"readerNo":442,"displayNo":491,"n":491,"type":"narration","text":"Ủa? Anh vẫn chưa tan làm sao?\n[재훈] 어?\n전무님 아직 퇴근 안 하셨어요?\nYou haven't gone home yet?","sourceUid":"merged-mpuk8irb-15","sourceNo":491},{"id":442,"readerNo":443,"displayNo":492,"n":492,"type":"narration","text":"Vì tôi biết một chuyện\ncó thể anh sẽ quan tâm.\n[전무] 대표님이\n궁금해하실 이야기 같아서\nThere's a story\nyou might be interested in.","sourceUid":"merged-mpukaho0-16","sourceNo":492},{"id":443,"readerNo":444,"displayNo":493,"n":493,"type":"narration","text":"Chuyện gì vậy?\n아, 무슨?\nWhat is it about?","sourceUid":"merged-mpukcrf4-17","sourceNo":493},{"id":444,"readerNo":445,"displayNo":494,"n":494,"type":"narration","text":"Là chuyện về Giám đốc Go A In.\n고아인 상무 이야기인데\nIt's about Director Go.","sourceUid":"merged-mpukd9cu-18","sourceNo":494},{"id":445,"readerNo":446,"displayNo":495,"n":495,"type":"narration","text":"GIÁM ĐỐC GO A IN TÔI NGHE NÓI CÔ GẶP CHUYỆN KHÔNG VUI… THÔNG BÁO THANH TOÁN TIỀN PHẠT\n(TÀI XẾ)\n[빗소리] [한숨] [어두운 음악]\nMANAGING DIRECTOR GO A-IN I HEARD ABOUT THE BAD… PENALTY PAYMENT NOTICE (DRIVER)","sourceUid":"merged-mpukdzap-19","sourceNo":495},{"id":446,"readerNo":447,"displayNo":498,"n":498,"type":"dialogue","text":"Tôi đã tích cực tiến cử cô đấy.00:43:12,277\n[창수] 내가 적극 추천했어\nI put in a good word for you.","sourceUid":"merged-mpuke8mj-20","sourceNo":498},{"id":447,"readerNo":448,"displayNo":499,"n":499,"type":"narration","text":"Tôi rất trông đợi vào cô.\n[창수] 기대가 커\nI expect a lot from you.","sourceUid":"merged-mpuki9a3-21","sourceNo":499},{"id":448,"readerNo":449,"displayNo":500,"n":500,"type":"narration","text":"Hy vọng cô sẽ phát triển lớn mạnh.\n길 한번 제대로 터 보라고\nI look forward to seeing you grow.","sourceUid":"merged-mpukl1tf-22","sourceNo":500},{"id":449,"readerNo":450,"displayNo":501,"n":501,"type":"narration","text":"Cô có vẻ ngây thơ hơn tôi tưởng.\n[태완] 고아인 상무님\n생각보단 순수하시네요\nYou're more naive than I thought.","sourceUid":"merged-mpukm49w-23","sourceNo":501},{"id":450,"readerNo":451,"displayNo":596,"n":596,"type":"narration","text":"[한숨]","sourceUid":"ko-mpphrnrx-1372","sourceNo":596},{"id":451,"readerNo":452,"displayNo":502,"n":502,"type":"narration","text":"Đúng một năm. Đó là nhiệm kỳ của cô. Cô cứ tiếp nhận hết đi. Cô cứ tiếp nhận hết đi. Tôi rất trông đợi vào cô. Tôi rất trông đợi vào cô.\n딱 1년 [태완] 그게 고 상무님 임기니까 다 받아들이세요 다 받아들이세요 기대가 큽니다 기대가 큽니다\nOne year. That's your term. Accept your duty. Accept your duty. We're expecting a lot from you. We're expecting a lot from you.","sourceUid":"merged-mpuknhv4-24","sourceNo":502},{"id":452,"readerNo":453,"displayNo":508,"n":508,"type":"narration","text":"Đừng cố bắt kịp những người khác. Cẩn thận khéo lại tự đào hố chôn mình.\n남들 따라가려고 하지 마 [창수] 그러다 가랑이 찢어져\nDon't try to keep up with others. You might end up digging your own grave.","sourceUid":"merged-mpukqne7-25","sourceNo":508},{"id":453,"readerNo":454,"displayNo":606,"n":606,"type":"narration","text":"[차분한 음악] [어두운 음악] [아인의 떨리는 숨소리]","sourceUid":"merged-mpuksg58-26","sourceNo":606},{"id":454,"readerNo":455,"displayNo":511,"n":511,"type":"narration","text":"Chắc tất cả đều mong mình sẽ chạy trốn.\n[아인] 다들 내가 도망치길 바라겠지?\nEveryone will expect me to run away.","sourceUid":"merged-mpuksml1-27","sourceNo":511},{"id":455,"readerNo":456,"displayNo":512,"n":512,"type":"narration","text":"Vậy sao? Hôm nay tôi không thích lắm.\n[직원1] 그래?\n아, 난 오늘은 영 별로였네\nReally? I didn't like it today.","sourceUid":"merged-mpulgd22-28","sourceNo":512},{"id":456,"readerNo":457,"displayNo":610,"n":610,"type":"narration","text":"[잔잔한 음악이 흘러나온다]","sourceUid":"ko-mpphrnrx-1386","sourceNo":610},{"id":457,"readerNo":458,"displayNo":513,"n":513,"type":"narration","text":"Thế à?\n- [직원2] 그래요?\n- [직원3] 난 거기 맛있던데\nReally?","sourceUid":"merged-mpulovd2-29","sourceNo":513},{"id":458,"readerNo":459,"displayNo":514,"n":514,"type":"narration","text":"Nhóm phó Han.\n[은정] 부장님\nMr. Han.","sourceUid":"merged-mpulqlel-30","sourceNo":514},{"id":459,"readerNo":460,"displayNo":515,"n":515,"type":"narration","text":"Nếu là chuyện riêng, thì bỏ qua.\nNếu là chuyện công ty, thì tôi muốn biết. Có chuyện gì vậy?\n개인사면 노 관심\n회사 일이면 예스 관심 무슨 일이에요?\nIf this is about work, I want to know. What's wrong?","sourceUid":"merged-mpuls07e-32","sourceNo":515},{"id":460,"readerNo":461,"displayNo":614,"n":614,"type":"narration","text":"[숨을 씁 들이켠다]","sourceUid":"ko-mpphrnrx-1390","sourceNo":614},{"id":461,"readerNo":462,"displayNo":517,"n":517,"type":"narration","text":"Nghe nói chỉ làm một năm. Nhìn là biết chỉ là bù nhìn rồi.\n[직원1] 1년짜리라며? [직원2] 얼굴마담으로\n승진시킨 거라던데?\nI heard she'll last a year. Apparently, she's just a figurehead.","sourceUid":"merged-mpultbrl-33","sourceNo":517},{"id":462,"readerNo":463,"displayNo":519,"n":519,"type":"narration","text":"Họ chỉ đang lợi dụng chị ta\nđể thể hiện hình ảnh bình đẳng giới. Bảo sao. - Tôi cứ tưởng Giám đốc Choi điên rồi.\n- Giám đốc Choi?\n'VC그룹은 이렇게 여성 친화적\n그룹입니다' 하고 이용하려고, 치 [직원3] 어쩐지\n최 상무님이 미쳤나 싶었는데\nThey're using her so that our company\ncan look like a gender-equal group. -I knew it. I thought Mr. Choi lost it.\n-Mr. Choi?","sourceUid":"merged-mpulvd9r-34","sourceNo":519},{"id":463,"readerNo":464,"displayNo":521,"n":521,"type":"narration","text":"- Thất vọng thật chứ.\n- Họ nói gì vậy? - Là sao?\n- Cứ nghĩ chỉ cần chăm chỉ làm việc, tôi cũng sẽ được làm nhân viên cấp cao,\nsống một đời thăng tiến.\n- [은정] 최 상무님?\n- [장우] 무슨… [직원3] 에이, 좋다 말았네 - [직원2] 뭐가?\n- [직원3] 나도 열심히 하면 임원도 되고\n쭉쭉 잘나갈 줄 알았지\n-What a bummer.\n-What are they saying? -What do you mean?\n-If I worked hard, I thought I could become an executive.","sourceUid":"merged-mpulzxek-37","sourceNo":521},{"id":464,"readerNo":465,"displayNo":524,"n":524,"type":"narration","text":"Cô còn lâu mới được vậy. Tại sao không?\n[직원1] 넌 안 돼 [직원3] 왜?\nYou can't. Why not?","sourceUid":"merged-mpum14g8-38","sourceNo":524},{"id":465,"readerNo":466,"displayNo":526,"n":526,"type":"narration","text":"Muốn làm bù nhìn\nlà phải có ngoại hình đấy. Ôi, thật là.\n[직원1이 웃으며] 얼굴마담은\n얼굴 보고 뽑는 거잖아 [직원3] 아, 진짜\nYou need to have good looks\nto be a figurehead. Seriously.","sourceUid":"merged-mpum2apo-39","sourceNo":526},{"id":466,"readerNo":467,"displayNo":528,"n":528,"type":"narration","text":"- Họ nói gì vậy?\n- Tôi nói sai à? - Tôi có thể mà.\n- Mơ đi.\n[은정] 무슨 소리야?\n-What are they saying?\n-Am I right? -I can do it.\n-No.","sourceUid":"merged-mpum3y25-40","sourceNo":528},{"id":467,"readerNo":468,"displayNo":630,"n":630,"type":"narration","text":"[직원들의 말소리]","sourceUid":"ko-mpphrnrx-1406","sourceNo":630},{"id":468,"readerNo":469,"displayNo":530,"n":530,"type":"narration","text":"Hai người vào sau nhé. Tôi đi trước đây.\n마시고 들어와, 먼저 갈게\nCome in later. I'll get going.","sourceUid":"merged-mpum5xsk-41","sourceNo":530},{"id":469,"readerNo":470,"displayNo":531,"n":531,"type":"narration","text":"Giám đốc có đây chứ? Vâng.\n상무님 계세요? 네\nIs Ms. Go in? Yes.","sourceUid":"merged-mpum7p88-43","sourceNo":531},{"id":470,"readerNo":471,"displayNo":634,"n":634,"type":"narration","text":"[노크 소리] [문 열리는 소리] [한숨] - [차분한 음악]\n- [한숨]","sourceUid":"merged-mpumai4k-44","sourceNo":634},{"id":471,"readerNo":472,"displayNo":533,"n":533,"type":"narration","text":"Anh nghe tin rồi à? Sao?\n[아인] 들었어? 왜\nSo you heard? What?","sourceUid":"merged-mpumaqia-45","sourceNo":533},{"id":472,"readerNo":473,"displayNo":535,"n":535,"type":"narration","text":"Anh có gì muốn nói với tôi à?\n너도 나한테 할 얘기 있어?\nYou also have something to say?","sourceUid":"merged-mpumcmoy-46","sourceNo":535},{"id":473,"readerNo":474,"displayNo":536,"n":536,"type":"narration","text":"Anh nghĩ mình đã chọn sai phe rồi sao?\n줄 잘못 섰다 싶어?\nAre you thinking you chose the wrong person to side with?","sourceUid":"merged-mpumevnl-47","sourceNo":536},{"id":474,"readerNo":475,"displayNo":537,"n":537,"type":"narration","text":"Anh đang hối hận chứ gì? \"Lẽ ra mình không nên theo phe Go A In.\"\n아차 싶지?\n'고아인 저거 썩은 줄이었네'\nRegretting it, aren't you? \"I shouldn't have sided with Go A-in.\"","sourceUid":"merged-mpumfygy-48","sourceNo":537},{"id":475,"readerNo":476,"displayNo":539,"n":539,"type":"narration","text":"Sao?\n왜?\nWhat?","sourceUid":"merged-mpumn14e-49","sourceNo":539},{"id":476,"readerNo":477,"displayNo":540,"n":540,"type":"narration","text":"Giờ anh muốn chạy sang\nvẫy đuôi với Giám đốc Choi à?\n지금이라도 최 상무 찾아가서\n무릎 꿇고 꼬리 흔들고 싶어?\nAre you going to side with Mr. Choi now?","sourceUid":"merged-mpumnjy9-50","sourceNo":540},{"id":477,"readerNo":478,"displayNo":541,"n":541,"type":"narration","text":"Cô băng bó gọn gàng đấy.\n붕대 잘 감으셨는데요\nGood job on the bandage.","sourceUid":"merged-mpumo6jq-51","sourceNo":541},{"id":478,"readerNo":479,"displayNo":542,"n":542,"type":"narration","text":"Không dễ tự sơ cứu vết thương đâu.\n[병수] 상처 스스로 치료하기 쉽지 않은데\nIt's not easy to treat your own wounds.","sourceUid":"merged-mpumpgds-52","sourceNo":542},{"id":479,"readerNo":480,"displayNo":544,"n":544,"type":"narration","text":"Cô làm tốt lắm.\n대단하신 거예요\nYou're amazing.","sourceUid":"merged-mpumqktn-53","sourceNo":544},{"id":480,"readerNo":481,"displayNo":545,"n":545,"type":"narration","text":"Cả việc cô đến công ty hôm nay chắc cũng không dễ dàng.\n오늘 회사 나오시는 거\n쉽지 않으셨죠?\nIt must've been difficult coming in to work today.","sourceUid":"merged-mpumr2z5-54","sourceNo":545},{"id":481,"readerNo":482,"displayNo":547,"n":547,"type":"narration","text":"Tôi sẽ đi gặp bọn họ.\n제가 한번 만나 보겠습니다\nI'll meet them.","sourceUid":"merged-mpumruwj-56","sourceNo":547},{"id":482,"readerNo":483,"displayNo":650,"n":650,"type":"narration","text":"[울컥하는 숨소리]","sourceUid":"ko-mpphrnrx-1426","sourceNo":650},{"id":483,"readerNo":484,"displayNo":548,"n":548,"type":"narration","text":"Việc gì cũng có chừng mực. Có những giới hạn… không được phép bước qua.\n정도가 있는 법이에요 선이라는 게 있는 거라고요\nThis is too much. There's a line… you shouldn't cross.","sourceUid":"merged-mpumvs70-60","sourceNo":548},{"id":484,"readerNo":485,"displayNo":551,"n":551,"type":"narration","text":"Đừng làm vậy.\n하지 마\nDon't.","sourceUid":"merged-mpumvdkk-59","sourceNo":551},{"id":485,"readerNo":486,"displayNo":552,"n":552,"type":"narration","text":"Tôi biết trong công ty, có người thắng thì sẽ có kẻ thua.\nKhông phải tôi không biết.\n[병수] 직장 생활이라는 게 이기는 사람 있으면\n지는 사람도 있는 거 압니다 저 그거 모르는 애 아닙니다\n그래도 이건\nIn a company, there are winners and losers.","sourceUid":"merged-mpumzzrc-62","sourceNo":552},{"id":486,"readerNo":487,"displayNo":554,"n":554,"type":"narration","text":"- Dù vậy, chuyện này…\n- Anh đừng làm vậy. Tôi sẽ đi gặp Giám đốc Choi… và vượt qua giới hạn.\n하지 마 [병수] 오늘 최 상무 만나서 저도 선 한번 넘어 볼게요\n-But still, this is--\n-Don't. I'll meet Director Choi… and cross a line today.","sourceUid":"merged-mpurv0cd-2","sourceNo":554},{"id":487,"readerNo":488,"displayNo":557,"n":557,"type":"narration","text":"Tôi đã nói là đừng!\n하지 말라고\nI said don't!","sourceUid":"merged-mpurw5nr-3","sourceNo":557},{"id":488,"readerNo":489,"displayNo":558,"n":558,"type":"narration","text":"Giờ anh mà ra mặt, tôi sẽ càng thêm thảm hại.\n[아인] 네가 여기서 나서면 내 꼴만 더 우스워져, 몰라?\nIf you do, I'll look like a fool.","sourceUid":"merged-mpurx6id-4","sourceNo":558},{"id":489,"readerNo":490,"displayNo":560,"n":560,"type":"narration","text":"Trời mưa thì phải chịu ướt thôi. Anh ra ngoài đi.\n비 올 땐 비 맞아야지 나가 있어\nWhen it rains, it's only right to get soaked. You may leave.","sourceUid":"merged-mpurygnb-5","sourceNo":560},{"id":490,"readerNo":491,"displayNo":664,"n":664,"type":"narration","text":"[아인의 한숨]","sourceUid":"ko-mpphrnrx-1440","sourceNo":664},{"id":491,"readerNo":492,"displayNo":562,"n":562,"type":"narration","text":"NHÀ CỦA DÌ\nAUNTIE'S PLACE","sourceUid":"merged-mpurzg1x-6","sourceNo":562},{"id":492,"readerNo":493,"displayNo":667,"n":667,"type":"narration","text":"[한숨] [고양이 울음] [졸졸 따르는 소리]","sourceUid":"merged-mpurzl3n-7","sourceNo":667},{"id":493,"readerNo":494,"displayNo":563,"n":563,"type":"narration","text":"Giờ cô còn ăn nổi cái đó à? Ngon mà.\n[정석] 넌 지금 그게 입에 들어가? 맛있네요\nDo you even have the appetite? It's delicious.","sourceUid":"merged-mpurzwmb-8","sourceNo":563},{"id":494,"readerNo":495,"displayNo":565,"n":565,"type":"narration","text":"Lẽ ra cô nên ăn bít tết, uống vang\nrồi tỉnh táo lại đi chứ.\n[정석] 와인에 한우 먹으면서\n기운 차려도 부족할 판에\nYou should be getting back on your feet with some wine and beef.","sourceUid":"merged-mpus7qt2-9","sourceNo":565},{"id":495,"readerNo":496,"displayNo":566,"n":566,"type":"narration","text":"Nhưng giờ món này lại hợp miệng tôi hơn.\n지금 나한텐 이게 맞으니까요\nBut this food suits me right now.","sourceUid":"merged-mpusy3wl-10","sourceNo":566},{"id":496,"readerNo":497,"displayNo":567,"n":567,"type":"narration","text":"Hợp chỗ nào chứ?\n[정석] 아, 맞기는 뭐가 맞아\nWhat do you mean?","sourceUid":"merged-mpusz3j6-11","sourceNo":567},{"id":497,"readerNo":498,"displayNo":568,"n":568,"type":"narration","text":"Hạn mức thẻ của giám đốc\nchắc chắn sẽ rất lớn. Lương cũng cao hơn nhiều.\n제작 본부장이면\n법인 카드 한도 빵빵하고 연봉은 더 빵빵한데\nYou can splurge on the company card. You even get paid more.","sourceUid":"merged-mput07kg-12","sourceNo":568},{"id":498,"readerNo":499,"displayNo":570,"n":570,"type":"narration","text":"Vì tôi cứ hay quên mất.\n- [무거운 음악]\n- 자꾸 잊으니까요\nBut I keep forgetting.","sourceUid":"merged-mput0rdv-13","sourceNo":570},{"id":499,"readerNo":500,"displayNo":677,"n":677,"type":"narration","text":"[한숨]","sourceUid":"ko-mpphrnrx-1453","sourceNo":677},{"id":500,"readerNo":501,"displayNo":571,"n":571,"type":"narration","text":"Who I am…","sourceUid":"en-mpphrrqf-2243","sourceNo":571},{"id":501,"readerNo":502,"displayNo":572,"n":572,"type":"narration","text":"Việc tôi là ai… và tôi đến từ đâu.\n내가 누군지 내 베이스가 어딘지\nand where I'm from.","sourceUid":"merged-mput2aai-14","sourceNo":572},{"id":502,"readerNo":503,"displayNo":573,"n":573,"type":"narration","text":"Cũng tốt. Cô cứ quên đi. Quên hết đi và đừng đấu với Giám đốc Choi.\n그래, 잊어라 잊고 최 상무랑 싸우지 마\nFine. You should forget it. Get over it and don't fight Director Choi.","sourceUid":"merged-mput4pw1-16","sourceNo":573},{"id":503,"readerNo":504,"displayNo":576,"n":576,"type":"narration","text":"Từ đó đến giờ, cô vẫn luôn là người có năng lực và địa vị cao nhất\ntrong số hậu bối của tôi.\n[정석] 지금도, 인마\n네가 내 후배 중에는 실력도 위치도 최고야\nEven now, you are the most competent with the highest position\nout of all my juniors.","sourceUid":"merged-mput67sn-17","sourceNo":576},{"id":504,"readerNo":505,"displayNo":579,"n":579,"type":"narration","text":"Giảng viên đại học\nhay tổng giám đốc công ty nhỏ có tệ đâu? Cứ làm giám đốc sáng tạo một năm đi. Cỡ đó cũng là thành công rồi mà.\n대학교수나 작은 대행사\n대표 자리가 나쁜 자리도 아니고 그냥 1년만 제작 본부장 해 그 정도도 충분히 성공한 거잖아\nA university professor\nor an agency CEO isn't such a bad job. Just stay as an executive for a year. That's successful enough.","sourceUid":"merged-mput9881-20","sourceNo":579},{"id":505,"readerNo":506,"displayNo":582,"n":582,"type":"narration","text":"Cỡ đó? Vì tôi học trường tỉnh và vì nhà tôi nghèo?\n그 정도라? 지방대에 흙수저 출신이니까?\nEnough? Because my school is lousy and my family is poor?","sourceUid":"merged-mputbheo-22","sourceNo":582},{"id":506,"readerNo":507,"displayNo":585,"n":585,"type":"narration","text":"Sao cô lại vặn vẹo lời người khác như vậy?\n왜 또 말을 그렇게 꼬아서 받니\nWhy do you have to twist everything?","sourceUid":"merged-mputc9z3-23","sourceNo":585},{"id":507,"readerNo":508,"displayNo":586,"n":586,"type":"narration","text":"Anh nghĩ tôi từ bỏ mọi thứ chỉ để dừng lại ở đây sao?\n겨우 그 정도에 만족하려고\n내가 다 포기하고 산 줄 알아요?\nDo you think I gave up everything to just stop here?","sourceUid":"merged-mputdbun-24","sourceNo":586},{"id":508,"readerNo":509,"displayNo":588,"n":588,"type":"narration","text":"Anh nghĩ tôi không biết người ta bàn tán rằng tôi là kẻ chống đối xã hội phát điên vì tiền sao? \nSao họ lại định đoạt giới hạn của tôi? \nGiám đốc Choi là gì\nmà quyết định tương lai của tôi?\n[아인] 다들 내 뒤에서 일에 미친년이다 돈에 미친 돈시오패스다 쑥덕거리는 거 모르는 줄 아냐고요. \n내 한계를 왜 지들이 결정하는데, 최 상무가 뭔데 내 미래를 결정하냐고요!\nDo you think I don't hear people saying that I'm a money-grubbing sociopath? Why should they tell me where to stop? How dare Director Choi choose my future?","sourceUid":"merged-mputg15d-27","sourceNo":588},{"id":509,"readerNo":510,"displayNo":592,"n":592,"type":"narration","text":"A In à. Cô không thể\nthắng Giám đốc Choi ở công ty đâu. Làm vậy cô sẽ giống như tôi ngay. Cô chứng kiến rồi mà. Khi đấu với hắn, tôi đã gặp chuyện gì.\n[정석] 아인아 어차피 너 회사 내에서\n최 상무 못 이겨 싸우면 너 바로 나 돼 직접 봤잖아 최 상무 척지고 나 어떻게 됐는지\nA-in. You can't beat\nDirector Choi in the company. If you fight him, you'll end up like me. You've seen it. You've seen what happened\nwhen I went against him.","sourceUid":"merged-mputhl3g-28","sourceNo":592},{"id":510,"readerNo":511,"displayNo":597,"n":597,"type":"narration","text":"QUẢN LÝ SÁNG TẠO YOO JEONG SEOK YOO JEONG SEOK\n[창수의 콧노래]\nYOO JEONG-SEOK YOO JEONG-SEOK","sourceUid":"merged-mputiyk7-29","sourceNo":597},{"id":511,"readerNo":512,"displayNo":599,"n":599,"type":"narration","text":"Cậu ít đồ đạc hơn tôi tưởng.\n생각보다 짐 별로 없네?\nYou don't have a lot to pack.","sourceUid":"merged-mputj4wv-30","sourceNo":599},{"id":512,"readerNo":513,"displayNo":600,"n":600,"type":"narration","text":"Này. Sao các cô cậu lãnh cảm thế?\n[창수] 야 니네 왜 이렇게 정이 없어?\nHey. You guys are all so cruel.","sourceUid":"merged-mpuwzzrg-31","sourceNo":600},{"id":513,"readerNo":514,"displayNo":602,"n":602,"type":"narration","text":"Giờ anh ấy nghỉ rồi\nnên thành người lạ luôn à?\n회사 나가면 이제 선배도 아니야?\nIs he a stranger\nnow that he's leaving the agency?","sourceUid":"merged-mpux0rh1-32","sourceNo":602},{"id":514,"readerNo":515,"displayNo":603,"n":603,"type":"narration","text":"Phải giúp anh ấy dọn đồ đi chứ.\n- [어두운 음악]\n- 짐 싸는데 좀 도와드리고 해야지 와… [웃음]\nGive him a hand packing up.","sourceUid":"merged-mpux2gql-34","sourceNo":603},{"id":515,"readerNo":516,"displayNo":604,"n":604,"type":"narration","text":"Tụi nó coi thường cậu ngay\nsau khi cậu nghỉ việc kìa.\n이야, 끈 끊어졌다고\n바로 무시하네\nThey're ignoring you right away\nnow that you're old news.","sourceUid":"merged-mpux339a-35","sourceNo":604},{"id":516,"readerNo":517,"displayNo":605,"n":605,"type":"narration","text":"Vì tình nghĩa đồng nghiệp. Hay để tôi giúp cậu nhé?\n동기 사랑 나라 사랑이라고\n나라도 도와줄까?\nColleagues are all you've got.","sourceUid":"merged-mpux3xnz-36","sourceNo":605},{"id":517,"readerNo":518,"displayNo":606,"n":606,"type":"narration","text":"Biến đi. Jeong Seok à. Nghề làm quảng cáo này\nkhông làm lâu được. Nhỉ?\n꺼져 정석아 광고 이거\n오래 할 일이 못 돼, 그렇지?\nDo you want me to help? Get lost. Jeong-seok. Working in advertising\nfor a long time isn't good.","sourceUid":"merged-mpux57xm-37","sourceNo":606},{"id":518,"readerNo":519,"displayNo":610,"n":610,"type":"narration","text":"Cậu sướng thật đấy. Giờ cậu thoải mái\ndành thời gian cho gia đình. Còn được yên tĩnh đọc sách ở nhà.\n[창수] 얼마나 좋아 가족들이랑 시간도 좀 보내고\n집에서 조용히 책도 좀 보고\nThis turned out well for you. You get to spend time with your family and can read\nin the comfort of your own house.","sourceUid":"merged-mpux7jde-39","sourceNo":610},{"id":519,"readerNo":520,"displayNo":613,"n":613,"type":"narration","text":"Giá mà tôi cũng được nghỉ giống cậu.\n아, 나도 너처럼 좀 쉬고 싶다\nI want to rest like you.","sourceUid":"merged-mpux87w4-40","sourceNo":613},{"id":520,"readerNo":521,"displayNo":717,"n":717,"type":"narration","text":"[창수의 웃음]","sourceUid":"ko-mpphrnrx-1493","sourceNo":717},{"id":521,"readerNo":522,"displayNo":614,"n":614,"type":"narration","text":"Ghen tị với cậu quá.\n부러워, 아…\nI'm jealous.","sourceUid":"merged-mpux9anv-41","sourceNo":614},{"id":522,"readerNo":523,"displayNo":615,"n":615,"type":"narration","text":"Tên khốn rác rưởi này!\n[정석] 야, 이 개쓰레기 같은\n새끼야!\nYou piece of garbage!","sourceUid":"merged-mpuxabc2-42","sourceNo":615},{"id":523,"readerNo":524,"displayNo":616,"n":616,"type":"narration","text":"Này, Choi Chang Su,\nsao cậu dám làm vậy với tôi?\n야, 최창수\n네가 나한테 이 자식아, 야!\nHow could you do this to me,\nChoi Chang-su?","sourceUid":"merged-mpuxb3q1-43","sourceNo":616},{"id":524,"readerNo":525,"displayNo":617,"n":617,"type":"narration","text":"Bỏ tôi ra! Bỏ tôi ra!\n놔, 이거 놔!\nLet go! Let go!","sourceUid":"merged-mpuxbqyj-44","sourceNo":617},{"id":525,"readerNo":526,"displayNo":722,"n":722,"type":"narration","text":"[떨리는 숨소리]","sourceUid":"ko-mpphrnrx-1498","sourceNo":722},{"id":526,"readerNo":527,"displayNo":619,"n":619,"type":"narration","text":"Này, Choi Chang Su. Tên khốn kia, cứ đợi đấy! Cứ đợi đấy, tên khốn!\n놔! [힘겨운 신음] 야, 최창수 너 이 새끼, 놔! 너 두고 봐\n두고 봐, 이 개자식아!\nHey, Choi Chang-su. You bastard, I'll show you! I'll show you, you punk!","sourceUid":"merged-mpuxihsd-49","sourceNo":619},{"id":527,"readerNo":528,"displayNo":622,"n":622,"type":"narration","text":"Đợi gì mà đợi?\nSau này có gặp nhau nữa đâu.\n- [정석의 힘주는 소리]\n- [창수] 뭘 두고 봐 앞으로 볼 일이 뭐 있다고\nShow me what?\nI won't be seeing you anymore.","sourceUid":"merged-mpuxjvac-50","sourceNo":622},{"id":528,"readerNo":529,"displayNo":623,"n":623,"type":"narration","text":"Còn làm gì vậy? Mau dọn thứ vô dụng này đi.\n뭐 해? 회사에서 쓸모없는 거 빨리 치워\nWhat are you waiting for? Get rid of this useless thing.","sourceUid":"merged-mpuxkwcz-51","sourceNo":623},{"id":529,"readerNo":530,"displayNo":625,"n":625,"type":"narration","text":"Này… \"Thứ vô dụng\"?\n- [긴장되는 음악]\n- [정석] 야 [신음] 쓸모없는…\nYou… \"Useless thing\"?","sourceUid":"merged-mpuxluuj-52","sourceNo":625},{"id":530,"readerNo":531,"displayNo":627,"n":627,"type":"narration","text":"Này! Cậu gọi tôi là thứ vô dụng sao?\n쓸모없는 거?\nHey! Did you just call me useless?","sourceUid":"merged-mpuxnl6i-53","sourceNo":627},{"id":531,"readerNo":532,"displayNo":628,"n":628,"type":"narration","text":"Bỏ tôi ra!\n야! 쓸모가 없어? 이거 놔 [아파하는 탄성]\nLet go!","sourceUid":"merged-mpuxpqa9-56","sourceNo":628},{"id":532,"readerNo":533,"displayNo":736,"n":736,"type":"narration","text":"[떨리는 숨소리]","sourceUid":"ko-mpphrnrx-1512","sourceNo":736},{"id":533,"readerNo":534,"displayNo":629,"n":629,"type":"narration","text":"Anh có biết… khi nào con người ngoan ngoãn nhất không?\n사람이 언제 가장 온순해지는지 아세요?\nDo you know… when a person becomes obedient?","sourceUid":"merged-mpuxpads-55","sourceNo":629},{"id":534,"readerNo":535,"displayNo":631,"n":631,"type":"narration","text":"Không biết nữa. Khi bị đánh bại?\n글쎄 패배했을 때?\nI'm not sure. When you lose?","sourceUid":"merged-mpuxta98-57","sourceNo":631},{"id":535,"readerNo":536,"displayNo":633,"n":633,"type":"narration","text":"Chắc vậy đấy. Phải vậy mới sống sót chứ.\n[정석이 헛웃음 치며] 그렇네\n그래야 살아남지\nI guess it is. That's the way to survive.","sourceUid":"merged-mpuxu1ai-58","sourceNo":633},{"id":536,"readerNo":537,"displayNo":634,"n":634,"type":"narration","text":"Chạy trốn có chút xấu hổ thật. Nhưng cũng cần phải sống sót.\n도망치는 건 부끄럽지만 생존엔 필수니까\nIt's humiliating to run away. But it's necessary to survive.","sourceUid":"merged-mpuxvjtr-61","sourceNo":634},{"id":537,"readerNo":538,"displayNo":636,"n":636,"type":"narration","text":"Có những người trở nên xảo quyệt hơn sau khi bị đánh bại.\n[아인] 세상엔 패배했을 때 더 악랄해지는\n인간들이 있어요\nThere are people who become more spiteful when they lose.","sourceUid":"merged-mpuxxu47-62","sourceNo":636},{"id":538,"readerNo":539,"displayNo":638,"n":638,"type":"narration","text":"Họ cũng là những người đã làm nên lịch sử.\n그런 종자들이 역사를 만들어 냈고\nThey are the ones who made history.","sourceUid":"merged-mpuy6c0n-63","sourceNo":638},{"id":539,"readerNo":540,"displayNo":639,"n":639,"type":"narration","text":"Tôi cũng sẽ thử một lần. Làm nên lịch sử.\n한번 만들어 보려고요 그 역사라는 거\nAnd I'm planning to do the same. I'll make history.","sourceUid":"merged-mpuy7d2q-64","sourceNo":639},{"id":540,"readerNo":541,"displayNo":748,"n":748,"type":"narration","text":"[의미심장한 음악] [거친 숨소리]","sourceUid":"merged-mpuy8xnc-65","sourceNo":748},{"id":541,"readerNo":542,"displayNo":641,"n":641,"type":"narration","text":"PHÒNG SÁNG TẠO 1, PHÒNG SÁNG TẠO 2\nCREATIVE 1 HQ, CREATIVE 2 HQ","sourceUid":"merged-mpuy91mw-66","sourceNo":641},{"id":542,"readerNo":543,"displayNo":642,"n":642,"type":"narration","text":"Lấy giúp tôi danh sách nhân sự phòng sáng tạo.\n[아인] 인사 팀에 말해서\n제작 팀 인사 파일 좀 갖다줘요\nAsk HR for the list of staff\non the creative team.","sourceUid":"merged-mpuy9ufc-67","sourceNo":642},{"id":543,"readerNo":544,"displayNo":643,"n":643,"type":"narration","text":"Dạ? Danh sách nhân sự sao ạ?\n네? 인사 파일이요?\nThe list of staff?","sourceUid":"merged-mpuye54j-68","sourceNo":643},{"id":544,"readerNo":545,"displayNo":644,"n":644,"type":"narration","text":"Cả nội quy công ty nữa.\n그리고 회사 내규도\nAlong with the company regulations.","sourceUid":"merged-mpuyew07-69","sourceNo":644},{"id":545,"readerNo":546,"displayNo":645,"n":645,"type":"narration","text":"Vâng ạ.\n[수정] 아, 네\nOkay, ma'am.","sourceUid":"merged-mpuyfgs5-70","sourceNo":645},{"id":546,"readerNo":547,"displayNo":646,"n":646,"type":"narration","text":"GIÁM ĐỐC DỰ ÁN CHOI CHANG SU\n[긴장되는 음악]\nCHIEF PROJECT OFFICER CHOI CHANG-SU","sourceUid":"merged-mpuyfxmd-71","sourceNo":646},{"id":547,"readerNo":548,"displayNo":647,"n":647,"type":"narration","text":"Sao vậy?\n- [휴대전화 벨 소리]\n- [창수] 어, 왜?\nYes?","sourceUid":"merged-mpuyg9ip-72","sourceNo":647},{"id":548,"readerNo":549,"displayNo":648,"n":648,"type":"narration","text":"Giám đốc Go bảo tôi lấy cho chị ấy\ndanh sách nhân sự phòng sáng tạo.\n고 상무님이 제작 팀 인사 파일 받아 오라고 하십니다\nMs. Go is asking me to get\nthe list of staff on the creative team.","sourceUid":"merged-mpuyhj19-73","sourceNo":648},{"id":549,"readerNo":550,"displayNo":649,"n":649,"type":"narration","text":"Đưa cho cô ta đi. Cả nội quy công ty nữa.\n가져다줘 회사 내규도…\nGet it for her. Along with the company regulations.","sourceUid":"merged-mpuyiflc-74","sourceNo":649},{"id":550,"readerNo":551,"displayNo":651,"n":651,"type":"narration","text":"Nội quy?\n내규?\nRegulations?","sourceUid":"merged-mpuyj99j-75","sourceNo":651},{"id":551,"readerNo":552,"displayNo":652,"n":652,"type":"narration","text":"Cứ đưa luôn đi.\n갖다줘\nGet it for her.","sourceUid":"merged-mpuyjoqp-76","sourceNo":652},{"id":552,"readerNo":553,"displayNo":653,"n":653,"type":"narration","text":"Vâng, tôi hiểu rồi.\n[수정] 네, 알겠습니다\nYes, sir.","sourceUid":"merged-mpuylyy0-77","sourceNo":653},{"id":553,"readerNo":554,"displayNo":654,"n":654,"type":"narration","text":"Giờ cô ta cũng là giám đốc rồi, chắc sẽ muốn thăng chức\ncho hậu bối dưới trướng.\n지도 상무 됐으니까\n지 새끼들 승진시켜 줘야 되겠지\nNow that she's a managing director, she must want\nto give her juniors a promotion.","sourceUid":"merged-mpuymglo-78","sourceNo":654},{"id":554,"readerNo":555,"displayNo":656,"n":656,"type":"narration","text":"Có gì to tát đâu. Thoải mái đi.\n그 정도야 뭐, 쯧, 드셔\nThat's nothing. I'll let you have it.","sourceUid":"merged-mpuynw7t-79","sourceNo":656},{"id":555,"readerNo":556,"displayNo":764,"n":764,"type":"narration","text":"[웃음]","sourceUid":"ko-mpphrnry-1540","sourceNo":764},{"id":556,"readerNo":557,"displayNo":658,"n":658,"type":"narration","text":"Nếu nhất định phải đấu, hãy đấu bằng sức mạnh\nGiám đốc Choi trao cho cô.\n[정석] 꼭 싸우려면 최 상무가 너한테 준 힘으로 싸워\nIf you have to fight, fight with the power\nDirector Choi gave you.","sourceUid":"merged-mpuypoig-80","sourceNo":658},{"id":557,"readerNo":558,"displayNo":766,"n":766,"type":"narration","text":"[비장한 음악]","sourceUid":"ko-mpphrnry-1542","sourceNo":766},{"id":558,"readerNo":559,"displayNo":660,"n":660,"type":"narration","text":"Sức mạnh nào?\n무슨 힘이요?\nWhat power?","sourceUid":"merged-mpuyql5r-81","sourceNo":660},{"id":559,"readerNo":560,"displayNo":661,"n":661,"type":"narration","text":"Sức mạnh hắn đã dùng với tôi.\n최 상무가 나한테 쓴 힘\nThe power he used against me.","sourceUid":"merged-mpuyr22e-82","sourceNo":661},{"id":560,"readerNo":561,"displayNo":662,"n":662,"type":"narration","text":"TRUYỀN THÔNG VC\nNỘI QUY\nVC COMMUNICATIONS COMPANY REGULATIONS","sourceUid":"merged-mpuytcxh-86","sourceNo":662},{"id":561,"readerNo":562,"displayNo":663,"n":663,"type":"narration","text":"Đặc quyền của nhân sự cấp cao. Chỉ có cách đó thôi.\n[정석] 임원이 가진 절대 권한 그 방법밖에 없어\nThe exclusive power as an executive. That's the only way.","sourceUid":"merged-mpuyt7w8-85","sourceNo":663},{"id":562,"readerNo":563,"displayNo":665,"n":665,"type":"narration","text":"Nhóm phó Han, vào phòng tôi đi. Vâng.\n한 부장, 내 방으로 좀 와 예\nMr. Han, come to my office. Yes, ma'am.","sourceUid":"merged-mpuyuvic-88","sourceNo":665},{"id":563,"readerNo":564,"displayNo":773,"n":773,"type":"narration","text":"[버튼 조작음]","sourceUid":"ko-mpphrnry-1549","sourceNo":773},{"id":564,"readerNo":565,"displayNo":667,"n":667,"type":"narration","text":"Eun Jeong, tôi bảo này. - Vâng.\n- Trong lúc tôi gặp Giám đốc Go, cô nói chuyện với cô thư ký nhé?\n[병수가 헛기침하며] 은정 카피\n잠시만 네 [병수] 나 상무님하고\n얘기하는 동안 그 비서분하고 대화 좀 해\nEun-jeong, listen. -Yes? -While I talk with Ms. Go in her office, could you talk with her secretary?","sourceUid":"merged-mpuywffh-89","sourceNo":667},{"id":565,"readerNo":566,"displayNo":670,"n":670,"type":"narration","text":"Tại sao ạ? Để bịt tai mấy con chim chuột\nhay hóng chuyện bất kể ngày đêm.\n왜요? 낮말, 밤말 다 듣는 쥐하고 새 귀 좀 막게\nWhy? Let's just say we're blocking the ears of the walls.","sourceUid":"merged-mpuz0hyf-92","sourceNo":670},{"id":566,"readerNo":567,"displayNo":673,"n":673,"type":"narration","text":"Chào cô. Tôi chưa có cơ hội chào hỏi cô tử tế. Tôi là copywriter Cho Eun Jeong.\n[수정] 아, 예 - [은정] 안녕하세요 [웃음]\n- 아… [은정] 아유, 제가\n인사도 못 드려 가지고 저 조은정 카피예요\nHello. I didn't have a chance\nto introduce myself. I'm Cho Eun-jeong, a copywriter.","sourceUid":"merged-mpuz3odz-94","sourceNo":673},{"id":567,"readerNo":568,"displayNo":784,"n":784,"type":"narration","text":"- [탁 문 닫히는 소리]\n- [통화 대기음]","sourceUid":"ko-mpphrnry-1560","sourceNo":784},{"id":568,"readerNo":569,"displayNo":676,"n":676,"type":"narration","text":"- Vâng.\n- Tôi tên là Jung Su Jeong.\n- [수정의 어색한 웃음]\n- 아, 네 [수정] 아, 네, 안녕하세요\n정수정이라고 합니다, 네\n-Hello.\n-Hello, my name is Jung Su-jeong.","sourceUid":"merged-mpuz5ofj-95","sourceNo":676},{"id":569,"readerNo":570,"displayNo":677,"n":677,"type":"narration","text":"Nhóm phó Han. Vâng.\n[아인] 한 부장 예\nMr. Han. Yes, ma'am.","sourceUid":"merged-mpuz7t32-96","sourceNo":677},{"id":570,"readerNo":571,"displayNo":679,"n":679,"type":"narration","text":"Mưa tạnh rồi. Giờ chúng ta… vượt giới hạn đi.\n비 그쳤다 [아인] 이제 선 넘어가자\nThe rain stopped. It's now time to cross the line.","sourceUid":"merged-mpuzbh66-97","sourceNo":679},{"id":571,"readerNo":572,"displayNo":795,"n":795,"type":"narration","text":"[의미심장한 음악]","sourceUid":"ko-mpphrnry-1571","sourceNo":795},{"id":572,"readerNo":573,"displayNo":682,"n":682,"type":"narration","text":"Anh đừng về nhà, ở lại đợi tôi.\nTa cần gặp một người.\n[아인] 퇴근하지 말고\n기다리고 있어 누굴 좀 만나야 하니까\nDon't go home and wait for me.\nI have someone to meet.","sourceUid":"merged-mpuzcfxq-98","sourceNo":682},{"id":573,"readerNo":574,"displayNo":798,"n":798,"type":"narration","text":"[함께 웃는다]","sourceUid":"ko-mpphrnry-1574","sourceNo":798},{"id":574,"readerNo":575,"displayNo":683,"n":683,"type":"narration","text":"Sau này rất mong được các anh giúp đỡ.\n앞으로 잘 부탁드립니다\nI look forward to working with you.","sourceUid":"merged-mpuzdhfo-99","sourceNo":683},{"id":575,"readerNo":576,"displayNo":800,"n":800,"type":"narration","text":"[흥미진진한 음악]","sourceUid":"ko-mpphrnry-1576","sourceNo":800},{"id":576,"readerNo":577,"displayNo":684,"n":684,"type":"narration","text":"Đây là rượu vang chủ tịch tặng tôi.\n[아인] 회장님께 받은\n샴페인입니다\nThe chairman gifted me this champagne.","sourceUid":"merged-mpuzol8t-100","sourceNo":684},{"id":577,"readerNo":578,"displayNo":685,"n":685,"type":"narration","text":"Giám đốc Go, cô khác xưa rồi đấy. Phong thái khác hẳn lúc trước.\n고 상무님 변하셨다 스탠스가 전 같지 않으셔\nMs. Go, you've changed quite a bit. You're taking a different stance.","sourceUid":"merged-mpuzp4ij-101","sourceNo":685},{"id":578,"readerNo":579,"displayNo":687,"n":687,"type":"narration","text":"Còn chia sẻ rượu quý cho bọn tôi nữa.\n[우철] 아, 이 귀한 걸\n우리한테 주시고\nYou're sharing such\nprecious champagne with us.","sourceUid":"merged-mpuzrd3q-102","sourceNo":687},{"id":579,"readerNo":580,"displayNo":688,"n":688,"type":"narration","text":"Nào. Chúng ta hãy quên hết\nnhững chuyện không hay trước đây.\n[아인] 자 그동안 있었던 앙금들\n다 넘겨 버리시죠\nHere. Let bygones be bygones.","sourceUid":"merged-mpuzryh1-103","sourceNo":688},{"id":580,"readerNo":581,"displayNo":807,"n":807,"type":"narration","text":"[김 CD의 웃음]","sourceUid":"ko-mpphrnry-1583","sourceNo":807},{"id":581,"readerNo":582,"displayNo":690,"n":690,"type":"narration","text":"Tuyệt vời quá. Đồ ăn rất ngon.\n[김 CD] 아유, 깔끔해, 깔끔해\nThat was great. The food was nice.","sourceUid":"merged-mpuztmas-104","sourceNo":690},{"id":582,"readerNo":583,"displayNo":808,"n":808,"type":"narration","text":"[CD들의 시원한 탄성]","sourceUid":"ko-mpphrnry-1584","sourceNo":808},{"id":583,"readerNo":584,"displayNo":692,"n":692,"type":"narration","text":"Anh nói đúng. A In à. Cô cứ mềm mỏng như vậy\ncó phải tốt hơn bao nhiêu không.\n[우철] 아인아 나긋나긋하게 구니까 얼마나 좋아\nI know. A-in. Look how great it is\nwhen you're so friendly.","sourceUid":"merged-mpuzx0uj-105","sourceNo":692},{"id":584,"readerNo":585,"displayNo":810,"n":810,"type":"narration","text":"[CD들의 대화 소리]","sourceUid":"ko-mpphrnry-1586","sourceNo":810},{"id":585,"readerNo":586,"displayNo":695,"n":695,"type":"narration","text":"Đúng đó. Đời sống công sở là phải thế này.\n[김 CD] 그럼 [주 CD] 사회생활 이렇게 해야지\nI agree. This is how you should behave.","sourceUid":"merged-mpuzyy39-106","sourceNo":695},{"id":586,"readerNo":587,"displayNo":697,"n":697,"type":"narration","text":"Vậy tôi hy vọng từ ngày mai\ncác anh sẽ có một khởi đầu mới ở công ty.\n그럼 내일부터 회사에서\n새롭게 시작하기를 바라겠습니다\nThen I expect you to start anew\nat the company tomorrow.","sourceUid":"merged-mpuzzgze-107","sourceNo":697},{"id":587,"readerNo":588,"displayNo":698,"n":698,"type":"narration","text":"Chỉ cần cô nghe lời, bọn tôi nhất định sẽ khởi đầu lại.\n너만 잘하면 우리야 새롭게 하지\nAs long as you behave, of course we'll start anew.","sourceUid":"merged-mpv009ld-108","sourceNo":698},{"id":588,"readerNo":589,"displayNo":700,"n":700,"type":"narration","text":"Vậy tôi xin phép đi trước.\n그럼 저는 먼저 가 보겠습니다\nI'll get going then.","sourceUid":"merged-mpv00uh8-109","sourceNo":700},{"id":589,"readerNo":590,"displayNo":701,"n":701,"type":"narration","text":"Chà, cô ấy thay đổi rồi.\n[김 CD] 이야, 변했어, 어\nShe's changed.","sourceUid":"merged-mpv0197d-110","sourceNo":701},{"id":590,"readerNo":591,"displayNo":702,"n":702,"type":"narration","text":"Này, chúng ta đi tăng hai chứ nhỉ?\n[우철] 야, 좋은 데 가서\n한잔 더 해야지\nHey, why don't we go for round two?","sourceUid":"merged-mpv02h5o-111","sourceNo":702},{"id":591,"readerNo":592,"displayNo":703,"n":703,"type":"narration","text":"Hay là vậy nhỉ?\nThưa Giám đốc sáng tạo nhiệm kỳ tới. Chờ tôi chút.\n[김 CD] 그럴까요?\n우리 차기 제작 본부장님 - [함께 웃는다]\n- [우철] 잠깐, 잠깐, 잠깐\nLet's do that,\nsoon-to-be Chief Creative Officer. Hold on.","sourceUid":"merged-mpv040xc-112","sourceNo":703},{"id":592,"readerNo":593,"displayNo":705,"n":705,"type":"narration","text":"Ừ, Đạo diễn Jang. Vâng, Quản lý Kwon? Vâng, tôi hiểu rồi. Tôi đến ngay đây.\n어, 장 감독? 어, 예, CD님 예, 알겠습니다\n예, 지금 가겠습니다, 예\nHey, Director Jang. Hello, Mr. Kwon. Yes, sir. I'll be there soon.","sourceUid":"merged-mpv05qv1-114","sourceNo":705},{"id":593,"readerNo":594,"displayNo":822,"n":822,"type":"narration","text":"[통화 연결음] [시끄러운 음악 소리]","sourceUid":"merged-mpv06ds3-115","sourceNo":822},{"id":594,"readerNo":595,"displayNo":708,"n":708,"type":"narration","text":"Đâu rồi? Quản lý Kwon, tôi đến rồi!\n[장 감독] 권 CD님, 저 왔습니다!\nWhere? Mr. Kwon, I'm here!","sourceUid":"merged-mpv06tgg-116","sourceNo":708},{"id":595,"readerNo":596,"displayNo":710,"n":710,"type":"narration","text":"Chào mừng cậu! - Vào đây đi! - Cậu đến rồi à? Sao cậu không nghe điện thoại?\n- [우철] 왔어?\n- [CD들의 웃음] - 죄송해요, 늦어 가지고\n- [우철] 왔어, 왔어, 응? 왜 전화를 안 받아!\nWelcome! -Bring it in.\n-You're here! Why didn't you pick up?","sourceUid":"merged-mpv09at7-118","sourceNo":710},{"id":596,"readerNo":597,"displayNo":713,"n":713,"type":"narration","text":"Tôi xin lỗi. Để tôi rót cho anh một chén.\n[장 감독] 아, 죄송해요, 죄송해요 제가 한잔 말아 드리겠습니다\nI apologize. Let me pour you one, sir.","sourceUid":"merged-mpv0alfv-120","sourceNo":713},{"id":597,"readerNo":598,"displayNo":714,"n":714,"type":"narration","text":"Đúng đó, ngày vui như hôm nay không thể thiếu Đạo diễn Jang! Tôi phải nhìn cậu rót mới được. Các anh chuẩn bị xong chưa? - Rồi! - Rồi!\n[김 CD] 그래, 오늘 같은 날 장 감독이 있어야지 나 만 거 마실 거야 자, 준비되셨습니까? [CD들] 네!\nYou can't miss out on a day like today, Director Jang! Let's see you pour me one. Are you all ready? -Yes! -Yes!","sourceUid":"merged-mpv0dlk8-122","sourceNo":714},{"id":598,"readerNo":599,"displayNo":833,"n":833,"type":"narration","text":"[함께 웃는다]","sourceUid":"ko-mpphrnry-1609","sourceNo":833},{"id":599,"readerNo":600,"displayNo":718,"n":718,"type":"narration","text":"Chúng ta sẽ hét tên\nnhững người mình yêu thương nhé. - Ba, hai,\n- Ba, hai, - một!\n- một! - Bungee!\n- Bungee! Quản lý Kwon, tôi yêu anh!\n[장 감독] 자, 그러면\n사랑하는 사람 이름 부르면서 다 같이 뛰어내리겠습니다 - 다 같이, 쓰리!\n- [함께] 쓰리! 투! 원! - 번지!\n- [김 CD] 뛰어! - 권 CD님, 사랑합니다!\n- [사람들의 웃음]\nLet's all call out the names\nof the ones we love. -Three, two,\n-Three, two, -one!\n-one! -Bungee!\n-Bungee! Mr. Kwon, I love you!","sourceUid":"merged-mpv5yr78-1","sourceNo":718},{"id":600,"readerNo":601,"displayNo":723,"n":723,"type":"narration","text":"Hôm nay hết bao nhiêu? Nhiều hơn mọi khi một chút.\n[장 감독] 오늘은 얼마나 나왔어? [마담] 평소보다 좀 더요?\nHow much is it today? A little more than usual.","sourceUid":"merged-mpv60qmj-2","sourceNo":723},{"id":601,"readerNo":602,"displayNo":844,"n":844,"type":"narration","text":"[함께 환호한다]","sourceUid":"ko-mpphrnry-1620","sourceNo":844},{"id":602,"readerNo":603,"displayNo":725,"n":725,"type":"narration","text":"Đây. Anh mạnh mẽ lên nhé.\n자 힘내요\nHere. Cheer up.","sourceUid":"merged-mpv621oc-3","sourceNo":725},{"id":603,"readerNo":604,"displayNo":847,"n":847,"type":"narration","text":"[한숨]","sourceUid":"ko-mpphrnry-1623","sourceNo":847},{"id":604,"readerNo":605,"displayNo":727,"n":727,"type":"narration","text":"Trời ạ, mình còn phải\nlàm việc này đến bao giờ?\n[장 감독] 아, 나 언제까지\n이 짓거리 해야 하나?\nHow long do I have to do this?","sourceUid":"merged-mpv63278-4","sourceNo":727},{"id":605,"readerNo":606,"displayNo":851,"n":851,"type":"narration","text":"[휴대전화 진동음]","sourceUid":"ko-mpphrnry-1627","sourceNo":851},{"id":606,"readerNo":607,"displayNo":728,"n":728,"type":"narration","text":"Vâng, thưa anh. Bây giờ sao?\n네, 부장님 네, 지금요?\nYes, sir. Right now?","sourceUid":"merged-mpv645vt-5","sourceNo":728},{"id":607,"readerNo":608,"displayNo":730,"n":730,"type":"narration","text":"CÔNG TY TRUYỀN THÔNG VC Có thể tiến hành luôn không? Giám đốc sáng tạo đã nói vậy rồi,\ntôi đâu còn cách nào khác.\n\"VC기획\" 그럼 바로 처리되겠죠? 뭐, 제작 본부장님이\n그렇게 말씀하시면 어쩔 수 없죠\nWill it be processed right away? You're the chief creative officer,\nso I have no choice.","sourceUid":"merged-mpv65ve2-6","sourceNo":730},{"id":608,"readerNo":609,"displayNo":732,"n":732,"type":"narration","text":"VĂN PHÒNG GIÁM ĐỐC NHÂN SỰ\n[의미심장한 음악]\nCHIEF HUMAN RESOURCES OFFICER'S OFFICE","sourceUid":"merged-mpv7u7dn-7","sourceNo":732},{"id":609,"readerNo":610,"displayNo":733,"n":733,"type":"narration","text":"Liệu họ có nhận ra ai mới là\ngiám đốc sáng tạo không nhỉ?\n누가 제작 본부장인지\n이제 피부로 좀 느끼시려나?\nWill they finally realize\nwho the chief creative officer is?","sourceUid":"merged-mpv7umiu-8","sourceNo":733},{"id":610,"readerNo":611,"displayNo":734,"n":734,"type":"narration","text":"- Chào anh.\n- Ừ.\n-Good morning.\n-Yes.","sourceUid":"merged-mpv82bfx-10","sourceNo":734},{"id":611,"readerNo":612,"displayNo":859,"n":859,"type":"narration","text":"[직원과 우철이 인사한다] [우철] 하, 다리 아파","sourceUid":"merged-mpv82h0f-11","sourceNo":859},{"id":612,"readerNo":613,"displayNo":735,"n":735,"type":"narration","text":"Sao? Khách hàng nói gì à?\n왜, 또 광고주가 뭐래?\nWhat? Did the client say something?","sourceUid":"merged-mpv82noq-12","sourceNo":735},{"id":613,"readerNo":614,"displayNo":736,"n":736,"type":"narration","text":"Quản lý Kwon,\nanh chưa kiểm tra mạng nội bộ sao?\nCD님, 인트라넷 아직 못 보셨어요?\nMr. Kwon, you haven't\nchecked the intranet?","sourceUid":"merged-mpv84lr0-13","sourceNo":736},{"id":614,"readerNo":615,"displayNo":737,"n":737,"type":"narration","text":"Lại có chuyện gì nữa? Thật là.\n뭔데, 또 [한숨]\nWhat is it this time?","sourceUid":"merged-mpv899uc-14","sourceNo":737},{"id":615,"readerNo":616,"displayNo":864,"n":864,"type":"narration","text":"[어두운 음악]","sourceUid":"ko-mpphrnry-1640","sourceNo":864},{"id":616,"readerNo":617,"displayNo":738,"n":738,"type":"narration","text":"QUẢN LÝ SÁNG TẠO KWON U CHEOL, KIM O JUNG, JOO HO YEONG… ĐÃ BỊ GIÁNG CHỨC XUỐNG LÀM NHÂN VIÊN\nCREATIVE DIRECTOR KWON U-CHEOL,\nKIM O-JUNG, JOO HO-YEONG… HAVE BEEN DEMOTED TO TEAM MEMBER","sourceUid":"merged-mpv8agz9-15","sourceNo":738},{"id":617,"readerNo":618,"displayNo":740,"n":740,"type":"narration","text":"Cái gì thế này?\n뭐야, 이거\nWhat the heck?","sourceUid":"merged-mpv8apio-16","sourceNo":740},{"id":618,"readerNo":619,"displayNo":866,"n":866,"type":"narration","text":"[휴대전화 진동음]","sourceUid":"ko-mpphrnry-1642","sourceNo":866},{"id":619,"readerNo":620,"displayNo":741,"n":741,"type":"narration","text":"Việc này là sao? Chết tiệt.\n[우철] 야, 뭐야, 이거 아, 씨…\nWhat is this? Darn it.","sourceUid":"merged-mpv8rcay-17","sourceNo":741},{"id":620,"readerNo":621,"displayNo":743,"n":743,"type":"narration","text":"Go A In, cái con điên này.\n고아인, 씨, 미친년이, 씨\nGo A-in, that crazy bitch.","sourceUid":"merged-mpv8ur2p-18","sourceNo":743},{"id":621,"readerNo":622,"displayNo":744,"n":744,"type":"narration","text":"Cậu nói sao? Sao tôi lại duyệt chuyện đó được? Cúp máy đi!\n뭐라고? 아, 내가 왜 그런 결재를 해? 끊어 봐\nWhat did you say?\nWhy would I authorize that? Hang up.","sourceUid":"merged-mpv8wisw-19","sourceNo":744},{"id":622,"readerNo":623,"displayNo":746,"n":746,"type":"narration","text":"KHUNG ẢNH THỦY TINH\nĐỒ DỄ VỠ\n[휴대전화 조작음]\nGLASS PICTURE FRAME","sourceUid":"merged-mpvbmz4a-20","sourceNo":746},{"id":623,"readerNo":624,"displayNo":747,"n":747,"type":"narration","text":"Vậy tôi hy vọng từ ngày mai\ncác anh sẽ có một khởi đầu mới ở công ty.\n[아인] 내일부터 회사에서\n새롭게 시작하기를 바라겠습니다\nThen I expect you to start anew\nat the company tomorrow.","sourceUid":"merged-mpvbnck8-21","sourceNo":747},{"id":624,"readerNo":625,"displayNo":874,"n":874,"type":"narration","text":"[CD들의 웃음]","sourceUid":"ko-mpphrnry-1650","sourceNo":874},{"id":625,"readerNo":626,"displayNo":748,"n":748,"type":"narration","text":"Nói chuyện với cô ta không thông.\nPhải hành động cho cô ta thấy.\n말로는 안 돼\n행동으로 보여 줘야지\nWe can't get through to her with words.\nWe must take action.","sourceUid":"merged-mpvbpnpl-22","sourceNo":748},{"id":626,"readerNo":627,"displayNo":749,"n":749,"type":"narration","text":"Giám đốc Choi biết không? Cứ đi trước đã.\n최 상무님은 아세요? [우철] 일단 가자\nDoes Mr. Choi know? Let's go first.","sourceUid":"merged-mpvbrxqm-23","sourceNo":749},{"id":627,"readerNo":628,"displayNo":879,"n":879,"type":"narration","text":"[고조되는 음악]","sourceUid":"ko-mpphrnry-1655","sourceNo":879},{"id":628,"readerNo":629,"displayNo":751,"n":751,"type":"narration","text":"Giờ này chắc cũng tới nơi rồi đây.\n슬슬 쳐들어올 때가 됐는데\nIt's about time they came.","sourceUid":"merged-mpvbshls-24","sourceNo":751},{"id":629,"readerNo":630,"displayNo":881,"n":881,"type":"narration","text":"[감성적인 음악]","sourceUid":"ko-mpphrnry-1657","sourceNo":881},{"id":630,"readerNo":631,"displayNo":752,"n":752,"type":"narration","text":"Tôi là giám đốc sáng tạo kia mà. Sao anh lại dè chừng quản lý sáng tạo? Việc này quá khác thường.\n[아인] 내가 제작 본부장인데 왜 CD들 눈치를 보지? [기호] 너무 상식 밖입니다\nI'm the chief creative officer. Why do you tiptoe around\nthe creative directors? -This is too out of the ordinary.\n-My job is to think out of the ordinary.","sourceUid":"merged-mpvbuqly-25","sourceNo":752},{"id":631,"readerNo":632,"displayNo":755,"n":755,"type":"narration","text":"Vì công việc của tôi là chống lại\ncác khái niệm thường thức. Đó là thường lệ mà!\n[아인] 제 일이 상식이라는\n고정 관념과의 싸움이라서요\nIt's a common practice!","sourceUid":"merged-mpvbyo7s-26","sourceNo":755},{"id":632,"readerNo":633,"displayNo":756,"n":756,"type":"narration","text":"Để tôi sa thải các anh theo thường lệ nhé? Nếu không điên, con nghĩ con có thể\nthành công giữa thế gian tàn ác này à?\n[우철] 관례잖습니까 좋아하는 관례대로\n해고시켜 드릴까요? [근철] 이 험난한 세상에서\n제정신으로 성공할 수 있갔어?\nAccording to the common practice,\nI can have you fired. You think you can succeed\nin this cruel world with a sane mind?","sourceUid":"merged-mpvbzken-28","sourceNo":756},{"id":633,"readerNo":634,"displayNo":758,"n":758,"type":"narration","text":"Phải dùng đến trực giác. Vậy mới là doanh nhân đích thực. Anh nói sư tử săn hươu\nlà một việc tàn nhẫn sao?\n본능으로 해야디\n그게 진짜 장사꾼이야 [아인] 사자가 사슴 잡아먹는다고\n잔인하다고 하나?\nUse your intuition. Now that's a true businessman. Do you say it's cruel\nwhen a lion hunts a deer down?","sourceUid":"merged-mpvc19t1-29","sourceNo":758},{"id":634,"readerNo":635,"displayNo":761,"n":761,"type":"narration","text":"Cô nên dừng lại đi.\n[기호] 지금이라도 멈추세요\nYou should stop now.","sourceUid":"merged-mpvc1lmu-30","sourceNo":761},{"id":635,"readerNo":636,"displayNo":762,"n":762,"type":"narration","text":"Có thể sẽ họp ban giám đốc\nđể cách chức cô đấy.\n상무님 해임 결의\n진행할 수도 있습니다\nA board meeting may be held\nto have you dismissed.","sourceUid":"merged-mpvc1tj3-31","sourceNo":762},{"id":636,"readerNo":637,"displayNo":763,"n":763,"type":"narration","text":"Anh triệu tập họp ban giám đốc đi. Cô tự đào hố chôn mình như vậy\nthì tôi lại càng mừng.\n소집해 주세요, 임원 회의 [창수] 알아서 자빠져 주면\n나야 땡큐지\nArrange a board meeting. I'm all for you digging your own grave.","sourceUid":"merged-mpvc268f-32","sourceNo":763},{"id":637,"readerNo":638,"displayNo":765,"n":765,"type":"narration","text":"Tôi chấp thuận… bằng quyền của tổng giám đốc.\n[문호] 승인합니다 대표 권한으로\nI approve… as the CEO.","sourceUid":"merged-mpvc34qc-33","sourceNo":765},{"id":638,"readerNo":639,"displayNo":767,"n":767,"type":"dialogue","text":"Biên dịch: Bùi Khánh Nhi\n자막: 최인정\nSubtitle translation by: Jea-Heon Chung","sourceUid":"merged-mpvc3atc-34","sourceNo":767}],"types":{"0":"narration","1":"narration","2":"narration","3":"narration","4":"narration","5":"narration","6":"narration","7":"narration","8":"narration","9":"narration","10":"narration","11":"narration","12":"narration","13":"narration","14":"narration","15":"narration","16":"narration","17":"narration","18":"narration","19":"narration","20":"narration","21":"narration","22":"narration","23":"narration","24":"narration","25":"narration","26":"narration","27":"narration","28":"narration","29":"narration","30":"narration","31":"narration","32":"narration","33":"narration
