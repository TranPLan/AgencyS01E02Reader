ER","sourceUid":"merged-mpphtc67-2441","sourceNo":2},{"id":2,"readerNo":3,"displayNo":3,"n":3,"type":"narration","text":"Chúc mừng cô được thăng chức, Giám đốc Go! - Chúc mừng, Giám đốc Go! - Chúc mừng, Giám đốc Go!\n[병수] 승진 축하합니다, 상무님! - [직원들] 축하드려요, 상무님! - [박수 소리]\nCongratulations on your promotion, Managing Director! -Congratulations, Managing Director! -Congratulations, Managing Director!","sourceUid":"merged-mppi2fs3-2443","sourceNo":3},{"id":3,"readerNo":4,"displayNo":6,"n":6,"type":"narration","text":"18 NĂM TRƯỚC\n18 YEARS AGO","sourceUid":"merged-mppi4ged-2444","sourceNo":6},{"id":4,"readerNo":5,"displayNo":5,"n":5,"type":"narration","text":"TRUYỀN THÔNG VC\nCopywriter.\n[정석] 카피라이터\nA copywriter.","sourceUid":"merged-mppi5a90-2447","sourceNo":5},{"id":5,"readerNo":6,"displayNo":6,"n":6,"type":"narration","text":"Nghe ra gì lắm phải không?\n뭔가 그럴듯해 보이지?\nSounds fancy, doesn't it?","sourceUid":"merged-mppi5v8y-2448","sourceNo":6},{"id":6,"readerNo":7,"displayNo":7,"n":7,"type":"narration","text":"Làm việc ở công ty quảng cáo trông cũng oách đúng không?\n광고 대행사 다닌다고 하면 폼도 좀 나는 거 같고, 어?\nYou feel like a big shot working at an advertising agency, right?","sourceUid":"merged-mppi67gm-2449","sourceNo":7},{"id":7,"readerNo":8,"displayNo":8,"n":8,"type":"narration","text":"Thế mà cô toàn viết hươu viết vượn.\n어디 새 날아가는 소리나 써 와서\nBut all you're coming up with are worthless ideas.","sourceUid":"merged-mppjxbnp-1","sourceNo":8},{"id":8,"readerNo":9,"displayNo":9,"n":9,"type":"narration","text":"Ai cũng viết được nội dung chắc?\n카피 아무나 쓰는 줄 알아?\nYou think anyone can write copies?","sourceUid":"merged-mppkbwyg-1","sourceNo":9},{"id":9,"readerNo":10,"displayNo":10,"n":10,"type":"narration","text":"Con người ta nên làm việc mà mình giỏi chứ không phải việc họ thích.\n사람은 좋아하는 일 말고\n잘하는 일을 해야지\nA person should do what they are good at instead of what they like.","sourceUid":"merged-mppkd0go-2","sourceNo":10},{"id":10,"readerNo":11,"displayNo":11,"n":11,"type":"narration","text":"Tìm việc khác đi, cô không có tài đâu.\n딴 일 찾아, 넌 재능 없어\nLook for another job. You're not suited for this.","sourceUid":"merged-mppkqn98-1","sourceNo":11},{"id":11,"readerNo":12,"displayNo":12,"n":12,"type":"narration","text":"[한숨][흐느끼는 소리][한숨][훌쩍인다][심호흡]","sourceUid":"merged-mppkqwe3-2","sourceNo":12},{"id":12,"readerNo":13,"displayNo":14,"n":14,"type":"narration","text":"Cô khóc à?\n[물소리][정민] 울었어?\nDid you cry?","sourceUid":"merged-mppkr96b-3","sourceNo":14},{"id":13,"readerNo":14,"displayNo":15,"n":15,"type":"narration","text":"Bé lính mới nhà ta khóc rồi à?\n[안타까운 소리]울었어요, 우리 신삥이?\nNewbie, did you cry your eyes out?","sourceUid":"merged-mppky569-4","sourceNo":15},{"id":14,"readerNo":15,"displayNo":16,"n":16,"type":"narration","text":"Phụ nữ muốn leo lên ghế quản lý sáng tạo thì phải khóc đầy năm xô nước mắt\ntrong nhà vệ sinh mới được.\n여자가 대행사에서 CD 달려면 화장실에서\n눈물 다섯 바께쓰는 흘려야 돼\nIf a woman wants to be a creative director,she has to cry at least five buckets of tears in the bathroom.","sourceUid":"merged-mppkzh95-5","sourceNo":16},{"id":15,"readerNo":16,"displayNo":18,"n":18,"type":"narration","text":"Làm sao để viết nội dung tốt ạ?\n카피 잘 쓰려면 어떻게 해야 돼요?\nHow do I write good copies?","sourceUid":"merged-mppl2azk-6","sourceNo":18},{"id":16,"readerNo":17,"displayNo":19,"n":19,"type":"narration","text":"- Tôi chịu.\n- Chị biết mà!\n- 몰라 - [아인] 아시잖아요!\n-I don't know.\n-You do know!","sourceUid":"merged-mppl31ls-7","sourceNo":19},{"id":17,"readerNo":18,"displayNo":20,"n":20,"type":"narration","text":"Sao lại cáu với tôi? Muốn lý sự thì đi tìm\ncái tên khiến cô khóc ấy.\n[정민] 왜 나한테 짜증이야 따질 거면 너 울린 놈한테 가서 따져야지\nWhy are you venting at me? If you want to throw a fit, go to the guy who made you cry.","sourceUid":"merged-mppl4i0h-8","sourceNo":20},{"id":18,"readerNo":19,"displayNo":27,"n":27,"type":"narration","text":"[안타까운 소리]","sourceUid":"ko-mpphrnru-803","sourceNo":27},{"id":19,"readerNo":20,"displayNo":22,"n":22,"type":"narration","text":"Tiếp tục viết đi. Lính mới thì đừng đòi hỏi đi đường tắt.\n질리도록 써 신입 카피한테 숏컷이 어디 있니?\nJust keep writing. There's no shortcut for new copywriters.","sourceUid":"merged-mpplqbwr-1","sourceNo":22},{"id":20,"readerNo":21,"displayNo":24,"n":24,"type":"narration","text":"Cách duy nhất là viết thật nhiều.\n무조건 많이 쓰는 게 장땡이지\nWriting a lot is the only way to improve.","sourceUid":"merged-mpplt38h-2","sourceNo":24},{"id":21,"readerNo":22,"displayNo":31,"n":31,"type":"narration","text":"[밝은 음악]","sourceUid":"ko-mpphrnru-807","sourceNo":31},{"id":22,"readerNo":23,"displayNo":25,"n":25,"type":"narration","text":"Viết cho đến khi hắn ta phát ngán và không thể chê cô không có tài nữa.\n[정민] 보는 놈도\n읽다 읽다 질려서 카피 못 쓴다는 소리 못 할 때까지\nUntil the guy reads so many of your copies and can no longer say\nthat you're not suited for it.","sourceUid":"merged-mppluhdt-3","sourceNo":25},{"id":23,"readerNo":24,"displayNo":27,"n":27,"type":"narration","text":"Đừng bỏ chạy. Đối mặt đi.\n도망치지 말고 들이대\nDon't run away. Face it head-on.","sourceUid":"merged-mpplvu29-4","sourceNo":27},{"id":24,"readerNo":25,"displayNo":28,"n":28,"type":"narration","text":"Chào anh.\n[정석] 응\nHello.","sourceUid":"merged-mpplx1df-5","sourceNo":28},{"id":25,"readerNo":26,"displayNo":29,"n":29,"type":"narration","text":"Sao? Nộp đơn thôi việc à?\n왜, 사표 써 왔어?\nWhy? Are you quitting?","sourceUid":"merged-mpplygir-6","sourceNo":29},{"id":26,"readerNo":27,"displayNo":30,"n":30,"type":"narration","text":"Không ạ. Đây là các bản mới. Anh đọc hết chỗ này đi rồi hãy phán tôi có tài hay không.\n[아인] 아니요 새로 쓴 카피요 재능이 있는지 없는지는 읽어 보고 다시 얘기하시죠\nNo. New copies. Read them first before you decide whether I'm suited or not.","sourceUid":"merged-mppm49nv-7","sourceNo":30},{"id":27,"readerNo":28,"displayNo":34,"n":34,"type":"narration","text":"CUỘC ĐỜI ĐẦY RỦI RO NHƯNG TÔI ĐÃ CÓ UNIS\n[멀어지는 발걸음] [흥미로운 음악]\nTHERE'S ALWAYS A PLIGHT IN LIFE\nBUT I HAVE UNIS","sourceUid":"merged-mppm5wpy-8","sourceNo":34},{"id":28,"readerNo":29,"displayNo":35,"n":35,"type":"narration","text":"Con bé này điên thật.\n미친년 하나 들어왔네\nThe new girl is totally crazy.","sourceUid":"merged-mppm69wr-9","sourceNo":35},{"id":29,"readerNo":30,"displayNo":36,"n":36,"type":"narration","text":"NHÂN VIÊN GO A IN SUY NGHĨ THẬT CHIẾN LƯỢC\nRỒI HÀNH ĐỘNG NHƯ KẺ ĐIÊN QUẢN LÝ SÁNG TẠO GO A IN\nĐƯỢC BỔ NHIỆM LÀM GIÁM ĐỐC SÁNG TẠO TẬP 2\n[웃음] [직원들의 박수] [잔잔한 음악]\nSTAFF GO A-IN THINK STRATEGICALLY AND ACT CRAZY CREATIVE DIRECTOR GO A-IN HAS BEEN\nASSIGNED TO BE THE CHIEF CREATIVE OFFICER EPISODE 2","sourceUid":"merged-mppm70i4-10","sourceNo":36},{"id":30,"readerNo":31,"displayNo":40,"n":40,"type":"narration","text":"Đi thôi. Tôi sẽ khao bữa tối.\n가자, 내가 저녁 살게\nLet's go. I'll buy you dinner.","sourceUid":"merged-mppmm48u-11","sourceNo":40},{"id":31,"readerNo":32,"displayNo":41,"n":41,"type":"narration","text":"Thật sao? Cô sẽ đi liên hoan ư? Bọn tôi tham gia được không?\n[병수] 진짜요?\n회식 같이 가시게요?\nReally? You're coming to the team dinner? Can we also join?","sourceUid":"merged-mppmugyf-12","sourceNo":41},{"id":32,"readerNo":33,"displayNo":43,"n":43,"type":"narration","text":"Tôi mời toàn bộ nhân viên phòng. Đi thôi, kẻo Quản lý… À không, kẻo Giám đốc sáng tạo Go đổi ý. Nào, ta đi thôi.\n어, 저희도 가도 돼요? 제작 팀 시간 되는 사람 다 와 - [장우] 갑시다! CD…\n- [직원들이 좋아한다] 아니, 상무님 맘 바뀌기 전에\nEveryone on the creative team is invited. Let's hurry before the creative director… I mean, before the managing director\nchanges her mind. Come on, let's go.","sourceUid":"merged-mppmyi2g-15","sourceNo":43},{"id":33,"readerNo":34,"displayNo":47,"n":47,"type":"narration","text":"Đi nào! - Tuyệt quá!\n- Đi thôi.\n자, 자, 갑시다 - 예, 갑시다\n- [직원들의 환호]\nLet's get going! -Let's go! -Let's go!","sourceUid":"merged-mppmyz54-16","sourceNo":47},{"id":34,"readerNo":35,"displayNo":49,"n":49,"type":"narration","text":"Tôi đặt bàn trước nhé? Ta ăn gì đây? Tôi còn chưa ăn trưa nữa.\n[직원1] 혹시 제가 예약해도 되겠습니까? [직원2] 뭐 사 주시려나?\nI'll make a reservation. What should we eat? I didn't even have lunch.","sourceUid":"merged-mppn1lt4-17","sourceNo":49},{"id":35,"readerNo":36,"displayNo":52,"n":52,"type":"narration","text":"Giờ này chắc cũng tới nơi rồi đây. Tới rồi.\n슬슬 올 때가 됐는데 [다가오는 발걸음] 도착\nIt's about time. There it is.","sourceUid":"merged-mppn4j2w-19","sourceNo":52},{"id":36,"readerNo":37,"displayNo":54,"n":54,"type":"narration","text":"Tiền bối. Cậu quả là dễ đoán.\n[우철] 선배님 넌 참 예측이 쉬워\nChang-su. You're so predictable.","sourceUid":"merged-mppn5yyl-20","sourceNo":54},{"id":37,"readerNo":38,"displayNo":56,"n":56,"type":"narration","text":"Anh đang tính toán gì vậy? Sao lại đẩy tôi ra để chọn Go A In?\n지금 뭐 하자는 겁니까? 아, 어떻게 절 제끼고 고아인 저게!\nWhat's your deal? How can Go A-in get promoted over me?","sourceUid":"merged-mppn8f73-21","sourceNo":56},{"id":38,"readerNo":39,"displayNo":58,"n":58,"type":"narration","text":"Đừng có phá rối trong lúc tưng bừng này chứ. Bao nhiêu năm tôi trung thành\nphục vụ anh thì sao hả?\n왜 잔칫집에서 깽판이야 제가 지금까지 선배님을 모시고\n충성하고 모신 세월이…\nDon't cause a scene. You know how long\nI've stayed loyal to you!","sourceUid":"merged-mppnadp3-22","sourceNo":58},{"id":39,"readerNo":40,"displayNo":60,"n":60,"type":"narration","text":"Này. Đừng có sủa nữa. Hãy đợi đi.\n야 짖지 말고 기다려\nHey. Stop yapping… and wait.","sourceUid":"merged-mppnb50v-23","sourceNo":60},{"id":40,"readerNo":41,"displayNo":63,"n":63,"type":"narration","text":"Mọi người mau nâng ly lên nào. Cùng chúc mừng\nGiám đốc Go A In thăng chức nào! Cạn ly!\n[은정] 자, 빨리 잔 드세요 잔 드세요 자, 고아인 상무님 승진을 축하드리면서 건배!\nHold your drinks up, everyone. Congratulations on your promotion,\nManaging Director Go! Cheers!","sourceUid":"merged-mppncca5-24","sourceNo":63},{"id":41,"readerNo":42,"displayNo":66,"n":66,"type":"narration","text":"- Chúc mừng chị! - Chúc mừng chị! - Chúc mừng! - Chúc mừng! Mọi người vất vả rồi. - Chúng ta nữa. - Cảm ơn nhé.\n[직원들] 축하드립니다! [병수] 수고했어, 우리도 수고했어 - 우리도 수고했어, 우리도\n- [장우] 수고하셨습니다\n-Congratulations! -Congratulations! -Congratulations. -Congratulations. Great work everyone. -We did well too. -Good work.","sourceUid":"merged-mppnd9d5-25","sourceNo":66},{"id":42,"readerNo":43,"displayNo":70,"n":70,"type":"narration","text":"Quản lý Go, có điều này\ntôi rất muốn hỏi chị từ lâu rồi.\n[원희] CD님 저 꼭 물어보고 싶은 거 있었어요\nThere's something I've always wanted to ask, Ms. Go.","sourceUid":"merged-mppndjvx-26","sourceNo":70},{"id":43,"readerNo":44,"displayNo":71,"n":71,"type":"narration","text":"Điều gì?\n뭔데?\nWhat is it?","sourceUid":"merged-mppndumz-27","sourceNo":71},{"id":44,"readerNo":45,"displayNo":72,"n":72,"type":"narration","text":"Chị là người duy nhất đạt điểm tuyệt đối trong bài thi đầu vào. Đúng rồi. Tôi cũng nghe tin đồn đó.\n입사 시험 최초이자\n마지막 만점자시잖아요 어, 맞아요\n저도 그 소문 들었어요\nYou're the only one who got a perfect score on the employment exam. I heard that rumor too.","sourceUid":"merged-mppnee24-28","sourceNo":72},{"id":45,"readerNo":46,"displayNo":74,"n":74,"type":"narration","text":"Chị đã làm thế nào vậy ạ?\n[원희] 어떻게 하신 거예요?\nHow did you do it?","sourceUid":"merged-mppnemys-29","sourceNo":74},{"id":46,"readerNo":47,"displayNo":75,"n":75,"type":"narration","text":"Việc đó… PHÒNG THI SỐ 1\n[아인] 그거? [흥미로운 음악]\nWell… EXAM ROOM 1","sourceUid":"merged-mppnf4fo-30","sourceNo":75},{"id":47,"readerNo":48,"displayNo":77,"n":77,"type":"narration","text":"ĐÂY LÀ TIỂU THUYẾT HẰNG TUẦN ĐĂNG TRÊN NHẬT BÁO HANJU HÔM NAY HÃY HOÀN THÀNH TIỂU THUYẾT\nBẰNG Ý ĐỒ VÀ VĂN PHONG CỦA TÁC GIẢ TRUYỀN THÔNG VC\nPHÒNG THI TUYỂN DỤNG 2003\nTHIS IS A WEEKLY NOVEL\nRELEASED IN HANJU DAILY TODAY FINISH THE NOVEL ACCORDING TO\nTHE WRITER'S EXACT INTENTION AND STYLE VC COMMUNICATIONS\n2003 EMPLOYMENT EXAM ROOM","sourceUid":"merged-mpq6lmro-1","sourceNo":77},{"id":48,"readerNo":49,"displayNo":80,"n":80,"type":"narration","text":"Cho tôi hỏi.\n[응시생] 저기…\nExcuse me.","sourceUid":"merged-mpq6m1y5-2","sourceNo":80},{"id":49,"readerNo":50,"displayNo":81,"n":81,"type":"narration","text":"Chúng tôi phải viết\ngiống tác giả hoàn toàn sao?\n100% 동일하게 쓰라는 말씀입니까?\nShould we have the exact same intention\nand style as the writer?","sourceUid":"merg d-mpq9mykr-29","sourceNo":107},{"id":80,"readerNo":81,"displayNo":120,"n":120,"type":"narration","text":"[자동차 시동음] - [탁 문 닫히는 소리]\n- [도어 록 작동음] [스위치 조작음] [한숨] - [잔잔한 음악]\n- [살짝 웃는다]","sourceUid":"merged-mpq9n7yr-30","sourceNo":120},{"id":81,"readerNo":82,"displayNo":109,"n":109,"type":"narration","text":"THUỐC HƯỚNG THẦN\nPSYCHOTROPIC DRUG","sourceUid":"merged-mpq9nin1-31","sourceNo":109},{"id":82,"readerNo":83,"displayNo":110,"n":110,"type":"narration","text":"Thế giới tốt đẹp thật. Mình phải sống thật lâu mới được.\n[아인] 좋은 세상 오래오래 살아야지\nIt's a good world. I should live long.","sourceUid":"merged-mpq9nvvv-32","sourceNo":110},{"id":83,"readerNo":84,"displayNo":126,"n":126,"type":"narration","text":"[피식 웃는다] [한숨] [웃음]","sourceUid":"merged-mpq9ooh6-33","sourceNo":126},{"id":84,"readerNo":85,"displayNo":112,"n":112,"type":"narration","text":"PHÒNG GIÁM ĐỐC SÁNG TẠO\nCHIEF CREATIVE OFFICER'S OFFICE","sourceUid":"merged-mpq9ovjf-34","sourceNo":112},{"id":85,"readerNo":86,"displayNo":130,"n":130,"type":"narration","text":"[아인의 한숨] [밝은 음악]","sourceUid":"merged-mpq9ozur-35","sourceNo":130},{"id":86,"readerNo":87,"displayNo":113,"n":113,"type":"narration","text":"TRUYỀN THÔNG VC GIÁM ĐỐC SÁNG TẠO GO A IN LÃNH ĐẠO NỮ ĐẦU TIÊN CỦA TRUYỀN THÔNG VC TẤM GƯƠNG CHO PHỤ NỮ. CHỊ GIỎI QUÁ. NỂ THẬT. TRUYỀN THÔNG VC, DOANH NGHIỆP BÌNH ĐẲNG GIỚI TRUYỀN THÔNG VC BỔ NHIỆM BÀ GO LÀM GIÁM ĐỐC SÁNG TẠO THẬT ĐÁNG NGƯỠNG MỘ… CÔ ẤY RA SAO NHỈ?\n\"VC기획\"\nGO A-IN EXCLUSIVE INTERVIEW WITH CHIEF CREATIVE OFFICER GO A-IN FIRST FEMALE EXECUTIVE OF VC COMMUNICATIONS VC COMMUNICATIONS, AN AGENCY WITH GENDER EQUALITY VC COMMUNICATIONS APPOINTS GO A-IN AS ITS CCO HOW ADMIRABLE… I WONDER WHAT SHE IS LIKE","sourceUid":"merged-mpq9qbqa-36","sourceNo":113},{"id":87,"readerNo":88,"displayNo":120,"n":120,"type":"narration","text":"ĐANG LÊN SÓNG LÃNH ĐẠO NỮ THỜI NAY\n[카메라 셔터음] \"방송 중\" [TV 소리가 흘러나온다]\nFEMALE LEADERS OF THIS GENERATION","sourceUid":"merged-mpq9rii3-38","sourceNo":120},{"id":88,"readerNo":89,"displayNo":116,"n":116,"type":"narration","text":"PHỎNG VẤN ĐỘC QUYỀN\nGIÁM ĐỐC SÁNG TẠO GO A IN\nSHE TRULY INSPIRES US WORKING WOMEN.\nYOU'RE AMAZING. I RESPECT YOU.","sourceUid":"merged-mpq9qvap-37","sourceNo":116},{"id":89,"readerNo":90,"displayNo":121,"n":121,"type":"narration","text":"- Xin chào quý vị khán giả. - Cảm ơn. Lãnh Đạo Nữ Thời Nay. Lãnh đạo nữ đầu tiên của Truyền thông VC.\n[TV 속 아나운서] 시청자 여러분 안녕하십니까 '우리시대 여성리더' VC기획 최초 여성 임원\n-Greetings, everyone. -Thank you. Female Leaders of This Generation. The first female executive of VC Communications.","sourceUid":"merged-mpq9tms6-39","sourceNo":121},{"id":90,"readerNo":91,"displayNo":124,"n":124,"type":"narration","text":"Khách mời hôm nay chính là Giám đốc sáng tạo Go A In.\n고아인 상무님 모시고 이야기 나눠 보겠습니다\nWe have here today\nManaging Director Go A-in.","sourceUid":"merged-mpq9tz23-40","sourceNo":124},{"id":91,"readerNo":92,"displayNo":125,"n":125,"type":"narration","text":"Xin mời chị. - Xin chào.\n- Xin chào.\n어서 오세요 - [TV 속 아인] 안녕하세요, 네\n- [TV 속 아나운서] 안녕하세요\nWelcome, ma'am. -Hello. -Hello.","sourceUid":"merged-mpq9uaca-41","sourceNo":125},{"id":92,"readerNo":93,"displayNo":127,"n":127,"type":"narration","text":"Nghe nói chị có gia cảnh thiếu thốn\nvà tốt nghiệp trường tỉnh.\n[아나운서] 지방대 출신 흙수저라고 들었습니다\nI heard you grew up poor and attended a regional university.","sourceUid":"merged-mpq9uhv7-42","sourceNo":127},{"id":93,"readerNo":94,"displayNo":128,"n":128,"type":"narration","text":"Không chỉ thiếu thốn thôi đâu. Tôi gần như còn chẳng có ăn.\n흙수저는 아니죠 아예 수저가 없었으니까\nI wouldn't say \"poor.\" We were penniless.","sourceUid":"merged-mpq9v50b-43","sourceNo":128},{"id":94,"readerNo":95,"displayNo":130,"n":130,"type":"narration","text":"Không có ăn sao?\n수저가 없었다고요?\nIs that so?","sourceUid":"merged-mpq9vbws-44","sourceNo":130},{"id":95,"readerNo":96,"displayNo":131,"n":131,"type":"narration","text":"Năm bảy tuổi, tôi chuyển vào ở nhà cô\n7살 때 고모 집에 들어가서\n눈칫밥 먹으면서 자랐습니다\nWhen I turned seven,\nI moved into my aunt's","sourceUid":"merged-mpq9vvc4-45","sourceNo":131},{"id":96,"readerNo":97,"displayNo":132,"n":132,"type":"narration","text":"và ăn nhờ ở đậu từ đó.\n[TV 속 아나운서가 놀라며] 꽤 강인한 분이신가 봐요\nand lived walking around eggshells.","sourceUid":"merged-mpq9wmb5-46","sourceNo":132},{"id":97,"readerNo":98,"displayNo":133,"n":133,"type":"narration","text":"Xem ra chị thật sự rất mạnh mẽ.\nVì đó không phải chuyện dễ dàng kể ra.\n- [무거운 음악]\n- 사실 꺼내기 어려운 과거일 텐데\nYou must be a strong person. It's not easy to talk about your past.","sourceUid":"merged-mpq9wwia-47","sourceNo":133},{"id":98,"readerNo":99,"displayNo":134,"n":134,"type":"narration","text":"Khi đó cũng không tệ lắm.\n나쁘진 않았어요\nIt wasn't so bad.","sourceUid":"merged-mpq9x5re-48","sourceNo":134},{"id":99,"readerNo":100,"displayNo":135,"n":135,"type":"narration","text":"Hẳn cô chị là một người rất tốt.\n[아나운서] 고모님이 꽤 좋은 분이셨나 봐요\nYour aunt must've been a great person.","sourceUid":"merged-mpq9xcb2-49","sourceNo":135},{"id":100,"readerNo":101,"displayNo":136,"n":136,"type":"narration","text":"Không, thật ra là trái ngược hoàn toàn.\n아니요, 정반대였죠\nShe was actually the complete opposite of that.","sourceUid":"merged-mpq9xjzd-50","sourceNo":136},{"id":101,"readerNo":102,"displayNo":137,"n":137,"type":"narration","text":"Nhưng so với việc\nmột mình ăn mì gói qua ngày thì bữa cơm ăn nhờ ở đậu\nvẫn ngon và giàu dinh dưỡng hơn.\n[아인] 하지만 혼자 먹는 불어 터진 라면보다는 같이 먹는 눈칫밥이 맛도 있고 영양가도 좋으니까요\nBut I had rather live with her than be alone by myself.","sourceUid":"merged-mpq9y4ch-51","sourceNo":137},{"id":102,"readerNo":103,"displayNo":139,"n":139,"type":"narration","text":"GIÁM ĐỐC SÁNG TẠO TRUYỀN THÔNG VC\nGIÁM ĐỐC GO A IN\nVC COMMUNICATIONS CHIEF CREATIVE OFFICER\nMANAGING DIRECTOR GO A-IN","sourceUid":"merged-mpq9yalo-52","sourceNo":139},{"id":103,"readerNo":104,"displayNo":140,"n":140,"type":"narration","text":"- Cho tôi thêm một chai rượu.\n - Vậy ta vào phần chính nhé.\n[손님] 아줌마\n여기 소주 한 병만 더 주세요\n-Another bottle of soju, please. -Let's now get to the point.","sourceUid":"merged-mpq9ykp1-53","sourceNo":140},{"id":104,"readerNo":105,"displayNo":141,"n":141,"type":"narration","text":"Để thành người làm quảng cáo tốt nhất,\n[TV 속 아나운서] 최고의\n광고인이 되려면…\nWhat should you do","sourceUid":"merged-mpq9zw1m-54","sourceNo":141},{"id":105,"readerNo":106,"displayNo":142,"n":142,"type":"narration","text":"- cần phải làm gì? \n- Này cô. Tôi gọi thêm một chai rượu.\n[손님] 아줌마\n소주 한 병만 달라니까요!\n-to become the best advertiser? -Excuse me. Can you not hear me?","sourceUid":"merged-mpqa05ff-55","sourceNo":142},{"id":106,"readerNo":107,"displayNo":143,"n":143,"type":"narration","text":"Vâng, có ngay đây.\n[사장] 네, 가져다드릴게요\nComing right up, sir.","sourceUid":"merged-mpqa0bru-56","sourceNo":143},{"id":107,"readerNo":108,"displayNo":144,"n":144,"type":"narration","text":"- Dì làm gì vậy?\n- Vâng?\n- [사장] 아, 뭐 해요\n- 예?\n-What are you doing?\n-Sorry?","sourceUid":"merged-mpqa0hqb-57","sourceNo":144},{"id":108,"readerNo":109,"displayNo":145,"n":145,"type":"narration","text":"Khách gọi rượu kìa.\n[사장] 아, 손님이\n소주 한 병 달라잖아\nHe wants a bottle of soju.","sourceUid":"merged-mpqa0orw-58","sourceNo":145},{"id":109,"readerNo":110,"displayNo":146,"n":146,"type":"narration","text":"- Dì đến đây để xem TV à?\n- Tôi xin lỗi.\n아, TV 보러 왔어? 죄송합니다\n-You're not here to watch TV. -Sorry.","sourceUid":"merged-mpqa0ykj-59","sourceNo":146},{"id":110,"readerNo":111,"displayNo":147,"n":147,"type":"narration","text":"Dù không cần quyết tâm đến mức đó\n[TV 속 아인] 뭐, 이렇게까지\n하지 않아도\nEven if you don't go that far,","sourceUid":"merged-mpqa17ed-60","sourceNo":147},{"id":111,"readerNo":112,"displayNo":148,"n":148,"type":"narration","text":"thì các bạn vẫn có thể làm quảng cáo\nvà được công ty trả lương.\n대행사에서 월급 받으면서\n광고 만들 수 있습니다\nyou can still make advertisements,\ngetting paid by your agency.","sourceUid":"merged-mpqa1cos-61","sourceNo":148},{"id":112,"readerNo":113,"displayNo":149,"n":149,"type":"narration","text":"Nhưng sẽ không thể\nvươn lên đứng đầu ngành.\n하지만 업계 최고는 될 수 없죠\nBut you won't be the best in the field.","sourceUid":"merged-mpqa1il0-62","sourceNo":149},{"id":113,"readerNo":114,"displayNo":150,"n":150,"type":"narration","text":"Vâng, tôi sẽ làm như vậy.\n[영우] 네, 그렇게 진행하겠습니다\nI'll do that, sir.","sourceUid":"merged-mpqa1s4j-63","sourceNo":150},{"id":114,"readerNo":115,"displayNo":151,"n":151,"type":"narration","text":"Tôi sẽ nói rõ với cô ấy.\n제가 설명드리겠습니다\nI'll explain it to her.","sourceUid":"merged-mpqa1y1o-64","sourceNo":151},{"id":115,"readerNo":116,"displayNo":167,"n":167,"type":"narration","text":"[휴대전화 조작음]","sourceUid":"ko-mpphrnrv-943","sourceNo":167},{"id":116,"readerNo":117,"displayNo":152,"n":152,"type":"narration","text":"Có một tin tốt. Tôi biết.\n좋은 소식 있습니다\nThere's good news. I know.","sourceUid":"merged-mpqq9qa8-65","sourceNo":152},{"id":117,"readerNo":118,"displayNo":154,"n":154,"type":"narration","text":"Thật sao? Tin gì vậy?\n알아 진짜요?\nReally? What is it?","sourceUid":"merged-mpqqa3qv-66","sourceNo":154},{"id":118,"readerNo":119,"displayNo":155,"n":155,"type":"narration","text":"Bảo tôi về Hàn chứ gì? Để làm việc ở công ty.\n뭔데요? 한국 들어오라지?\n대행사로 출근하는 걸로\nI'm going back to Korea, right? And I'll be working at the agency.","sourceUid":"merged-mpqqatee-67","sourceNo":155},{"id":119,"readerNo":120,"displayNo":157,"n":157,"type":"narration","text":"Chức vụ thì có lẽ là… giám đốc?\n[한나] 직책은 아마도… 상무?\nMy position will probably be… a managing director?","sourceUid":"merged-mpqqn0r0-79","sourceNo":157},{"id":120,"readerNo":121,"displayNo":159,"n":159,"type":"narration","text":"Cô gọi cho phòng thư ký rồi à?\n비서실이랑 통화하셨어요?\nDid you talk to the secretary's office?","sourceUid":"merged-mpqqn6z8-80","sourceNo":159},{"id":121,"readerNo":122,"displayNo":160,"n":160,"type":"narration","text":"- Không.\n- Vậy sao cô biết?\n- 아니?\n- [영우] 근데 어떻게 아셨어요?\n-No. -How did you know then?","sourceUid":"merged-mpqqevm8-70","sourceNo":160},{"id":122,"readerNo":123,"displayNo":161,"n":161,"type":"narration","text":"LÃNH ĐẠO NỮ Ở TRUYỀN THÔNG VC\nGIÁM ĐỐC GO A IN\nVC COMMUNICATIONS' FEMALE EXECUTIVE\nMANAGING DIRECTOR GO A-IN","sourceUid":"merged-mpqqf2a8-71","sourceNo":161},{"id":123,"readerNo":124,"displayNo":162,"n":162,"type":"narration","text":"Họ làm thế này\nđể trải thảm đón tôi về còn gì.\n[한나] 나 들어오라고 이렇게 레드 카펫 깔아 놨잖아\nThey prepared all this for my return.","sourceUid":"merged-mpqqfb0e-72","sourceNo":162},{"id":124,"readerNo":125,"displayNo":177,"n":177,"type":"narration","text":"[흥미로운 음악]","sourceUid":"ko-mpphrnrv-953","sourceNo":177},{"id":125,"readerNo":126,"displayNo":163,"n":163,"type":"narration","text":"Con gái chủ tịch lại trở thành\nlãnh đạo nữ đầu tiên thì ai mà chịu?\n회장 딸이 그룹 최초\n여성 임원이면 보기 좋겠어?\nIt'd be weird for the chairman's daughter to become the first female executive.","sourceUid":"merged-mpqqfjr2-73","sourceNo":163},{"id":126,"readerNo":127,"displayNo":164,"n":164,"type":"narration","text":"Dư luận đời nào chịu để yên.\n언론에서 얼마나 떠들겠냐고\nThe press would bash us.","sourceUid":"merged-mpqqfs4u-74","sourceNo":164},{"id":127,"readerNo":128,"displayNo":165,"n":165,"type":"narration","text":"Đưa một nhân vật ngậm thìa đất\nvào làm bù nhìn,\n이런 흙수저를 얼굴마담으로 쫙 깔면\nWith an executive\nwho was born into a poor family,","sourceUid":"merged-mpqqfze5-75","sourceNo":165},{"id":128,"readerNo":129,"displayNo":166,"n":166,"type":"narration","text":"hình ảnh công ty tốt lên, lại tiện cho tôi gia nhập.\n회사 이미지도 좋아지고\n내가 출근하기도 편해지고\nour group's image will improve\nand it'll make it easier for me to work.","sourceUid":"merged-mpqqgbvf-76","sourceNo":166},{"id":129,"readerNo":130,"displayNo":167,"n":167,"type":"narration","text":"Đôi bên cùng có lợi.\n서로 좋잖아?\nIt's a win-win.","sourceUid":"merged-mpqqgk9x-77","sourceNo":167},{"id":130,"readerNo":131,"displayNo":168,"n":168,"type":"narration","text":"Đúng vậy. Quả là một cách thông minh. Và tàn nhẫn nữa.\n그렇죠, 참 영리한 방법이에요 인정머리도 없고\nI know. It's quite clever. And very cold.","sourceUid":"merged-mpqqh8yy-78","sourceNo":168},{"id":131,"readerNo":132,"displayNo":170,"n":170,"type":"narration","text":"Tàn nhẫn chỗ nào? Tốt thế còn gì.\n없기는, 넘치지\nWhat do you mean? It's the opposite.","sourceUid":"merged-mpqqxc7h-81","sourceNo":170},{"id":132,"readerNo":133,"displayNo":171,"n":171,"type":"narration","text":"Không có tôi thì chị ta đừng mơ lên chức.\n나 아니면 이 사람 임원 못 달아\nIf it weren't for me, she wouldn't be an executive.","sourceUid":"merged-mpqt8rka-82","sourceNo":171},{"id":133,"readerNo":134,"displayNo":172,"n":172,"type":"narration","text":"Cô nhạy về khoản này thật đấy.\n이런 일은 진짜 빠르시네요\nYou are so quick with these things.","sourceUid":"merged-mpqtb1ql-83","sourceNo":172},{"id":134,"readerNo":135,"displayNo":173,"n":173,"type":"narration","text":"Có khoản nào mà tôi chậm chạp à?\n다른 일은 뭐? 뭐가 느린데?\nAre you saying I'm slow in other things?","sourceUid":"merged-mpqtdpfw-84","sourceNo":173},{"id":135,"readerNo":136,"displayNo":174,"n":174,"type":"narration","text":"Chuẩn bị bài, ôn bài, tiến độ học, còn cả…\n예습, 복습, 진도 [영우] 또…\nStudying in advance, reviewing,\nprogressing in the lessons, and…","sourceUid":"merged-mpqtfyw6-85","sourceNo":174},{"id":136,"readerNo":137,"displayNo":175,"n":175,"type":"narration","text":"Trợ lý Park. Đó đâu phải việc của tôi.\n박 차장, 그건 내 담당이 아니지\nMr. Park. That's not my job.","sourceUid":"merged-mpqth65l-86","sourceNo":175},{"id":137,"readerNo":138,"displayNo":176,"n":176,"type":"narration","text":"Thế việc của cô là gì?\n그럼 무슨 담당이신데요?\nThen what's your job?","sourceUid":"merged-mpqti6mg-87","sourceNo":176},{"id":138,"readerNo":139,"displayNo":177,"n":177,"type":"narration","text":"Quyết định. Những chuyện cần cảm tính.\n결정, 직감으로 하는 일들\nDecision making.\nThings that require intuition.","sourceUid":"merged-mpqtiv83-88","sourceNo":177},{"id":139,"readerNo":140,"displayNo":178,"n":178,"type":"narration","text":"CHỦ TỊCH KANG YONG HO\nCHAIRMAN KANG YONG-HO","sourceUid":"merged-mpqtntx3-89","sourceNo":178},{"id":140,"readerNo":141,"displayNo":179,"n":179,"type":"narration","text":"Giám đốc Choi, lần này vất vả cho anh rồi.\n[용호] 최 상무\n이번에 고생 많았어요\nDirector Choi, great work this time.","sourceUid":"merged-mpqto69b-90","sourceNo":179},{"id":141,"readerNo":142,"displayNo":180,"n":180,"type":"narration","text":"Cảm ơn Chủ tịch.\n[창수] 감사합니다, 회장님\nThank you, sir.","sourceUid":"merged-mpqtoua2-91","sourceNo":180},{"id":142,"readerNo":143,"displayNo":181,"n":181,"type":"narration","text":"Anh làm việc khôn ngoan như vậy thì có thể đảm trách việc lớn rồi.\n[용호] 일솜씨가 야무진 게 큰일 맡겨도 괜찮겠어\nYou're skillful at what you do. I think you can handle bigger jobs.","sourceUid":"merged-mpqtpg2v-92","sourceNo":181},{"id":143,"readerNo":144,"displayNo":183,"n":183,"type":"narration","text":"Chủ tịch cứ giao cho tôi.\n맡겨만 주십시오\nI'm at your service, sir.","sourceUid":"merged-mpqui9jy-96","sourceNo":183},{"id":144,"readerNo":145,"displayNo":184,"n":184,"type":"narration","text":"Khi Han Na đi làm, hãy giúp đỡ con bé.\n우리 한나 출근하면은\n많이 좀 도와주고\nWhen Han-na starts working here,\nplease help her out.","sourceUid":"merged-mpqujau7-97","sourceNo":184},{"id":145,"readerNo":146,"displayNo":185,"n":185,"type":"narration","text":"Vâng. Chủ tịch đừng lo.\n예, 걱정하지 마십시오\nYes, sir. Don't worry.","sourceUid":"merged-mpqukitb-98","sourceNo":185},{"id":146,"readerNo":147,"displayNo":187,"n":187,"type":"narration","text":"Nếu không có hẹn trước thì tôi cũng muốn ăn trưa một bữa với anh.\n내가 약속만 없으면\n점심이나 같이 하는 건데\nIf I didn't have prior engagements,\nI would treat you to lunch.","sourceUid":"merged-mpqulkc0-99","sourceNo":187},{"id":147,"readerNo":148,"displayNo":188,"n":188,"type":"narration","text":"Để lần tới, khi ngài có thời gian\nđược không ạ?\n[용호] 음… 다음에 회장님\n시간 되실 때 하시죠\nWhy don't we do that next time?","sourceUid":"merged-mpqumz3h-100","sourceNo":188},{"id":148,"readerNo":149,"displayNo":189,"n":189,"type":"narration","text":"Được, vậy đi. Gặp lại anh sau.\n아, 그래요, 또 봅시다\nSure. I'll see you again.","sourceUid":"merged-mpqunsid-101","sourceNo":189},{"id":149,"readerNo":150,"displayNo":190,"n":190,"type":"narration","text":"Vâng. Xin ngài cứ cho gọi tôi.\n예, 회장님, 또 불러 주십시오\nYes, sir. I'll be waiting for your call.","sourceUid":"merged-mpquoe62-102","sourceNo":190},{"id":150,"readerNo":151,"displayNo":191,"n":191,"type":"narration","text":"Giờ thuận buồm xuôi gió rồi. Cảm ơn nhé. Đều nhờ…\n[태완] 이제 탄탄대로네? - 고맙다, 다 네…\n- [휴대전화 진동음]\nIt's smooth sailing for you now. Thanks. I owe it all--","sourceUid":"merged-mpqupl8e-103","sourceNo":191},{"id":151,"readerNo":152,"displayNo":193,"n":193,"type":"narration","text":"Chờ tôi chút.\n잠깐만\nGive me a second.","sourceUid":"merged-mpqurzcd-104","sourceNo":193},{"id":152,"readerNo":153,"displayNo":194,"n":194,"type":"narration","text":"Hỏng cả tâm trạng.\n[창수] 아이, 또 찬물 뿌리네\nWhat a way to ruin the mood.","sourceUid":"merged-mpqusufj-105","sourceNo":194},{"id":153,"readerNo":154,"displayNo":195,"n":195,"type":"narration","text":"Ai vậy?\n누군데?\nWho's calling?","sourceUid":"merged-mpquu3ie-106","sourceNo":195},{"id":154,"readerNo":155,"displayNo":196,"n":196,"type":"narration","text":"Lão già bình phong.\n뒷방 노인네\nThe lousy old geezer.","sourceUid":"merged-mpquuo46-107","sourceNo":196},{"id":155,"readerNo":156,"displayNo":212,"n":212,"type":"narration","text":"[잘그락 소리]","sourceUid":"ko-mpphrnrv-988","sourceNo":212},{"id":156,"readerNo":157,"displayNo":197,"n":197,"type":"narration","text":"Anh không bàn bạc với tôi câu nào\nmà đã quyết định.\n[문호] 저랑 한마디 상의도 없이\n결정하셨던데\nYou made the decision\nwithout discussing it with me.","sourceUid":"merged-mpquv73z-108","sourceNo":197},{"id":157,"readerNo":158,"displayNo":198,"n":198,"type":"narration","text":"Chức vụ của tôi chỉ đáng được nghe\ntin bổ nhiệm giám đốc qua thông báo nội bộ thôi sao?\n내가 내부 인트라넷 통해서 임원 승진을 알아야 하는\n사람입니까?\nAm I in a position\nwhere I have to learn one's promotion through the company's intranet?","sourceUid":"merged-mpquxrf2-109","sourceNo":198},{"id":158,"readerNo":159,"displayNo":200,"n":200,"type":"narration","text":"Đây là quyết định được đưa ra\nsau khi bàn bạc với phòng thư ký.\n비서실과 커뮤니케이션을 해서\n결정한 사항입니다\nThe decision was made after a discussion\nwith the secretary's office.","sourceUid":"merged-mpquyqd3-110","sourceNo":200},{"id":159,"readerNo":160,"displayNo":201,"n":201,"type":"narration","text":"Và Chủ tịch đã trực tiếp quyết định.\n회장님께서 직접 결정하셨고요\nThe chairman made the decision himself.","sourceUid":"merged-mpqv4ebp-111","sourceNo":201},{"id":160,"readerNo":161,"displayNo":202,"n":202,"type":"narration","text":"Nhưng phải có người tiến cử cô ấy chứ.\n내부에서 누군가\n추천해서 올렸겠죠\nSomeone must've recommended her.","sourceUid":"merged-mpqv59cm-112","sourceNo":202},{"id":161,"readerNo":162,"displayNo":203,"n":203,"type":"narration","text":"Điều đó đâu có gì quan trọng.\n그게 뭐 중요하겠습니까?\nThat's not important.","sourceUid":"merged-mpqv61su-113","sourceNo":203},{"id":162,"readerNo":163,"displayNo":204,"n":204,"type":"narration","text":"Dù sao kết quả cũng đã được định rồi.\n[창수] 결과는 이미 정해진 건데\nThe result has already been decided.","sourceUid":"merged-mpqv6ne9-114","sourceNo":204},{"id":163,"readerNo":164,"displayNo":221,"n":221,"type":"narration","text":"- [어두운 음악]\n- [창수의 힘주는 소리]","sourceUid":"ko-mpphrnrv-997","sourceNo":221},{"id":164,"readerNo":165,"displayNo":205,"n":205,"type":"narration","text":"Đó là thành ý của tôi.\n저야 대표님 편안하게 지내시다 가시라고\nI was only trying to be generous.","sourceUid":"merged-mpqv8ap8-115","sourceNo":205},{"id":165,"readerNo":166,"displayNo":206,"n":206,"type":"narration","text":"Tôi chỉ mong Tổng giám đốc có thể thoải mái ở đây trước khi nghỉ hưu. Nếu khiến ngài cảm thấy khó chịu thì tôi xin lỗi. Từ giờ hãy chú ý hơn.\n최대한 성의를 표한 건데 심기 불편하셨다면 사과드립니다 앞으론 주의해 주세요\nI wanted you to have\na comfortable time here before your retirement. I apologize if that upset you. Please be mindful from now on.","sourceUid":"merged-mpqvdnd2-118","sourceNo":206},{"id":166,"readerNo":167,"displayNo":225,"n":225,"type":"narration","text":"[문호의 한숨]","sourceUid":"ko-mpphrnrv-1001","sourceNo":225},{"id":167,"readerNo":168,"displayNo":210,"n":210,"type":"narration","text":"Vậy tôi xin phép.\n그럼 나가 보겠습니다\nThen I'll be going.","sourceUid":"merged-mpqvgg0l-119","sourceNo":210},{"id":168,"readerNo":169,"displayNo":227,"n":227,"type":"narration","text":"[잘그락 소리]","sourceUid":"ko-mpphrnrv-1003","sourceNo":227},{"id":169,"readerNo":170,"displayNo":211,"n":211,"type":"narration","text":"Vào phòng tôi uống trà chứ?\n내 방에서 차 한잔할까?\nShould we have some tea in my office?","sourceUid":"merged-mpqvhvac-120","sourceNo":211},{"id":170,"readerNo":171,"displayNo":229,"n":229,"type":"narration","text":"[휴대전화 조작음]","sourceUid":"ko-mpphrnrv-1005","sourceNo":229},{"id":171,"readerNo":172,"displayNo":212,"n":212,"type":"narration","text":"Tuy đã muộn nhưng chúc mừng cô.\n늦었지만 승진 축하해\nIt's late, but congratulations.","sourceUid":"merged-mpqvke1j-121","sourceNo":212},{"id":172,"readerNo":173,"displayNo":213,"n":213,"type":"narration","text":"Cô bận phỏng vấn đủ thứ\nnên muốn gặp cô còn khó hơn.\n[창수] 인터뷰다 뭐다 바빠서\n얼굴 볼 수가 있어야지\nIt's been hard to see you around\nwith all the interviews you had.","sourceUid":"merged-mpqvmcc2-122","sourceNo":213},{"id":173,"readerNo":174,"displayNo":214,"n":214,"type":"narration","text":"Tất cả là nhờ anh.\n다 상무님 덕분입니다\nIt's all thanks to you, Mr. Choi.","sourceUid":"merged-mpqvna1p-123","sourceNo":214},{"id":174,"readerNo":175,"displayNo":215,"n":215,"type":"narration","text":"Nghe câu này nhiều rồi nhưng lần này mới thấy chân thành.\n여러 번 들은 말인데 이번엔\n진심이 느껴지네?\nI've heard you say that before,\nbut this time it feels sincere.","sourceUid":"merged-mpqvnzbo-124","sourceNo":215},{"id":175,"readerNo":176,"displayNo":216,"n":216,"type":"narration","text":"Vì lần này tôi thật lòng biết ơn anh.\n이번엔 진심으로 드리는\n말이니까요\nBecause I'm sincerely thankful.","sourceUid":"merged-mpqvpibu-125","sourceNo":216},{"id":176,"readerNo":177,"displayNo":217,"n":217,"type":"narration","text":"Cô biết Trưởng phòng thư ký của Chủ tịch\nlà bạn đại học của tôi mà.\n알지? 회장님 비서실장이 대학 동기인 거\nYou know the chairman's chief secretary\nis my college friend, right?","sourceUid":"merged-mpqvr118-126","sourceNo":217},{"id":177,"readerNo":178,"displayNo":218,"n":218,"type":"narration","text":"Tôi đã tích cực tiến cử cô đấy.\n내가 적극 추천했어\nI put in a good word for you.","sourceUid":"merged-mpqvs8ep-127","sourceNo":218},{"id":178,"readerNo":179,"displayNo":219,"n":219,"type":"narration","text":"Giờ cô đã là nhân sự cấp cao rồi, hãy làm việc cho ra dáng.\n이제 임원이니까\n임원답게 일을 해야지\nNow that you're an executive, you must work like one.","sourceUid":"merged-mpqvswnf-128","sourceNo":219},{"id":179,"readerNo":180,"displayNo":220,"n":220,"type":"narration","text":"Ý anh là sao? Quản lý sáng tạo Go.\n무슨 말씀이세요?\nWhat do you mean?","sourceUid":"merged-mpqvu52s-129","sourceNo":220},{"id":180,"readerNo":181,"displayNo":221,"n":221,"type":"narration","text":"À không, Giám đốc sáng tạo Go. Giờ cô là giám đốc sáng tạo rồi.\n[창수] 고 CD 아니, 고 상무\nCreative Director Go. I mean, Managing Director Go. You're the chief creative officer now.","sourceUid":"merged-mpqyh9ee-133","sourceNo":221},{"id":181,"readerNo":182,"displayNo":223,"n":223,"type":"narration","text":"Giao ý tưởng dự án công ty viễn thông cho Quản lý Kwon đi.\n통신사 아이디어들 권 CD한테 넘겨\nGive the ideas for the telecom project to Director Kwon.","sourceUid":"merged-mpqylxq6-134","sourceNo":223},{"id":182,"readerNo":183,"displayNo":225,"n":225,"type":"narration","text":"Dù đội của cậu ta phụ trách\nthì cô vẫn được hưởng công.\n이제 제작 본부장이잖아 권 CD네 팀이 해도\n다 제작 본부장 포트폴리오인데\nEven if his team takes it on,\nyou'll be taking the credit for it.","sourceUid":"merged-mpqynf52-135","sourceNo":225},{"id":183,"readerNo":184,"displayNo":244,"n":244,"type":"narration","text":"[의미심장한 음악]","sourceUid":"ko-mpphrnrv-1020","sourceNo":244},{"id":184,"readerNo":185,"displayNo":226,"n":226,"type":"narration","text":"Phân định rạch ròi làm gì. Phải không nào?\n네 거 내 거가 어디 있어 안 그래?\nIt's all a shared effort. Don't you agree?","sourceUid":"merged-mpqyoms8-136","sourceNo":226},{"id":185,"readerNo":186,"displayNo":228,"n":228,"type":"narration","text":"Khách hàng quan trọng như thế này\nlà ngoài tầm của Nhóm phó Han.\n한 부장이 담당하기엔 아직\n큰 광고주야\nThe client is too important\nfor Manager Han to handle just yet.","sourceUid":"merged-mpqys6yp-137","sourceNo":228},{"id":186,"readerNo":187,"displayNo":229,"n":229,"type":"narration","text":"Anh nói đúng. Tôi sẽ bảo anh Han gửi cho họ.\n상무님 말씀이 맞네요 한 부장에게 넘기라고 하겠습니다\nYou're right. I'll tell him to pass it on.","sourceUid":"merged-mpqytb26-138","sourceNo":229},{"id":187,"readerNo":188,"displayNo":231,"n":231,"type":"narration","text":"Tôi rất trông đợi vào cô. Hy vọng cô sẽ phát triển lớn mạnh.\n[창수] 기대가 커 길 한번 제대로 터 보라고\nI expect a lot from you. I look forward to seeing you grow.","sourceUid":"merged-mpqyugfa-139","sourceNo":231},{"id":188,"readerNo":189,"displayNo":233,"n":233,"type":"narration","text":"Cảm ơn anh đã quan tâm tới tôi.\n신경 써 주셔서 감사합니다\nThank you for looking out for me.","sourceUid":"merged-mpqyvpd1-140","sourceNo":233},{"id":189,"readerNo":190,"displayNo":254,"n":254,"type":"narration","text":"[한숨] [한숨]","sourceUid":"merged-mpqywatv-141","sourceNo":254},{"id":190,"readerNo":191,"displayNo":234,"n":234,"type":"narration","text":"Anh cho gọi ạ? Tôi bảo này.\n[은정] 부르셨어요? [병수] 딴게 아니고\nDid you call us? Listen.","sourceUid":"merged-mpqywyo6-142","sourceNo":234},{"id":191,"readerNo":192,"displayNo":256,"n":256,"type":"narration","text":"[은정의 웃음]","sourceUid":"ko-mpphrnrw-1032","sourceNo":256},{"id":192,"readerNo":193,"displayNo":236,"n":236,"type":"narration","text":"Dồn hết ý tưởng cho dự án\ncủa công ty viễn thông vào đây đi.\n통신사 아이디어들 있잖아\n그거 전부 여기에 담아 줘\nPut all the ideas regarding\nthe telecom project in this flash drive.","sourceUid":"merged-mpqz00ac-143","sourceNo":236},{"id":193,"readerNo":194,"displayNo":237,"n":237,"type":"narration","text":"Vậy chúng ta sẽ đảm nhận sao?\n오, 통신사 우리가 하는 거예요?\nSo are we taking it on?","sourceUid":"merged-mpqz0vc6-144","sourceNo":237},{"id":194,"readerNo":195,"displayNo":238,"n":238,"type":"narration","text":"Cấp trên thăng chức một cái\nlà việc tới tay liền nhỉ?\n[장우] 오, 역시 직속 상사가 임원 되니까\n아주 쭉쭉 나가네\nAs soon as Ms. Go becomes an executive,\nwe get this high-profile job?","sourceUid":"merged-mpqz2513-145","sourceNo":238},{"id":195,"readerNo":196,"displayNo":239,"n":239,"type":"narration","text":"Ta sẽ giao cho đội của Quản lý Kwon.\n권 CD님 팀에 넘겨줄 거야\nWe're giving the job to Mr. Kwon.","sourceUid":"merged-mpqz58ch-146","sourceNo":239},{"id":196,"readerNo":197,"displayNo":240,"n":240,"type":"narration","text":"Dạ? Tại sao?\n네? [은정] 왜요?\nWhat? Why?","sourceUid":"merged-mpqz64hr-147","sourceNo":240},{"id":197,"readerNo":198,"displayNo":242,"n":242,"type":"narration","text":"Sao lại giao đứa con\ndo chính tay mình nặn ra cho bọn họ ạ?\n아니, 내 배 아파서 낳은 새끼를\n왜 남의 집에 주는데요?\nWe worked so hard for this.\nWhy should we give it to him?","sourceUid":"merged-mpqz6xme-148","sourceNo":242},{"id":198,"readerNo":199,"displayNo":243,"n":243,"type":"narration","text":"Chỉ thị của ai vậy ạ?\n부장님, 누가 그러래요?\nWho told us to?","sourceUid":"merged-mpqz85gz-149","sourceNo":243},{"id":199,"readerNo":200,"displayNo":244,"n":244,"type":"narration","text":"Ta nói lại với Giám đốc Go đi.\n가서 고 상무님한테 말씀하세요\nLet's tell Ms. Go about this.","sourceUid":"merged-mpqz8xtq-150","sourceNo":244},{"id":200,"readerNo":201,"displayNo":245,"n":245,"type":"narration","text":"- Ý tưởng của ta…\n- Chỉ thị của cô ấy đấy. Hả?\n- [장우] 우리 아이디어…\n- 고 상무님 지시 사항 [장우] 예?\n-That this was our--\n-This was Ms. Go's order. What?","sourceUid":"merged-mpqz9xm4-151","sourceNo":245},{"id":201,"readerNo":202,"displayNo":247,"n":247,"type":"narration","text":"Giao cho họ đi.\n넘겨줘\nGive it to them.","sourceUid":"merged-mpqzax6t-152","sourceNo":247},{"id":202,"readerNo":203,"displayNo":271,"n":271,"type":"narration","text":"[무거운 음악]","sourceUid":"ko-mpphrnrw-1047","sourceNo":271},{"id":203,"readerNo":204,"displayNo":248,"n":248,"type":"narration","text":"Nhưng nếu được đảm nhận,\ntôi có thể làm tốt hơn Quản lý Kwon…\n씁, 근데 이거 제가 하면\n권 CD님보다 더 잘할 수 있는…\nBut if I take on this project,\nI can do much better than--","sourceUid":"merged-mpqzc065-153","sourceNo":248},{"id":204,"readerNo":205,"displayNo":249,"n":249,"type":"narration","text":"Tôi biết.\n알아\nI know.","sourceUid":"merged-mpqzcxit-154","sourceNo":249},{"id":205,"readerNo":206,"displayNo":250,"n":250,"type":"narration","text":"Nhưng đối với khách hàng,\nkinh nghiệm cũng quan trọng như năng lực.\n[아인] 하지만 광고주한테\n실력만큼 중요한 게 경험이야\nExperience is just as important\nas skills to clients.","sourceUid":"merged-mpqzf9h2-155","sourceNo":250},{"id":206,"readerNo":207,"displayNo":251,"n":251,"type":"narration","text":"Cô Eun Jeong sắp xếp lại\nrồi giao cho họ nhé.\n[병수] 은정 카피가 정리해서\n잘 넘겨줘\nEun-jeong, organize the files\nand pass them on.","sourceUid":"merged-mpqzgst9-156","sourceNo":251},{"id":207,"readerNo":208,"displayNo":252,"n":252,"type":"narration","text":"Nhưng…\n[은정] 아니, 저…\nWell…","sourceUid":"merged-mpqzih3i-157","sourceNo":252},{"id":208,"readerNo":209,"displayNo":278,"n":278,"type":"narration","text":"[한숨] [한숨]","sourceUid":"merged-mpqziw44-158","sourceNo":278},{"id":209,"readerNo":210,"displayNo":253,"n":253,"type":"narration","text":"Cô cầm đi.\n받으세요\nHere.","sourceUid":"merged-mpqzj931-159","sourceNo":253},{"id":210,"readerNo":211,"displayNo":254,"n":254,"type":"narration","text":"Tôi biết các cô đã vất vả thế nào vì nó.\n얼마나 힘들게 한 건지 아니까…\nI know how hard you all worked for this.","sourceUid":"merged-mpqzkxtq-160","sourceNo":254},{"id":211,"readerNo":212,"displayNo":255,"n":255,"type":"narration","text":"Chúng ta chỉ là hạng tay chân thôi,\nbộ não bảo sao thì nghe vậy.\n[은정] 우리 같은 손이야\n머리가 시키는 대로 움직이는 거죠\nWe're only following orders.","sourceUid":"merged-mpqzlk4u-161","sourceNo":255},{"id":212,"readerNo":213,"displayNo":256,"n":256,"type":"narration","text":"Cảm ơn, cô Eun Jeong.\n고마워요, 은정 카피\nThank you so much, Ms. Cho.","sourceUid":"merged-mpqzn48f-162","sourceNo":256},{"id":213,"readerNo":214,"displayNo":257,"n":257,"type":"narration","text":"Vậy là may rồi.\n그래도 다행이에요\nIt's a relief though.","sourceUid":"merged-mpqzo8z0-163","sourceNo":257},{"id":214,"readerNo":215,"displayNo":258,"n":258,"type":"narration","text":"Sao? Ý cô là gì?\n네? 뭐가요?\nWhat do you mean?","sourceUid":"merged-mpqzot2d-164","sourceNo":258},{"id":215,"readerNo":216,"displayNo":259,"n":259,"type":"narration","text":"Nếu cô mà nhận liền thì chắc tôi bực lắm. Nhưng may là cô do dự. Đúng là cao thủ.\n넙죽 받아 갔으면 좀 그랬을 텐데 머뭇거려 줘서 음, 고단수셔\nI would've been annoyed\nif you had just taken it. But you were hesitant. You're a sly one.","sourceUid":"merged-mpr08vxh-167","sourceNo":259},{"id":216,"readerNo":217,"displayNo":262,"n":262,"type":"narration","text":"Khi nào cùng đi uống vài ly nhé.\n아, 나중에 같이 한잔해요\nLet's have a drink sometime.","sourceUid":"merged-mpr09bgt-168","sourceNo":262},{"id":217,"readerNo":218,"displayNo":263,"n":263,"type":"narration","text":"Mời là phải đãi đấy nhé.\n[은정] 먹자고 한 사람이\n쏘는 거예요\nThen it's your treat.","sourceUid":"merged-mpr09kpx-169","sourceNo":263},{"id":218,"readerNo":219,"displayNo":290,"n":290,"type":"narration","text":"[함께 웃는다]","sourceUid":"ko-mpphrnrw-1066","sourceNo":290},{"id":219,"readerNo":220,"displayNo":264,"n":264,"type":"narration","text":"Tôi bực chết mất.\nChắc phải sang công ty khác thôi.\n아, 나 진짜 짜증 나 내가 진짜 회사 옮기든가 해야지\nThis is pissing me off.\nI should just transfer to another agency.","sourceUid":"merged-mpr09sb1-170","sourceNo":264},{"id":220,"readerNo":221,"displayNo":265,"n":265,"type":"narration","text":"Gì? À… Đây là ý tưởng cho dự án\ncông ty viễn thông của đội Quản lý Go.\n[우철] 뭐야 [원희] 아, 고 CD님네 통신사 아이디어요\nWhat do you want? These are the telecom project ideas from Ms. Go's team.","sourceUid":"merged-mpr0aaxo-171","sourceNo":265},{"id":221,"readerNo":222,"displayNo":267,"n":267,"type":"narration","text":"Gọi lại sau nhé.\n다시 할게\nI'll call you back.","sourceUid":"merged-mpr0b66d-172","sourceNo":267},{"id":222,"readerNo":223,"displayNo":268,"n":268,"type":"narration","text":"Mấy người thương hại tôi đấy à?\n[우철] 이거 먹고\n떨어지라는 거야?\nDo you want me to thank you?","sourceUid":"merged-mpr0bl5f-173","sourceNo":268},{"id":223,"readerNo":224,"displayNo":295,"n":295,"type":"narration","text":"[휴대전화 조작음]","sourceUid":"ko-mpphrnrw-1071","sourceNo":295},{"id":224,"readerNo":225,"displayNo":269,"n":269,"type":"narration","text":"Còn cô nữa,\nhọ đưa là giơ tay ra nhận luôn à?\n너는 준다고\n그걸 넙죽 받아 오면은, 쯧\nWhy would you just take it\njust because they offered it?","sourceUid":"merged-mpr0c5yd-174","sourceNo":269},{"id":225,"readerNo":226,"displayNo":270,"n":270,"type":"narration","text":"TRUYỀN THÔNG VC\nGIÁM ĐỐC CHOI CHANG SU\n- [휴대전화 진동음] - [우철의 한숨]\nVC COMMUNICATIONS\nMANAGING DIRECTOR CHOI CHANG-SU","sourceUid":"merged-mpr0cixo-175","sourceNo":270},{"id":226,"readerNo":227,"displayNo":271,"n":271,"type":"narration","text":"Vâng?\n네\nHello?","sourceUid":"merged-mpr0cq1z-176","sourceNo":271},{"id":227,"readerNo":228,"displayNo":272,"n":272,"type":"narration","text":"Anh cứ nói qua điện thoại đi.\n아, 전화로 말씀하세요\nJust tell me on the phone.","sourceUid":"merged-mpr0cxqt-177","sourceNo":272},{"id":228,"readerNo":229,"displayNo":273,"n":273,"type":"narration","text":"Tôi tới ngay.\n가겠습니다\nI'll be there.","sourceUid":"merged-mpr0d3uc-178","sourceNo":273},{"id":229,"readerNo":230,"displayNo":274,"n":274,"type":"narration","text":"PHÒNG GIÁM ĐỐC DỰ ÁN\nCHIEF PROJECT OFFICER'S OFFICE","sourceUid":"merged-mpr0d7em-179","sourceNo":274},{"id":230,"readerNo":231,"displayNo":275,"n":275,"type":"narration","text":"Vào đi.\n[창수] 예\nCome in.","sourceUid":"merged-mpr0ddb2-180","sourceNo":275},{"id":231,"readerNo":232,"displayNo":302,"n":302,"type":"narration","text":"[휴대전화 조작음]","sourceUid":"ko-mpphrnrw-1078","sourceNo":302},{"id":232,"readerNo":233,"displayNo":276,"n":276,"type":"narration","text":"Ngồi xuống đi.\n앉아\nCome sit.","sourceUid":"merged-mpr0djlz-181","sourceNo":276},{"id":233,"readerNo":234,"displayNo":305,"n":305,"type":"narration","text":"[우철의 한숨]","sourceUid":"ko-mpphrnrw-1081","sourceNo":305},{"id":234,"readerNo":235,"displayNo":277,"n":277,"type":"narration","text":"Nghe nói cậu đang tìm chỗ mới à?\n회사 옮기려고 알아보고 있다며?\nYou're looking for another agency?","sourceUid":"merged-mpr0e077-182","sourceNo":277},{"id":235,"readerNo":236,"displayNo":278,"n":278,"type":"narration","text":"Anh đi làm tình báo\ncó khi hợp hơn là ở đây đấy.\n아, 국정원에 입사를 하시지\n왜 대행사에 오셨어요?\nAre you a secret agent or what?","sourceUid":"merged-mpr0e9o4-183","sourceNo":278},{"id":236,"readerNo":237,"displayNo":279,"n":279,"type":"narration","text":"Kang Han Na đang về Hàn Quốc.\n강한나 씨 한국 들어온다\nKang Han-na is returning to Korea.","sourceUid":"merged-mpr0ehl6-184","sourceNo":279},{"id":237,"readerNo":238,"displayNo":308,"n":308,"type":"narration","text":"[창수의 웃음]","sourceUid":"ko-mpphrnrw-1084","sourceNo":308},{"id":238,"readerNo":239,"displayNo":280,"n":280,"type":"narration","text":"Ý anh là sao? Anh muốn tôi ra sân bay\nđón người nổi tiếng hay gì?\n뭐요? 저보고 공항으로 연예인 마중이라도 나가라고요?\nWhat? Are you telling me\nto go greet a celebrity at the airport?","sourceUid":"merged-mpr0ete3-185","sourceNo":280},{"id":239,"readerNo":240,"displayNo":282,"n":282,"type":"narration","text":"Cậu nói cái gì vậy?\n아, 뭔 소리야, 쯧\nWhat are you saying?","sourceUid":"merged-mpr0fgsb-186","sourceNo":282},{"id":240,"readerNo":241,"displayNo":283,"n":283,"type":"narration","text":"Kang Han Na là cái cô đó mà.\n[우철] 아, 강한나 걔잖아요\nShe's that girl.","sourceUid":"merged-mpr0fvac-187","sourceNo":283},{"id":241,"readerNo":242,"displayNo":284,"n":284,"type":"narration","text":"That girl from the TV show.","sourceUid":"en-mpphrrqe-1956","sourceNo":284},{"id":242,"readerNo":243,"displayNo":287,"n":287,"type":"narration","text":"Cô diễn viên trong phim ấy.\n거기 그, 드라마 나오는 애","sourceUid":"merged-mpr0g12s-188","sourceNo":287},{"id":243,"readerNo":244,"displayNo":285,"n":285,"type":"narration","text":"Cái thằng…\n아유, 씨\nWhy you little…","sourceUid":"merged-mpr0g798-189","sourceNo":285},{"id":244,"readerNo":245,"displayNo":286,"n":286,"type":"narration","text":"Đến tên con gái chủ tịch\nmà cậu cũng không biết à?\n[창수] 넌 회장님 따님 이름도 모르냐?\nYou don't even know the name\nof the chairman's daughter?","sourceUid":"merged-mpr0gjc7-190","sourceNo":286},{"id":245,"readerNo":246,"displayNo":287,"n":287,"type":"narration","text":"Con bé đó sẽ sớm đi làm.\n[창수] 곧 대행사로 출근할 거야\nShe'll be coming to work soon.","sourceUid":"merged-mpr0gr5v-191","sourceNo":287},{"id":246,"readerNo":247,"displayNo":288,"n":288,"type":"narration","text":"Cậu hiểu điều đó chứ?\n무슨 뜻인지 알지?\nYou know what that means, right?","sourceUid":"merged-mpr0gwbp-192","sourceNo":288},{"id":247,"readerNo":248,"displayNo":317,"n":317,"type":"narration","text":"[흥미로운 음악] [다가오는 발걸음]","sourceUid":"merged-mpr0h18k-193","sourceNo":317},{"id":248,"readerNo":249,"displayNo":289,"n":289,"type":"narration","text":"Xong chưa? Vâng. Ra sân bay thôi.\n- [한나] 끝났어? - 네, 이제 슬슬 공항으로 가시죠\n-Are you done?\n-Yes, ma'am. Let's head to the airport.","sourceUid":"merged-mpr0hhj8-194","sourceNo":289},{"id":249,"readerNo":250,"displayNo":290,"n":290,"type":"narration","text":"Cuối cùng tôi cũng sắp\nđặt chân lên đất mẹ lần nữa.\n드디어 다시 조국 땅을 밟는구나\nAt last, I am returning to my motherland.","sourceUid":"merged-mpr0hw8c-195","sourceNo":290},{"id":250,"readerNo":251,"displayNo":291,"n":291,"type":"narration","text":"Ai nghe được lại tưởng\ncô ra đi tìm đường giành độc lập ấy.\n누가 들으면 독립운동이라도 하시는 줄 알겠네요\nOne may think\nyou're an independence activist.","sourceUid":"merged-mpr0i59o-196","sourceNo":291},{"id":251,"readerNo":252,"displayNo":323,"n":323,"type":"narration","text":"[심호흡]","sourceUid":"ko-mpphrnrw-1099","sourceNo":323},{"id":252,"readerNo":253,"displayNo":292,"n":292,"type":"narration","text":"Đúng là giành lại độc lập mà. Tôi học thạc sĩ quản trị kinh doanh là vì độc lập của tôi mà.\n독립운동 맞아 MBA는 독립을 위해\n필요한 스펙이니까\nYes, I am one. MBA is a prerequisite for my independence.","sourceUid":"merged-mpr0ioaj-197","sourceNo":292},{"id":253,"readerNo":254,"displayNo":294,"n":294,"type":"narration","text":"Để có được thứ mình muốn,\n[한나] 내가 갖고 싶은 걸\n가지려면\nIn order to get what I want,","sourceUid":"merged-mpr0iy83-198","sourceNo":294},{"id":254,"readerNo":255,"displayNo":295,"n":295,"type":"narration","text":"thì tôi phải độc lập.\n독립을 해야겠지?\nI need to be independent.","sourceUid":"merged-mpr0j3bo-199","sourceNo":295},{"id":255,"readerNo":256,"displayNo":329,"n":329,"type":"narration","text":"[흥미진진한 음악]","sourceUid":"ko-mpphrnrw-1105","sourceNo":329},{"id":256,"readerNo":257,"displayNo":296,"n":296,"type":"narration","text":"Quý khách, rượu vang của cô đây ạ.\n[승무원] 고객님\n말씀하신 와인 준비했습니다\nMa'am, here's the wine you ordered.","sourceUid":"merged-mpr0jaru-200","sourceNo":296},{"id":257,"readerNo":258,"displayNo":297,"n":297,"type":"narration","text":"Cô Kang Han Na?\n강한나 씨?\nMs. Kang Han-na?","sourceUid":"merged-mpr0jfhw-201","sourceNo":297},{"id":258,"readerNo":259,"displayNo":331,"n":331,"type":"narration","text":"[놀란 숨소리]","sourceUid":"ko-mpphrnrw-1107","sourceNo":331},{"id":259,"readerNo":260,"displayNo":298,"n":298,"type":"narration","text":"Xin lỗi cô.\nĐể tôi bày hạt mắc-ca ra đĩa cho cô.\n죄송합니다, 마카다미아 접시에 다시 담아다 드리겠습니다\nI apologize. I'll bring these\nmacadamia nuts out on a plate.","sourceUid":"merged-mpr0jo1v-202","sourceNo":298},{"id":260,"readerNo":261,"displayNo":333,"n":333,"type":"narration","text":"[살짝 웃는다]","sourceUid":"ko-mpphrnrw-1109","sourceNo":333},{"id":261,"readerNo":262,"displayNo":299,"n":299,"type":"narration","text":"Dừng lại!\n스톱\nStop.","sourceUid":"merged-mpr0ju5g-203","sourceNo":299},{"id":262,"readerNo":263,"displayNo":300,"n":300,"type":"narration","text":"Sao cô phải bày ra đĩa cho tôi?\n[한나] 그걸 왜\n접시에 담아 주는데요?\nWhy would I need a plate for that?","sourceUid":"merged-mpr0k8rn-204","sourceNo":300},{"id":263,"readerNo":264,"displayNo":301,"n":301,"type":"narration","text":"À…\n아, 그게\nWell…","sourceUid":"merged-mpr0kdoj-205","sourceNo":301},{"id":264,"readerNo":265,"displayNo":302,"n":302,"type":"narration","text":"Với những vị khách\nlà chủ doanh nghiệp như cô…\n기업 오너 같은 특별한 분들에게는…\nTo high-profile customers\nsuch as yourself--","sourceUid":"merged-mpr0l019-206","sourceNo":302},{"id":265,"readerNo":266,"displayNo":303,"n":303,"type":"narration","text":"Ưu đãi đặc biệt cho tài phiệt?\n재벌에 대한 특혜다?\nIt's a special treatment?","sourceUid":"merged-mpr0l8gm-207","sourceNo":303},{"id":266,"readerNo":267,"displayNo":304,"n":304,"type":"narration","text":"Không ạ. Là do trước kia từng có một rắc rối lớn…\n아니요, 예전에\n크게 문제가 좀 있었어서…\nNo. There was a big incident\nin the past regarding…","sourceUid":"merged-mpr0lgr2-208","sourceNo":304},{"id":267,"readerNo":268,"displayNo":305,"n":305,"type":"narration","text":"À. Bê bối đậu phộng?\n아, 땅콩?\nI see. The nut rage incident?","sourceUid":"merged-mpr0lrkr-209","sourceNo":305},{"id":268,"readerNo":269,"displayNo":342,"n":342,"type":"narration","text":"- [흥미로운 음악]\n- [난처한 숨소리] - [한나의 웃음]\n- [카메라 셔터음]","sourceUid":"merged-mpr0m5uz-211","sourceNo":342},{"id":269,"readerNo":270,"displayNo":307,"n":307,"type":"narration","text":"Cảm ơn cô.\n[승무원] 감사합니다\nThank you, ma'am.","sourceUid":"merged-mpr0m03f-210","sourceNo":307},{"id":270,"readerNo":271,"displayNo":344,"n":344,"type":"narration","text":"[카메라 셔터음]","sourceUid":"ko-mpphrnrw-1120","sourceNo":344},{"id":271,"readerNo":272,"displayNo":308,"n":308,"type":"narration","text":"Thu hút sự chú ý là phải thế này.\n어그로는 이렇게 끄는 거지\nThis is how you draw attention.","sourceUid":"merged-mpr0mi2s-212","sourceNo":308},{"id":272,"readerNo":273,"displayNo":309,"n":309,"type":"narration","text":"Nhìn đây, lũ hám danh vụng về.\n주목해라, 어설픈 관종들아\nLook here, you lame attention seekers.","sourceUid":"merged-mpr0mnlo-213","sourceNo":309},{"id":273,"readerNo":274,"displayNo":310,"n":310,"type":"narration","text":"Trùm cuối sắp hạ cánh rồi đây.\n끝판왕께서 곧 도착하신다\nThe real attention seeker will be arriving soon.","sourceUid":"merged-mpr0msu6-214","sourceNo":310},{"id":274,"readerNo":275,"displayNo":311,"n":311,"type":"narration","text":"CHIA SẺ ĐANG TẢI LÊN\nSHARE UPLOADING","sourceUid":"merged-mpr0n0n2-215","sourceNo":311},{"id":275,"readerNo":276,"displayNo":349,"n":349,"type":"narration","text":"[휴대전화 진동음] [의미심장한 음악]","sourceUid":"merged-mpr0n3mz-216","sourceNo":349},{"id":276,"readerNo":277,"displayNo":313,"n":313,"type":"narration","text":"Đã mười năm trôi qua\nmà nhiều tiếp viên vẫn còn e ngại.\n[한나] 10년이나 지났는데 아직도 힘들어하는 스튜어디스분들\nSo many flight attendants are still afraid of the 10-year-old incident.","sourceUid":"merged-mpr0ng8x-217","sourceNo":313},{"id":277,"readerNo":278,"displayNo":314,"n":314,"type":"narration","text":"Không giàu bằng tôi\nthì đừng có lộng quyền.\n나보다 돈 없음 갑질하지 마셈\nDon't go on a power trip\nif you're not as rich as me.","sourceUid":"merged-mpr0nndw-218","sourceNo":314},{"id":278,"readerNo":279,"displayNo":315,"n":315,"type":"narration","text":"Không! Hạ xuống hết!\n안 돼요, 다 내려요!\nNo! Take it down!","sourceUid":"merged-mpr0nscb-219","sourceNo":315},{"id":279,"readerNo":280,"displayNo":354,"n":354,"type":"narration","text":"[사람들이 술렁인다] [영우의 다급한 숨소리]","sourceUid":"merged-mpr0nwnn-220","sourceNo":354},{"id":280,"readerNo":281,"displayNo":316,"n":316,"type":"narration","text":"Tại anh mà máy bay\nsuýt phải bay vòng về đấy.\n[한나] 아휴 박 차장 때문에 비행기 회항할 뻔했잖아\nThe plane almost flew back because of you.","sourceUid":"merged-mpr0o5qb-221","sourceNo":316},{"id":281,"readerNo":282,"displayNo":317,"n":317,"type":"narration","text":"Phóng viên để ý\nnhất cử nhất động của cô trên mạng.\n기자들 즐겨찾기가 강한나 SNS고요\nThe reporters have their eyes\non your social media.","sourceUid":"merged-mpr0oegl-222","sourceNo":317},{"id":282,"readerNo":283,"displayNo":318,"n":318,"type":"narration","text":"Công việc của tôi\nlà ngăn chặn rắc rối phát sinh.\n[영우] 문제가 될 만한 상황\n미리 차단하는 게 제 일입니다\nIt's my job to prevent\nany issues from rising.","sourceUid":"merged-mpr0omq1-223","sourceNo":318},{"id":283,"readerNo":284,"displayNo":319,"n":319,"type":"narration","text":"Còn nữa…\n- 그리고\n- [철컹거리는 소리]\nAlso…","sourceUid":"merged-mpr0ou2s-224","sourceNo":319},{"id":284,"readerNo":285,"displayNo":320,"n":320,"type":"narration","text":"Cô đi bộ chút đi.\n좀 걸으세요\nCould you walk?","sourceUid":"merged-mpr0ozkk-225","sourceNo":320},{"id":285,"readerNo":286,"displayNo":321,"n":321,"type":"narration","text":"Kỹ thuật phát triển là để con người thuận tiện mà.\n[한나] 아, 편하게 살라고\n이렇게 기술을 발전시켰는데\nTechnology made our lives so convenient.","sourceUid":"merged-mpr0p6zf-226","sourceNo":321},{"id":286,"readerNo":287,"displayNo":322,"n":322,"type":"narration","text":"Sao tôi phải đi bộ?\n내가 왜 걸어?\nSo why would I walk?","sourceUid":"merged-mpr0pfac-227","sourceNo":322},{"id":287,"readerNo":288,"displayNo":323,"n":323,"type":"narration","text":"Tôi ghét nhất là đi bộ.\n걷는 거 진짜 극혐\nI hate walking.","sourceUid":"merged-mpr0pssl-228","sourceNo":323},{"id":288,"readerNo":289,"displayNo":324,"n":324,"type":"narration","text":"Cô có phải trẻ con đâu.\n[영우] 애도 아니고\nYou're not a kid.","sourceUid":"merged-mpr0pzyj-229","sourceNo":324},{"id":289,"readerNo":290,"displayNo":325,"n":325,"type":"narration","text":"Cô không thấy ngại sao?\n남들 보기 부끄럽지 않으세요?\nAren't you embarrassed?","sourceUid":"merged-mpr0qcw3-230","sourceNo":325},{"id":290,"readerNo":291,"displayNo":326,"n":326,"type":"narration","text":"Không hề. Để ý đến họ làm gì?\n전혀, 눈치를 왜 봐?\nNot at all. Why would I be?","sourceUid":"merged-mpr0qke3-231","sourceNo":326},{"id":291,"readerNo":292,"displayNo":327,"n":327,"type":"narration","text":"Tôi thích sống sao kệ tôi.\n[한나] 나 좋을 대로 사는 거지\nI live how I want to.","sourceUid":"merged-mpr0qsxw-232","sourceNo":327},{"id":292,"readerNo":293,"displayNo":328,"n":328,"type":"narration","text":"Trưởng phòng Kim.\n실장님\nMr. Kim.","sourceUid":"merged-mpr0r23m-233","sourceNo":328},{"id":293,"readerNo":294,"displayNo":329,"n":329,"type":"narration","text":"Đã lâu không gặp cô.\n[태완] 오랜만입니다\nIt's been a while.","sourceUid":"merged-mpr0r7qi-234","sourceNo":329},{"id":294,"readerNo":295,"displayNo":330,"n":330,"type":"narration","text":"Người giỏi để ý đến rồi.\n눈치 보는 분 한 분 오셨네\nThere's the brown-noser.","sourceUid":"merged-mpr0rdfe-235","sourceNo":330},{"id":295,"readerNo":296,"displayNo":331,"n":331,"type":"narration","text":"Trưởng phòng đến tận sân bay làm gì?\n[한나] 오 실장님이 공항까지 웬일?\nWhat brings you to the airport?","sourceUid":"merged-mpr0rm0k-236","sourceNo":331},{"id":296,"readerNo":297,"displayNo":332,"n":332,"type":"narration","text":"Dĩ nhiên tôi phải đến rồi.\n당연히 제가 나와야죠\nTo greet you, of course.","sourceUid":"merged-mpr0rst0-237","sourceNo":332},{"id":297,"readerNo":298,"displayNo":333,"n":333,"type":"narration","text":"Sẵn tiện về phe tôi?\n이참에 내 편으로 서시게?\nSo you're on my side?","sourceUid":"merged-mpr0rym5-238","sourceNo":333},{"id":298,"readerNo":299,"displayNo":334,"n":334,"type":"narration","text":"Tôi thì…\n씁, 저야…\nAs for me…","sourceUid":"merged-mpr0s4lv-239","sourceNo":334},{"id":299,"readerNo":300,"displayNo":335,"n":335,"type":"narration","text":"luôn ở phe Chủ tịch.\n회장님 편이죠\nI'm on the chairman's side.","sourceUid":"merged-mpr0s98h-240","sourceNo":335},{"id":300,"readerNo":301,"displayNo":336,"n":336,"type":"narration","text":"Quả nhiên là chú,\nrất biết cách phòng thân.\n역시 보험 참 잘 드셔\nYou've always had a knack for talking your way out.","sourceUid":"merged-mpr0setw-241","sourceNo":336},{"id":301,"readerNo":302,"displayNo":337,"n":337,"type":"narration","text":"Sau này giao cho chú\nquản lý bên bảo hiểm được đấy.\n[한나] 아, 나중에 계열사 중에\n보험 쪽 맡으시면 되겠다\nMaybe you can have a job\nin that field in the future.","sourceUid":"merged-mpr0smh9-242","sourceNo":337},{"id":302,"readerNo":303,"displayNo":338,"n":338,"type":"narration","text":"Cô chiêu mộ tôi sao?\n제안이십니까?\nAre you offering me one?","sourceUid":"merged-mpr0stgb-243","sourceNo":338},{"id":303,"readerNo":304,"displayNo":339,"n":339,"type":"narration","text":"Đời nào. Tôi làm gì có quyền. Sao mà dám.\n설마요 [한나] 제가 어떻게 감히\nNo way. I don't have the right. I wouldn't even dare to.","sourceUid":"merged-mpr0to2i-244","sourceNo":339},{"id":304,"readerNo":305,"displayNo":341,"n":341,"type":"narration","text":"Tôi cũng chẳng có tham vọng. Tôi đi nhé.\n저야 욕심 없으니까 갈게요\nI'm not ambitious. Goodbye then.","sourceUid":"merged-mpr0udme-246","sourceNo":341},{"id":305,"readerNo":306,"displayNo":343,"n":343,"type":"narration","text":"\"Không có tham vọng\"?\n욕심이 없다?\n\"Not ambitious\"?","sourceUid":"merged-mpr0ukyb-247","sourceNo":343},{"id":306,"readerNo":307,"displayNo":344,"n":344,"type":"narration","text":"Còn khuya ấy.\n퍽이나\nAs if.","sourceUid":"merged-mpr0upyj-248","sourceNo":344},{"id":307,"readerNo":308,"displayNo":345,"n":345,"type":"narration","text":"Đi đâu đây ạ?\n어디로 갈까요?\nWhere to, sir?","sourceUid":"merged-mpr0v0u3-249","sourceNo":345},{"id":308,"readerNo":309,"displayNo":346,"n":346,"type":"narration","text":"Truyền thông VC. PHÒNG GIÁM ĐỐC SÁNG TẠO LUẬT SƯ KANG HYE SEON CHÚC MỪNG THĂNG CHỨC GIÁM ĐỐC JBC KIM SEUNG HYEON GIÁM ĐỐC SÁNG TẠO GO A IN\n대행사 [밝은 음악]\nTo the agency. CHIEF CREATIVE OFFICER'S OFFICE CEO KANG HYE-SEON OF GAONGIL LAW FIRM\nCONGRATULATIONS ON YOUR PROMOTION GO A-IN JBC DIRECTOR, KIM SEUNG-HYEON","sourceUid":"merged-mpr0w4kz-251","sourceNo":346},{"id":309,"readerNo":310,"displayNo":351,"n":351,"type":"narration","text":"Xin chào chị.\n안녕하세요\nHello.","sourceUid":"merged-mpr0wdfo-252","sourceNo":351},{"id":310,"readerNo":311,"displayNo":352,"n":352,"type":"narration","text":"Tôi là Jung Su Jeong, thư ký của chị. Mong chị chiếu cố.\n[수정] 상무님 담당 비서 정수정입니다\nI'm your secretary, Jung Su-jeong.\nI look forward to working with you.","sourceUid":"merged-mpr0wlyp-253","sourceNo":352},{"id":311,"readerNo":312,"displayNo":353,"n":353,"type":"narration","text":"Vâng. Nếu cần gì chị cứ gọi tôi bất cứ lúc nào.\n잘 부탁드립니다 그래요 [수정] 필요하신 거 있으면 언제든 말씀해 주세요\nSure. Please let me know if you need anything.","sourceUid":"merged-mpr0x662-254","sourceNo":353},{"id":312,"readerNo":313,"displayNo":355,"n":355,"type":"narration","text":"Thăng chức chỉ là khởi đầu.\n[재훈] 승진은 이제 시작이다\nThis promotion is only the beginning.","sourceUid":"merged-mpr0xfsr-255","sourceNo":355},{"id":313,"readerNo":314,"displayNo":356,"n":356,"type":"narration","text":"Trở thành giám đốc, cộng thêm một điểm.\n사장 되면 1점 플러스\nWhen you become the president, you get another point.","sourceUid":"merged-mpr0xocz-256","sourceNo":356},{"id":314,"readerNo":315,"displayNo":357,"n":357,"type":"narration","text":"Giờ cô đã có bốn điều\nmà đàn ông thích nhất.\n이젠 남자가 좋아하는 4대 조건\nNow you have the four conditions\nmen like the most.","sourceUid":"merged-mpr0xtzw-257","sourceNo":357},{"id":315,"readerNo":316,"displayNo":358,"n":358,"type":"narration","text":"GIÁM ĐỐC JH FACTORY JUNG JAE HUN\n[노크 소리]\nCEO JUNG JAE-HUN","sourceUid":"merged-mpr0y5cz-258","sourceNo":358},{"id":316,"readerNo":317,"displayNo":359,"n":359,"type":"narration","text":"Chúc mừng cô.\n[태완] 축하드립니다\nCongratulations.","sourceUid":"merged-mpr0yden-259","sourceNo":359},{"id":317,"readerNo":318,"displayNo":360,"n":360,"type":"narration","text":"Tôi là Kim Tae Wan,\nTrưởng phòng thư ký trụ sở.\n본사 비서실 실장 김태완입니다\nI am Chief Secretary Kim Tae-wan from HQ.","sourceUid":"merged-mpr0ynbv-260","sourceNo":360},{"id":318,"readerNo":319,"displayNo":361,"n":361,"type":"narration","text":"Đây là quà của chủ tịch.\n회장님께서 보내시는 겁니다\nThis is the chairman's gift.","sourceUid":"merged-mpr0yx33-261","sourceNo":361},{"id":319,"readerNo":320,"displayNo":362,"n":362,"type":"narration","text":"Chủ tịch ạ?\n회장님이요?\nThe chairman?","sourceUid":"merged-mpr0z5fg-262","sourceNo":362},{"id":320,"readerNo":321,"displayNo":363,"n":363,"type":"narration","text":"Ngài ấy không hay chúc mừng\nngười dưới tổng giám đốc, nhưng việc thăng chức của cô\nlà một trường hợp đặc biệt.\n원래 사장급 이하 승진자에겐 보내시지 않는데 [태완] 상무님은 워낙 특별한 케이스라서\nHe normally doesn't send gifts to anyone below the president level, but your promotion is a very special one.","sourceUid":"merged-mpr0zf5w-263","sourceNo":363},{"id":321,"readerNo":322,"displayNo":365,"n":365,"type":"narration","text":"Vâng. Tôi sẽ nỗ lực\nđể không phụ lòng ngài ấy.\n[아인] 네 기대에 어긋나지 않도록\n노력하겠습니다\nThank you. I'll do my best to meet your expectations.","sourceUid":"merged-mpr0zlcq-264","sourceNo":365},{"id":322,"readerNo":323,"displayNo":366,"n":366,"type":"narration","text":"May quá. Dạ?\n다행이네요 - [휴대전화 진동음] - 네?\nThat's a relief. Sorry?","sourceUid":"merged-mpr0zv35-265","sourceNo":366},{"id":323,"readerNo":324,"displayNo":368,"n":368,"type":"narration","text":"Vâng, tôi đang ở chỗ cô ấy.\n[태완] 예, 같이 있습니다\nYes, I'm with her.","sourceUid":"merged-mpr1037u-266","sourceNo":368},{"id":324,"readerNo":325,"displayNo":369,"n":369,"type":"narration","text":"Tôi hiểu rồi.\n알겠습니다\nYes, sir.","sourceUid":"merged-mpr1082h-267","sourceNo":369},{"id":325,"readerNo":326,"displayNo":370,"n":370,"type":"narration","text":"Là Chủ tịch.\n회장님이십니다\nIt's the chairman.","sourceUid":"merged-mpr10cej-268","sourceNo":370},{"id":326,"readerNo":327,"displayNo":413,"n":413,"type":"narration","text":"[어두운 음악]","sourceUid":"ko-mpphrnrw-1189","sourceNo":413},{"id":327,"readerNo":328,"displayNo":371,"n":371,"type":"narration","text":"Chào Chủ tịch.\n안녕하십니까, 회장님\nHello, sir.","sourceUid":"merged-mpr10k6r-269","sourceNo":371},{"id":328,"readerNo":329,"displayNo":372,"n":372,"type":"narration","text":"Chúc mừng cô, Giám đốc Go.\n고아인 상무, 축하해요\nCongratulations, Director Go.","sourceUid":"merged-mpr10roa-270","sourceNo":372},{"id":329,"readerNo":330,"displayNo":373,"n":373,"type":"narration","text":"Tôi sẽ nỗ lực hết mình để không gây tổn hại đến ngài.\n회장님에게 누가 되지 않도록\n최선을 다하겠습니다\nI'll do my best not to hold you back.","sourceUid":"merged-mpr1103e-271","sourceNo":373},{"id":330,"readerNo":331,"displayNo":374,"n":374,"type":"narration","text":"Giờ cô là bộ mặt của tập đoàn rồi.\n자네가 이제 우리 그룹의 얼굴이야\nYou represent our group now.","sourceUid":"merged-mpr116rl-272","sourceNo":374},{"id":331,"readerNo":332,"displayNo":375,"n":375,"type":"narration","text":"XÃ HỘI \"Người phụ nữ phá vỡ giới hạn.\n'유리 천장을 깬 걸 크러시'\nThe woman who broke through\nthe glass ceiling.","sourceUid":"merged-mpr128u9-273","sourceNo":375},{"id":332,"readerNo":333,"displayNo":376,"n":376,"type":"narration","text":"Doanh nghiệp đề cao thực lực hơn học vấn.\n'학력 철폐 실력 위주 기업'\nA company based on skills,\nnot academic backgrounds.","sourceUid":"merged-mpr12i82-274","sourceNo":376},{"id":333,"readerNo":334,"displayNo":377,"n":377,"type":"narration","text":"Dưỡng chất cho hình ảnh thương hiệu về một tập đoàn bình đẳng giới.\"\n[용호] '여성 친화적 그룹이라는 브랜드 이미지의 에센스'\nThe essence of our image\nas a gender-equal group.","sourceUid":"merged-mpr12o9t-275","sourceNo":377},{"id":334,"readerNo":335,"displayNo":378,"n":378,"type":"narration","text":"Cô là chuyên gia về lĩnh vực này,\nnên cô hiểu rồi chứ?\n'이런 쪽 전문가니까\n더 잘 아시죠?'\nYou're an expert in this field, so I'm sure you know all this.","sourceUid":"merged-mpr12u7u-276","sourceNo":378},{"id":335,"readerNo":336,"displayNo":379,"n":379,"type":"narration","text":"Vâng. Tôi sẽ ghi nhớ lời ngài.\n네, 회장님\nOf course. I'll keep that in mind, sir.","sourceUid":"merged-mpr12zrn-277","sourceNo":379},{"id":336,"readerNo":337,"displayNo":380,"n":380,"type":"narration","text":"Hãy chỉn chu mọi thứ, từ trang điểm cho đến trang phục.\n주신 말씀 명심하겠습니다\nEverything from your makeup to your clothes should be your best.","sourceUid":"merged-mpr135cd-278","sourceNo":380},{"id":337,"readerNo":338,"displayNo":381,"n":381,"type":"narration","text":"Cô không chỉ là giám đốc.\n[용호] '화장 하나, 옷 한 벌도\n신경 써서 입으세요'\nYou're not just a managing director.","sourceUid":"merged-mpr13p2r-279","sourceNo":381},{"id":338,"readerNo":339,"displayNo":382,"n":382,"type":"narration","text":"Cô còn là người mẫu của công ty.\n'그냥 상무가 아니라\n회사 모델이 된 것처럼'\nYou're the face of the company.","sourceUid":"merged-mpr13v38-280","sourceNo":382},{"id":339,"readerNo":340,"displayNo":383,"n":383,"type":"narration","text":"\"Người mẫu\" ạ?\n모델이요?\n\"The face\"?","sourceUid":"merged-mpr142dw-281","sourceNo":383},{"id":340,"readerNo":341,"displayNo":384,"n":384,"type":"narration","text":"Vâng. Tôi sẽ ghi nhớ.\n네, 잊지 않겠습니다\nYes, sir. I won't forget it.","sourceUid":"merged-mpr14c0k-282","sourceNo":384},{"id":341,"readerNo":342,"displayNo":386,"n":386,"type":"narration","text":"Được rồi. Cô cứ tiếp nhận hết đi.\nTôi rất trông đợi vào cô.\n[용호] '그래요, 다 받아들이세요'\nAll right. Accept your duty.\nWe're expecting a lot from you.","sourceUid":"merged-mpr14ly1-283","sourceNo":386},{"id":342,"readerNo":343,"displayNo":387,"n":387,"type":"narration","text":"Tôi cúp đây.\n'기대가 큽니다, 끊습니다'\nGoodbye.","sourceUid":"merged-mpr14wly-284","sourceNo":387},{"id":343,"readerNo":344,"displayNo":430,"n":430,"type":"narration","text":"[휴대전화 조작음]","sourceUid":"ko-mpphrnrw-1206","sourceNo":430},{"id":344,"readerNo":345,"displayNo":388,"n":388,"type":"narration","text":"Sao tâng bốc quá vậy? Chả giống trưởng phòng Kim gì cả. Sao con không về nhà hay đi gặp bạn bè đi? Đến thẳng công ty làm gì?\n너무 띄워 주는 거 아니야? [한나] 실장님답지 않네 [용호] 집으로 가든가\n친구들 만나서 놀지 왜 바로 회사로 와?\nAren't you talking her up too much?\nThis isn't like Mr. Kim. You should've gone home\nor met your friends. Why did you come here?","sourceUid":"merged-mpr18gdu-289","sourceNo":388},{"id":345,"readerNo":346,"displayNo":431,"n":431,"type":"narration","text":"[헛웃음]","sourceUid":"ko-mpphrnrw-1207","sourceNo":431},{"id":346,"readerNo":347,"displayNo":391,"n":391,"type":"narration","text":"Bao giờ con được đi làm?\nNgày mai? Ngày kia? Trời ạ. Việc gì cũng phải từ từ.\n나 언제부터 출근하면 돼? 내일? 모레? 아이고, 뜸 들여야 먹지\nWhen do I start working? Tomorrow or the day after? Goodness. You need to wait for things to ripen.","sourceUid":"merged-mpr1a5fv-290","sourceNo":391},{"id":347,"readerNo":348,"displayNo":394,"n":394,"type":"narration","text":"- Từ từ? - Con cứ chờ đi. Đến khi xử lý xong mấy vụ ồn ào.\n뜸? 뭐? [용호] 좀 기다려\n시끄러운 거 정리될 때까지\nRipen? Just wait until everything is settled.","sourceUid":"merged-mpr1akuh-291","sourceNo":394},{"id":348,"readerNo":349,"displayNo":396,"n":396,"type":"narration","text":"Có vụ gì ồn ào chứ?\n아, 시끄러울 게 뭐가 있는데?\nWhat is there to settle?","sourceUid":"merged-mpr1ater-292","sourceNo":396},{"id":349,"readerNo":350,"displayNo":397,"n":397,"type":"narration","text":"À, sẵn tiện cho tôi hỏi.\n[태완] 아, 마침 온 김에\nSince I'm here, let me ask.","sourceUid":"merged-mpr1bbld-293","sourceNo":397},{"id":350,"readerNo":351,"displayNo":398,"n":398,"type":"narration","text":"Cô đã quyết định chưa?\n결정하셨습니까?\nHave you decided?","sourceUid":"merged-mpr1bhry-294","sourceNo":398},{"id":351,"readerNo":352,"displayNo":399,"n":399,"type":"narration","text":"Giám đốc Choi chưa nói gì với cô sao?\n최 상무가 아직\n말씀 안 드렸나 보네요\nSo Director Choi hasn't told you yet?","sourceUid":"merged-mpr1bmuy-295","sourceNo":399},{"id":352,"readerNo":353,"displayNo":400,"n":400,"type":"narration","text":"Anh đang nói đến chuyện gì?\n무슨 말씀이신지…\nWhat do you mean by that?","sourceUid":"merged-mpr1bunn-296","sourceNo":400},{"id":353,"readerNo":354,"displayNo":445,"n":445,"type":"narration","text":"[어색한 웃음] [어두운 음악]","sourceUid":"merged-mpr1by75-297","sourceNo":445},{"id":354,"readerNo":355,"displayNo":401,"n":401,"type":"narration","text":"Cô chọn trở thành giáo sư đại học hay là tổng giám đốc của một công ty nhỏ?\n대학교수로 가실지 아님 작은 대행사 대표로 가실 건지\nWould you prefer\na university professor position or the CEO of a small agency?","sourceUid":"merged-mpr1cegh-298","sourceNo":401},{"id":355,"readerNo":356,"displayNo":403,"n":403,"type":"narration","text":"Giám đốc Choi lúc nào cũng\nkhông chịu dọn dẹp tàn cuộc.\n아, 최 상무 이 친구는\n항상 일 뒤끝이 흐려\nDirector Choi always messes up finishing the job.","sourceUid":"merged-mpr1cp4l-299","sourceNo":403},{"id":356,"readerNo":357,"displayNo":404,"n":404,"type":"narration","text":"Sao lại để tôi nói với cô ta?\n[태완] 그걸 왜 내가 전달해\nWhy would I tell her that?","sourceUid":"merged-mpr1cy5v-300","sourceNo":404},{"id":357,"readerNo":358,"displayNo":405,"n":405,"type":"narration","text":"Công ty phải có trật tự trên dưới chứ.\n[창수] 지휘 체계가\n바로 서야 회사지\nThere's a hierarchy in a company.","sourceUid":"merged-mpr1d3uj-301","sourceNo":405},{"id":358,"readerNo":359,"displayNo":406,"n":406,"type":"narration","text":"Cứ nói thẳng với cô ta đi. Khỏi vòng vo.\n[태완] 직구로 던져, 변화구 말고\nJust tell her.\nNo need to beat around the bush.","sourceUid":"merged-mpr1d9s3-302","sourceNo":406},{"id":359,"readerNo":360,"displayNo":407,"n":407,"type":"narration","text":"Giám đốc làm sao\ntruyền lời cho giám đốc được.\n상무가 상무한테 전달해서야 되겠어?\nWe're both managing directors.","sourceUid":"merged-mpr1dgrv-303","sourceNo":407},{"id":360,"readerNo":361,"displayNo":408,"n":408,"type":"narration","text":"Anh là người đại diện cho chủ tịch,\n자네는 회장님 대리인이니까\nYou basically represent the chairman,","sourceUid":"merged-mpr1dmgb-304","sourceNo":408},{"id":361,"readerNo":362,"displayNo":409,"n":409,"type":"narration","text":"phải là anh nói thì cô ta mới không phản kháng được.\n그 입에서 나와야\n옴짝달싹 못 하고 받아들이지\nso she'll accept her fate without arguing.","sourceUid":"merged-mptwole8-1","sourceNo":409},{"id":362,"readerNo":363,"displayNo":410,"n":410,"type":"narration","text":"Tôi yếu lòng khi thấy phụ nữ khóc.\n아… 나 여자 눈물에 약한데\nI sway when I see women's tears.","sourceUid":"merged-mptwpofy-2","sourceNo":410},{"id":363,"readerNo":364,"displayNo":411,"n":411,"type":"narration","text":"- Tôi còn yếu hơn. - Anh mà yếu gì chứ?\n난 더 약해\n-Same here.\n-That's not true.","sourceUid":"merged-mptwr92x-3","sourceNo":411},{"id":364,"readerNo":365,"displayNo":412,"n":412,"type":"narration","text":"Tôi có con gái mà.\n- 네가 뭐가 약해\n- [창수] 딸 키우잖아\nI have a daughter.","sourceUid":"merged-mptwsp1v-4","sourceNo":412},{"id":365,"readerNo":366,"displayNo":459,"n":459,"type":"narration","text":"[함께 웃는다]","sourceUid":"ko-mpphrnrw-1235","sourceNo":459},{"id":366,"readerNo":367,"displayNo":413,"n":413,"type":"narration","text":"Vị trí nhân sự cấp cao thường là tạm thời. Đúng một năm. Đó là nhiệm kỳ của cô. Cô nghĩ đi rồi trả lời.\n원래 임원이라는 게 임시 직원 아닙니까 딱 1년 그게 고 상무님 임기니까 [태완] 고민하고 대답 주세요\nAn executive is a temporary position. One year. That's your term. Let me know after you decide.","sourceUid":"merged-mptwzodf-7","sourceNo":413},{"id":367,"readerNo":368,"displayNo":416,"n":416,"type":"narration","text":"Dù cô chọn phương án nào,\nchúng tôi cũng sẽ sắp xếp cho cô.\n둘 중 어디든 원하시는 곳으로\n자리 마련해 드리겠습니다\nWhichever one you choose,\nwe'll have it ready.","sourceUid":"merged-mptx2pdm-8","sourceNo":416},{"id":368,"readerNo":369,"displayNo":417,"n":417,"type":"narration","text":"Nhưng tôi vừa nói chuyện với chủ tịch mà.\n지금 방금 회장님이랑\n통화도 했는데\nBut I just spoke with the chairman.","sourceUid":"merged-mptx3o57-9","sourceNo":417},{"id":369,"readerNo":370,"displayNo":465,"n":465,"type":"narration","text":"[당황한 웃음]","sourceUid":"ko-mpphrnrw-1241","sourceNo":465},{"id":370,"readerNo":371,"displayNo":467,"n":467,"type":"narration","text":"[헛웃음 치며] 아…","sourceUid":"ko-mpphrnrw-1243","sourceNo":467},{"id":371,"readerNo":372,"displayNo":418,"n":418,"type":"narration","text":"Thất vọng thật đấy.\n아, 실망인데\nWhat a disappointment.","sourceUid":"merged-mptx4oq2-10","sourceNo":418},{"id":372,"readerNo":373,"displayNo":419,"n":419,"type":"narration","text":"Cô có vẻ ngây thơ hơn tôi tưởng.\n[태완] 고아인 상무님\n생각보단 순수하시네요\nYou're more naive than I thought.","sourceUid":"merged-mptx5ewc-11","sourceNo":419},{"id":373,"readerNo":374,"displayNo":420,"n":420,"type":"narration","text":"Ý anh là sao?\n그게 무슨…\nWhat do you mean?","sourceUid":"merged-mptx635b-12","sourceNo":420},{"id":374,"readerNo":375,"displayNo":470,"n":470,"type":"narration","text":"[당황한 웃음]","sourceUid":"ko-mpphrnrw-1246","sourceNo":470},{"id":375,"readerNo":376,"displayNo":421,"n":421,"type":"narration","text":"Cô cứ tiếp nhận hết đi.\n다 받아들이세요\nAccept your duty.","sourceUid":"merged-mptx6l37-13","sourceNo":421},{"id":376,"readerNo":377,"displayNo":422,"n":422,"type":"narration","text":"Được rồi. Cô cứ tiếp nhận hết đi.\n[용호] 그래요, 다 받아들이세요\nAll right. Accept your duty.","sourceUid":"merged-mptx7ck1-14","sourceNo":422},{"id":377,"readerNo":378,"displayNo":423,"n":423,"type":"narration","text":"Tôi rất trông đợi vào cô. Tôi rất trông đợi vào cô.\n기대가 큽니다 [용호] 기대가 큽니다\nWe're expecting a lot from you. We're expecting a lot from you.","sourceUid":"merged-mptx83kr-15","sourceNo":423},{"id":378,"readerNo":379,"displayNo":425,"n":425,"type":"narration","text":"TÔI RẤT TRÔNG ĐỢI VÀO CÔ\nTÔI CÚP ĐÂY\nWE'RE EXPECTING A LOT FROM YOU. GOODBYE.","sourceUid":"merged-mptx8r3m-16","sourceNo":425},{"id":379,"readerNo":380,"displayNo":426,"n":426,"type":"narration","text":"Tôi rất trông đợi vào cô. Cô cứ tiếp nhận hết đi.\n'기대가 큽니다' '다 받아들이세요'\nWe're expecting a lot from you. Accept your duty.","sourceUid":"merged-mptx8z6x-17","sourceNo":426},{"id":380,"readerNo":381,"displayNo":478,"n":478,"type":"narration","text":"[헛웃음]","sourceUid":"ko-mpphrnrw-1254","sourceNo":478},{"id":381,"readerNo":382,"displayNo":428,"n":428,"type":"narration","text":"Nhóm phó Han. À không, Quản lý Han.\n부장님… [은정] 아니, CD님\nManager Han. I mean, Creative Director Han.","sourceUid":"merged-mptxafib-18","sourceNo":428},{"id":382,"readerNo":383,"displayNo":430,"n":430,"type":"narration","text":"Cô sao vậy?\n- 왜 이래?\n- [은정의 웃음]\nWhat's wrong with you?","sourceUid":"merged-mptxcvfy-19","sourceNo":430},{"id":383,"readerNo":384,"displayNo":431,"n":431,"type":"narration","text":"Tôi chưa lên chức quản lý,\nnhưng có việc gì?\n아직 CD는 아니지만\nI'm not a creative director yet,\nbut what's up?","sourceUid":"merged-mptxdhu7-20","sourceNo":431},{"id":384,"readerNo":385,"displayNo":432,"n":432,"type":"narration","text":"Tôi gửi thẳng đề án cho khách hàng nhé?\n그래, 은정 카피, 무슨 일이야\nShould I send this just as is\nto the client?","sourceUid":"merged-mptxe2k8-21","sourceNo":432},{"id":385,"readerNo":386,"displayNo":433,"n":433,"type":"narration","text":"Đây là việc Giám đốc Go thường làm.\n[은정이 웃으며] 아니, 이거\n이대로 광고주한테 보낼까요?\nThis is what Ms. Go used to do.","sourceUid":"merged-mptxetje-22","sourceNo":433},{"id":386,"readerNo":387,"displayNo":434,"n":434,"type":"narration","text":"Để tôi báo cáo cô ấy rồi quyết định.\n음, 이거 상무님\nCD 때 하시던 일이네? 뭐, 보고드리고 결정하도록 하지\nI'll let her know and tell you.","sourceUid":"merged-mptxh9d3-24","sourceNo":434},{"id":387,"readerNo":388,"displayNo":435,"n":435,"type":"narration","text":"Vâng. Anh đi nhé. Thái độ tốt đấy. - Vâng, tôi sẽ cố gắng hết sức.\n- Được rồi.\n아, 예, 다녀오십시오 [병수] 아, 요새 좋아 [은정] 아, 예, 열심히 하겠습니다 [병수] 그래\nYes, sir. Please go ahead. Great attitude. -Thank you, sir. I'll try my best.\n-All right.","sourceUid":"merged-mptxj501-25","sourceNo":435},{"id":388,"readerNo":389,"displayNo":491,"n":491,"type":"narration","text":"[은정의 웃음] [탁 문 열리는 소리] [무거운 음악]","sourceUid":"merged-mptxllpc-26","sourceNo":491},{"id":389,"readerNo":390,"displayNo":438,"n":438,"type":"narration","text":"Vâng. Hình như giờ chị ấy đi đấy ạ.\n네, 지금 가시는 거 같습니다\nYes, I think she's going now.","sourceUid":"merged-mptxlssa-27","sourceNo":438},{"id":390,"readerNo":391,"displayNo":494,"n":494,"type":"narration","text":"[전화기 조작음]","sourceUid":"ko-mpphrnrw-1270","sourceNo":494},{"id":391,"readerNo":392,"displayNo":439,"n":439,"type":"narration","text":"Được. Tôi biết rồi.\n응, 알았어\nAll right. Got it.","sourceUid":"merged-mptxyfkv-28","sourceNo":439},{"id":392,"readerNo":393,"displayNo":441,"n":441,"type":"narration","text":"- Cô ta đang đến đây sao?\n- Ba. Hai. Một. Không.\n온대요? [창수] 3, 2 1 땡\n-She's coming here?\n-Three. Two. One. Zero.","sourceUid":"merged-mpty13eo-29","sourceNo":441},{"id":393,"readerNo":394,"displayNo":499,"n":499,"type":"narration","text":"[다가오는 발걸음]","sourceUid":"ko-mpphrnrw-1275","sourceNo":499},{"id":394,"readerNo":395,"displayNo":445,"n":445,"type":"narration","text":"Chà, Giám đốc sáng tạo, cô đến rồi sao?\n[우철] 아이고\n제작 본부장님 오셨습니까\nHello, Chief Creative Officer. Director Kwon, could you excuse us?","sourceUid":"merged-mpty2erf-30","sourceNo":445},{"id":395,"readerNo":396,"displayNo":447,"n
