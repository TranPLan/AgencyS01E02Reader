  if(ko)msg.push('KO: '+ko);
  if(msg.length)setStatus('Đã tự nạp audio GitHub. '+msg.join(' | '));
}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(lang){return clampVol($(lang+'Vol')?.value||100)}
function ensureVolGain(lang){
  try{
    const a=audioEl(lang);
    if(!volCtx)volCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!volSources[lang]){
      volSources[lang]=volCtx.createMediaElementSource(a);
      volGains[lang]=volCtx.createGain();
      volSources[lang].connect(volGains[lang]);
      volGains[lang].connect(volCtx.destination);
    }
    if(volCtx.state==='suspended')volCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyGameVolume(lang){
  if(lang!=='vi'&&lang!=='ko')return;
  const v=volValue(lang), a=audioEl(lang), label=$(lang+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
  const ok=ensureVolGain(lang);
  if(ok&&volGains[lang]){a.volume=1;volGains[lang].gain.value=v/100}
  else a.volume=Math.min(1,v/100);
}
function setGameVolume(lang,v,persist=true){
  const slider=$(lang+'Vol');if(slider)slider.value=String(clampVol(v));
  applyGameVolume(lang);
  if(persist)saveVolSettings();
}
function initVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(lang=>{
    const slider=$(lang+'Vol');
    const val=clampVol(saved[lang]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setGameVolume(lang,slider.value,true);
      slider.onchange=()=>setGameVolume(lang,slider.value,true);
    }
    setGameVolume(lang,val,false);
  });
}
function validRange(s,e){s=Number(s);e=Number(e);return Number.isFinite(s)&&Number.isFinite(e)&&e>=s}
function audioRange(item,side){
  if(!item)return {lang:'readko',start:0,end:0,label:'Read KO'};
  const lang=item[side+'Lang'];
  const hasKo=!!item.hasKoAudio&&validRange(item.koStart,item.koEnd);
  const hasVi=!!item.hasViAudio&&validRange(item.viStart,item.viEnd);
  if(lang==='readko')return {lang:'readko',start:item.koStart,end:item.koEnd,label:'Read KO'};
  if(lang==='ko'){
    if(hasKo)return {lang:'ko',start:item.koStart,end:item.koEnd,label:'KO Live'};
    return {lang:'readko',start:item.koStart,end:item.koEnd,label:'Read KO'};
  }
  if(hasVi)return {lang:'vi',start:item.viStart,end:item.viEnd,label:'VI Dub'};
  if(hasKo)return {lang:'ko',start:item.koStart,end:item.koEnd,label:'KO Live'};
  return {lang:'readko',start:item.koStart,end:item.koEnd,label:'Read KO'};
}
function koTextForRead(s){return clean(String(s||'').replace(/[()\[\]{}<>]/g,' ').replace(/^[A-Za-z0-9_.\- ]+:\s*/gm,' ').replace(/\s{2,}/g,' '))}
function pickKoVoice(){if(!('speechSynthesis' in window))return null;const voices=speechSynthesis.getVoices()||[];return voices.find(v=>/^ko(-|_)?KR/i.test(v.lang))||voices.find(v=>/^ko/i.test(v.lang))||voices.find(v=>/korean|한국|대한/i.test(v.name||''))||null}
function stopTts(){if('speechSynthesis' in window){try{speechSynthesis.cancel()}catch(e){}}}
function stopAudio(){['vi','ko'].forEach(k=>{try{audioEl(k).pause()}catch(e){}});stopTts();clearTimeout(state.timer);state.audioMode='free';state.segmentEnd=null;state.roundEnd=null}
function readKoText(text,label){text=koTextForRead(text);if(!text)return setStatus('Cue này chưa có KO text để Read KO.');if(!('speechSynthesis' in window))return setStatus('Trình duyệt này chưa hỗ trợ Read KO.');stopAudio();const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=0.88;u.pitch=1;const v=pickKoVoice();if(v)u.voice=v;u.onstart=()=>setStatus((label||'Read KO')+': đang đọc.');u.onend=()=>setStatus((label||'Read KO')+': đã đọc xong.');u.onerror=()=>setStatus((label||'Read KO')+': không đọc được.');speechSynthesis.speak(u)}
function readKoPromise(text){return new Promise(resolve=>{text=koTextForRead(text);if(!text||!('speechSynthesis' in window)){resolve();return}const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=0.88;u.pitch=1;const v=pickKoVoice();if(v)u.voice=v;u.onend=()=>resolve();u.onerror=()=>resolve();speechSynthesis.speak(u)})}
function rowsByKo(){return state.rows.slice().sort((a,b)=>(a.koStart-b.koStart)||(a.viStart-b.viStart)||(a.id-b.id))}
function findStartIndex(ordered){const n=Math.max(1,parseInt($('startCue').value||1,10)||1);const mode=$('startMode').value||'order';if(mode==='cue'){const idx=ordered.findIndex(r=>Number(r.sourceNo)===n||Number(r.id)===n);return idx>=0?idx:Math.min(n-1,ordered.length-1)}return Math.min(n-1,ordered.length-1)}
function pickRows(n){if(!state.rows.length)return[];const ordered=rowsByKo();n=Math.min(n,ordered.length);const mode=$('pickMode').value;if(mode==='random')return shuffle(ordered.slice()).slice(0,n).sort((a,b)=>a.koStart-b.koStart);if(mode==='fromcue'){const idx=Math.max(0,findStartIndex(ordered));return ordered.slice(idx,idx+n)}const start=Math.max(0,Math.floor(Math.random()*(ordered.length-n+1)));return ordered.slice(start,start+n)}
function answerTextForMode(r,mode){if(mode==='audio_viko')return 'VI: '+clean(r.vi)+'\nKO: '+clean(r.ko);if(mode==='audio_koen')return 'KO: '+clean(r.ko)+(r.en?'\nEN: '+clean(r.en):'');if((mode==='readko_vien'||mode==='ko_vien')&&r.en)return clean(r.vi)+'\nEN: '+clean(r.en);return clean(r.vi)}
function isAudioMode(){return String($('mode').value||'').startsWith('audio_')}
function isReadKoMode(){return String($('mode').value||'').startsWith('readko_')}
function newRound(){
  if(!state.rows.length)return setStatus('Không có dữ liệu. JSON đang nạp: '+(project&&project.diagnostics?JSON.stringify(project.diagnostics):'không có diagnostics'));
  const n=parseInt($('numSentences').value||10,10), selected=pickRows(n), mode=$('mode').value;
  state.pairs=selected.map((r,idx)=>{
    if(isAudioMode()){const qLang=$('audioPromptLang').value||'ko';return {...r,left:'Audio cue '+String(idx+1).padStart(2,'0'),right:answerTextForMode(r,mode),leftLang:qLang,rightLang:qLang,audioOnlyLeft:true}}
    if(isReadKoMode()){return {...r,left:r.ko,right:answerTextForMode(r,mode),leftLang:'readko',rightLang:'vi',readKoLeft:true,audioOnlyLeft:false}}
    const target=answerTextForMode(r,mode);const koLeft=$('direction').value==='ko_left';return {...r,left:koLeft?r.ko:target,right:koLeft?target:r.ko,leftLang:koLeft?'ko':'vi',rightLang:koLeft?'vi':'ko',audioOnlyLeft:false}
  });
  state.left=state.pairs.slice().sort((a,b)=>a.koStart-b.koStart);state.right=shuffle(state.pairs.slice());state.matched=new Set();state.leftSel=null;state.rightSel=null;render();
  const f=state.left[0],l=state.left[state.left.length-1];setStatus('Lượt mới: <strong>'+state.pairs.length+'</strong> câu · KO '+fmt(f.koStart)+' → '+fmt(l.koEnd)+(isReadKoMode()?' · Read KO mode':'')+'.')
}
function render(){renderList('left');renderList('right');$('leftCount').textContent=state.left.length;$('rightCount').textContent=state.right.length}
function renderList(side){
  const el=$(side==='left'?'leftList':'rightList'),arr=side==='left'?state.left:state.right,sel=side==='left'?state.leftSel:state.rightSel;el.innerHTML='';
  arr.forEach((it,idx)=>{const rg=audioRange(it,side),div=document.createElement('div'),isMatched=state.matched.has(it.id);const audioOnly=side==='left'&&it.audioOnlyLeft;div.className='item '+(idx===sel?'selected ':'')+(isMatched?'good dim ':'')+(!audioOnly&&isKo(it[side])?'ko':'');const mainText=audioOnly?'<span class="audioBadge '+rg.lang+'">Audio cue</span>':esc(clean(it[side]));div.innerHTML=(side==='left'?'<span class="num">'+String(idx+1).padStart(2,'0')+'.</span>':'')+mainText+'<div class="meta">'+fmt(rg.start)+' → '+fmt(rg.end)+' · <span class="audioBadge '+rg.lang+'">'+rg.label+'</span></div>';const btn=document.createElement('button');btn.className='listenBtn '+rg.lang;btn.type='button';btn.textContent=rg.lang==='readko'?'Read KO':'Nghe';btn.onclick=(ev)=>{ev.stopPropagation();playSegment(it,side)};const meta=div.querySelector('.meta');if(meta)meta.appendChild(btn);div.onclick=()=>{if(side==='left')state.leftSel=idx;else state.rightSel=idx;render()};el.appendChild(div)})
}
function selected(side){const idx=side==='left'?state.leftSel:state.rightSel;if(idx===null||idx===undefined)return null;return side==='left'?state.left[idx]:state.right[idx]}
function match(){const l=selected('left'),r=selected('right');if(!l||!r)return setStatus('Bạn cần chọn 1 câu bên trái và 1 câu bên phải.');if(l.id===r.id){state.matched.add(l.id);setStatus('Đúng rồi! Điểm: <strong>'+state.matched.size+'/'+state.pairs.length+'</strong>')}else{setStatus('Chưa đúng. Thử lại nhé.')}render()}
function playSegment(item,side){if(!item)return setStatus('Bạn chưa chọn câu.');const rg=audioRange(item,side);if(rg.lang==='readko'){readKoText(item.ko,side==='left'?'Read KO bên trái':'Read KO bên phải');return}const a=audioEl(rg.lang);if(!a.src){if(item.ko)return readKoText(item.ko,'Không có audio, chuyển sang Read KO');return setStatus('Bạn chưa nạp audio '+rg.label+'.')}stopAudio();applyGameVolume(rg.lang);const off=parseFloat($('offset').value||0)||0;state.audioMode='segment';state.segmentEnd=Math.max(0,rg.end+off);a.currentTime=Math.max(0,rg.start+off+0.01);a.play().catch(()=>setStatus('Cần bấm Play trên audio một lần.'));setStatus('Đang nghe '+(side==='left'?'trái':'phải')+': '+fmt(rg.start)+' → '+fmt(rg.end)+' · '+rg.label)}
function playAudioRangePromise(rg){return new Promise(resolve=>{const a=audioEl(rg.lang);if(!a||!a.src){resolve();return}const off=parseFloat($('offset').value||0)||0;const end=Math.max(0,rg.end+off);let done=false;const cleanup=()=>{if(done)return;done=true;clearInterval(timer);resolve()};const timer=setInterval(()=>{if(state.audioMode!=='roundseq'){cleanup();return}if(a.currentTime>=end){a.pause();cleanup()}},80);applyGameVolume(rg.lang);a.currentTime=Math.max(0,rg.start+off+0.01);a.play().catch(()=>cleanup())})}
async function playRound(){if(!state.left.length)return;const side='left', items=state.left.map(x=>({...x,_rg:audioRange(x,side)})).sort((a,b)=>a._rg.start-b._rg.start);stopAudio();state.audioMode='roundseq';setStatus('Đang nghe/Read KO cả lượt: '+items.length+' câu.');for(const it of items){if(state.audioMode!=='roundseq')break;const rg=audioRange(it,side);setStatus((rg.lang==='readko'?'Read KO':'Nghe')+' cả lượt: '+(items.indexOf(it)+1)+'/'+items.length+' · '+rg.label);if(rg.lang==='readko'){await readKoPromise(it.ko)}else{await playAudioRangePromise(rg)}await new Promise(r=>setTimeout(r,180))}if(state.audioMode==='roundseq'){state.audioMode='free';setStatus('Đã nghe/Read KO xong cả lượt.')}}
function syncAudioGuard(){['vi','ko'].forEach(k=>{const a=audioEl(k);if(!a.src||a.paused)return;if(state.audioMode==='segment'&&state.segmentEnd!==null&&a.currentTime>=state.segmentEnd){a.pause();state.audioMode='free';setStatus('Đã nghe xong câu đang chọn.')}if(state.audioMode==='round'&&state.roundEnd!==null&&a.currentTime>=state.roundEnd){a.pause();state.audioMode='free';setStatus('Đã nghe xong audio cả lượt.')}})}
function showAnswer(){const left=selected('left');if(!left)return setStatus('Chọn một câu bên trái trước.');state.rightSel=state.right.findIndex(x=>x.id===left.id);render();setStatus('Đã chọn đáp án bên phải.')}
$('gameJsonFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const data=JSON.parse(await f.text());loadGameProject(data,false)}catch(err){setStatus('Không đọc được JSON dự phòng: '+(err&&err.message?err.message:err))}};
$('viFile').onchange=e=>{const f=e.target.files[0];if(!f)return;if(state.audioUrl.vi)URL.revokeObjectURL(state.audioUrl.vi);state.audioUrl.vi=URL.createObjectURL(f);$('viAudio').src=state.audioUrl.vi;try{$('viAudio').load()}catch(e){}applyGameVolume('vi');setStatus('Đã nạp VI Dub từ file máy.')};
$('koFile').onchange=e=>{const f=e.target.files[0];if(!f)return;if(state.audioUrl.ko)URL.revokeObjectURL(state.audioUrl.ko);state.audioUrl.ko=URL.createObjectURL(f);$('koAudio').src=state.audioUrl.ko;try{$('koAudio').load()}catch(e){}applyGameVolume('ko');setStatus('Đã nạp KO Live từ file máy.')};
['mode','direction','pickMode','startMode','audioPromptLang'].forEach(id=>$(id).onchange=()=>newRound());
$('newRoundBtn').onclick=newRound;$('matchBtn').onclick=match;$('playLeftBtn').onclick=()=>playSegment(selected('left'),'left');$('playRightBtn').onclick=()=>playSegment(selected('right'),'right');$('playRoundBtn').onclick=playRound;$('stopBtn').onclick=()=>{stopAudio();setStatus('Đã dừng.')};
$('fNew').onclick=newRound;$('fMatch').onclick=match;$('fLeft').onclick=()=>playSegment(selected('left'),'left');$('fRight').onclick=()=>playSegment(selected('right'),'right');$('fRound').onclick=playRound;$('fStop').onclick=()=>{stopAudio();setStatus('Đã dừng.')};$('fAnswer').onclick=showAnswer;
$('fontSize').oninput=e=>{document.documentElement.style.setProperty('--font-size',e.target.value+'px');$('fontLabel').textContent=e.target.value+' px'};$('offset').oninput=e=>$('offsetLabel').textContent=Number(e.target.value).toFixed(1)+'s';$('startCue').onchange=()=>{if($('pickMode').value!=='fromcue')$('pickMode').value='fromcue';newRound()};
['vi','ko'].forEach(k=>audioEl(k).addEventListener('timeupdate',syncAudioGuard));
initVolumeControls();
loadGameProject(project,true);
autoLoadGithubAudio();
